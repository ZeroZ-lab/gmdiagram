<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Skills Comparison</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #020617;
      color: #e2e8f0;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container { max-width: 1100px; margin: 0 auto; }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .pulse-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #22d3ee;
      box-shadow: 0 0 8px rgba(34, 211, 238, 0.6);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    h1 { font-size: 22px; font-weight: 700; color: #f1f5f9; }
    .subtitle { font-size: 13px; color: #64748b; margin-top: 4px; }
    .diagram-container {
      background: #0f172a;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 32px;
      overflow-x: auto;
    }
    .diagram-container svg {
      width: 100%;
      min-width: 500px;
      height: auto;
      display: block;
    }
    .footer {
      font-size: 11px;
      color: #475569;
      text-align: center;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.04);
    }
    /* === Chart classes (dark-professional) === */
    .axis-line { stroke: #64748b; stroke-width: 1.5; fill: none; }
    .axis-label { fill: #94a3b8; font-size: 12px; font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace; }
    .axis-title { fill: #f1f5f9; font-size: 13px; font-weight: 600; font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace; }
    .tick-label { fill: #94a3b8; font-size: 11px; font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace; }
    .grid-line { stroke: rgba(255,255,255,0.06); stroke-dasharray: 4,4; stroke-width: 0.5; fill: none; }
    .bar { rx: 2; }
    .bar:hover { opacity: 0.85; }
    .slice { stroke: #0f172a; stroke-width: 2; }
    .line-path { fill: none; stroke-width: 2.5; }
    .area-fill { opacity: 0.15; }
    .data-dot { stroke-width: 2; }
    .radar-axis { stroke: rgba(255,255,255,0.12); stroke-width: 0.5; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="pulse-dot"></div>
      <div>
        <h1>Team Skills Comparison</h1>
        <div class="subtitle">Score out of 10</div>
      </div>
    </div>

    <div class="diagram-container">
      <svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">

        <!-- === Radar Chart === -->
        <!-- 5 axes: Frontend, Backend, DevOps, Design, Testing -->
        <!-- centerX=250, centerY=250, radius=175, numAxes=5, angleStep=72 -->
        <!-- angle for axis i: -90 + i * 72 degrees, starting at 12 o'clock -->

        <!-- === Concentric Pentagon Grid (5 levels) === -->
        <!-- Level 1 (r=35, value=2) -->
        <polygon points="250.0,215.0 283.3,239.2 270.6,278.3 229.4,278.3 216.7,239.2"
                 fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5" />

        <!-- Level 2 (r=70, value=4) -->
        <polygon points="250.0,180.0 316.6,228.4 291.1,306.6 208.9,306.6 183.4,228.4"
                 fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5" />

        <!-- Level 3 (r=105, value=6) -->
        <polygon points="250.0,145.0 349.9,217.6 311.7,334.9 188.3,334.9 150.1,217.6"
                 fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5" />

        <!-- Level 4 (r=140, value=8) -->
        <polygon points="250.0,110.0 383.1,206.7 332.3,363.3 167.7,363.3 116.9,206.7"
                 fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5" />

        <!-- Level 5 (r=175, value=10) -->
        <polygon points="250.0,75.0 416.4,195.9 352.9,391.6 147.1,391.6 83.6,195.9"
                 fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5" />

        <!-- === Axis Lines === -->
        <!-- Axis 0: Frontend (angle=-90) -->
        <line x1="250" y1="250" x2="250.0" y2="75.0" class="radar-axis" />
        <!-- Axis 1: Backend (angle=-18) -->
        <line x1="250" y1="250" x2="416.4" y2="195.9" class="radar-axis" />
        <!-- Axis 2: DevOps (angle=54) -->
        <line x1="250" y1="250" x2="352.9" y2="391.6" class="radar-axis" />
        <!-- Axis 3: Design (angle=126) -->
        <line x1="250" y1="250" x2="147.1" y2="391.6" class="radar-axis" />
        <!-- Axis 4: Testing (angle=198) -->
        <line x1="250" y1="250" x2="83.6" y2="195.9" class="radar-axis" />

        <!-- === Data Polygons === -->
        <!-- Palette B (dark-professional): Dev A=#6366f1, Dev B=#f472b6 -->

        <!-- Dev A: [8, 6, 7, 5, 9], maxValue=10 each -->
        <!-- normalized: [0.8, 0.6, 0.7, 0.5, 0.9] -->
        <!-- Frontend(0.8): r=140 → (250.0, 110.0) -->
        <!-- Backend(0.6): r=105 → (349.9, 217.6) -->
        <!-- DevOps(0.7): r=122.5 → (322.0, 349.1) -->
        <!-- Design(0.5): r=87.5 → (198.6, 320.8) -->
        <!-- Testing(0.9): r=157.5 → (100.2, 201.3) -->
        <polygon points="250.0,110.0 349.9,217.6 322.0,349.1 198.6,320.8 100.2,201.3"
                 fill="#6366f1" fill-opacity="0.15"
                 stroke="#6366f1" stroke-width="2" stroke-linejoin="round" />

        <!-- Dev B: [6, 9, 5, 8, 7], maxValue=10 each -->
        <!-- normalized: [0.6, 0.9, 0.5, 0.8, 0.7] -->
        <!-- Frontend(0.6): r=105 → (250.0, 145.0) -->
        <!-- Backend(0.9): r=157.5 → (399.8, 201.3) -->
        <!-- DevOps(0.5): r=87.5 → (301.4, 320.8) -->
        <!-- Design(0.8): r=140 → (167.7, 363.3) -->
        <!-- Testing(0.7): r=122.5 → (133.5, 212.1) -->
        <polygon points="250.0,145.0 399.8,201.3 301.4,320.8 167.7,363.3 133.5,212.1"
                 fill="#f472b6" fill-opacity="0.15"
                 stroke="#f472b6" stroke-width="2" stroke-linejoin="round" />

        <!-- === Tick Values along Axis 0 (Frontend) === -->
        <foreignObject x="218" y="207" width="28" height="16">
          <div xmlns="http://www.w3.org/1999/xhtml" class="tick-label"
               style="text-align: right; font-size: 10px;">
            2
          </div>
        </foreignObject>
        <foreignObject x="218" y="172" width="28" height="16">
          <div xmlns="http://www.w3.org/1999/xhtml" class="tick-label"
               style="text-align: right; font-size: 10px;">
            4
          </div>
        </foreignObject>
        <foreignObject x="218" y="137" width="28" height="16">
          <div xmlns="http://www.w3.org/1999/xhtml" class="tick-label"
               style="text-align: right; font-size: 10px;">
            6
          </div>
        </foreignObject>
        <foreignObject x="218" y="102" width="28" height="16">
          <div xmlns="http://www.w3.org/1999/xhtml" class="tick-label"
               style="text-align: right; font-size: 10px;">
            8
          </div>
        </foreignObject>
        <foreignObject x="215" y="67" width="30" height="16">
          <div xmlns="http://www.w3.org/1999/xhtml" class="tick-label"
               style="text-align: right; font-size: 10px;">
            10
          </div>
        </foreignObject>

        <!-- === Axis Labels (outside perimeter) === -->
        <!-- Label radius = 175 + 25 = 200 -->

        <!-- Axis 0: Frontend at label position (250.0, 50.0) -->
        <foreignObject x="210" y="38" width="80" height="20">
          <div xmlns="http://www.w3.org/1999/xhtml" class="tick-label"
               style="text-align: center;">
            Frontend
          </div>
        </foreignObject>

        <!-- Axis 1: Backend at label position (440.2, 188.2) -->
        <foreignObject x="410" y="178" width="70" height="20">
          <div xmlns="http://www.w3.org/1999/xhtml" class="tick-label"
               style="text-align: center;">
            Backend
          </div>
        </foreignObject>

        <!-- Axis 2: DevOps at label position (367.6, 411.8) -->
        <foreignObject x="332" y="402" width="70" height="20">
          <div xmlns="http://www.w3.org/1999/xhtml" class="tick-label"
               style="text-align: center;">
            DevOps
          </div>
        </foreignObject>

        <!-- Axis 3: Design at label position (132.4, 411.8) -->
        <foreignObject x="97" y="402" width="70" height="20">
          <div xmlns="http://www.w3.org/1999/xhtml" class="tick-label"
               style="text-align: center;">
            Design
          </div>
        </foreignObject>

        <!-- Axis 4: Testing at label position (59.8, 188.2) -->
        <foreignObject x="25" y="178" width="70" height="20">
          <div xmlns="http://www.w3.org/1999/xhtml" class="tick-label"
               style="text-align: center;">
            Testing
          </div>
        </foreignObject>

        <!-- === Legend === -->
        <foreignObject x="125" y="440" width="250" height="30">
          <div xmlns="http://www.w3.org/1999/xhtml" style="display: flex; align-items: center; justify-content: center; gap: 16px;">
            <div style="display: flex; align-items: center; gap: 6px;">
              <div style="width: 12px; height: 12px; background: #6366f1; border-radius: 2px;"></div>
              <span class="tick-label">Dev A</span>
            </div>
            <div style="display: flex; align-items: center; gap: 6px;">
              <div style="width: 12px; height: 12px; background: #f472b6; border-radius: 2px;"></div>
              <span class="tick-label">Dev B</span>
            </div>
          </div>
        </foreignObject>

      </svg>
    </div>

    <div class="footer">
      Generated by gmdiagram &middot; 2026-04-14
    </div>
  </div>
</body>
</html>
