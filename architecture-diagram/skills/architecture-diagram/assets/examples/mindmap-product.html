<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gmdiagram Product Features</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #020617;
      color: #e2e8f0;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container { max-width: 1100px; margin: 0 auto; }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .pulse-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #22d3ee;
      box-shadow: 0 0 8px rgba(34, 211, 238, 0.6);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    h1 { font-size: 22px; font-weight: 700; color: #f1f5f9; }
    .subtitle { font-size: 13px; color: #64748b; margin-top: 4px; }
    .diagram-container {
      background: #0f172a;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 32px;
      overflow-x: auto;
    }
    .diagram-container svg {
      width: 100%;
      min-width: 1100px;
      height: auto;
      display: block;
    }
    .footer {
      font-size: 11px;
      color: #475569;
      text-align: center;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.04);
    }

    /* ---- Mind Map Node Styles ---- */
    .mindmap-node {
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      font-family: JetBrains Mono, monospace;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .node-label {
      display: inline-block;
      line-height: 1.2;
    }

    /* Central node */
    .type-central {
      width: 120px;
      height: 50px;
      border-radius: 25px;
      background: rgba(8, 51, 68, 0.6);
      border: 2.5px solid #22d3ee;
      font-size: 13px;
      font-weight: 700;
      color: white;
      padding: 0 12px;
    }
    .type-central .node-label {
      font-size: 13px;
      font-weight: 700;
      color: white;
    }

    /* Branch node — Level 1 */
    .type-branch {
      height: 32px;
      min-width: 60px;
      padding: 0 12px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      color: white;
    }
    .type-branch .node-label {
      font-size: 11px;
      font-weight: 600;
      color: white;
    }

    /* Leaf node — Level 2+ */
    .type-leaf {
      height: 28px;
      min-width: 50px;
      padding: 0 10px;
      border-radius: 8px;
      font-size: 10px;
      font-weight: 400;
      color: #cbd5e1;
    }
    .type-leaf .node-label {
      font-size: 10px;
      font-weight: 400;
      color: #cbd5e1;
    }

    /* ---- Branch Color Variants ---- */
    .color-emerald-l1 {
      background: rgba(6, 78, 59, 0.5);
      border: 1.8px solid #34d399;
    }
    .color-emerald-l2 {
      background: rgba(6, 78, 59, 0.3);
      border: 1.2px solid #6ee7b7;
    }

    .color-violet-l1 {
      background: rgba(76, 29, 149, 0.4);
      border: 1.8px solid #a78bfa;
    }
    .color-violet-l2 {
      background: rgba(76, 29, 149, 0.25);
      border: 1.2px solid #c4b5fd;
    }

    .color-amber-l1 {
      background: rgba(120, 53, 15, 0.4);
      border: 1.8px solid #fbbf24;
    }
    .color-amber-l2 {
      background: rgba(120, 53, 15, 0.25);
      border: 1.2px solid #fcd34d;
    }

    .color-rose-l1 {
      background: rgba(136, 19, 55, 0.4);
      border: 1.8px solid #fb7185;
    }
    .color-rose-l2 {
      background: rgba(136, 19, 55, 0.25);
      border: 1.2px solid #fda4af;
    }
  </style>
</head>
<body>

        <!-- Central Node: gmdiagram -->
        <g transform="translate(540, 275)">
          <foreignObject width="120" height="50">

        <!-- Level 2: Sequence -->
