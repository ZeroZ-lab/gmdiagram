<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clean API Architecture</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #ffffff; color: #111827; font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; min-height: 100vh; padding: 60px 20px; }
    .container { max-width: 1100px; margin: 0 auto; }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #374151; }
    h1 { font-size: 22px; font-weight: 700; color: #111827; letter-spacing: -0.02em; }
    .subtitle { font-size: 13px; color: #6b7280; margin-top: 4px; }
    .diagram-container { background: #ffffff; border: 0.5px solid #e5e7eb; border-radius: 4px; padding: 32px; margin-bottom: 32px; overflow-x: auto; }
    .diagram-container svg { width: 100%; min-width: 700px; height: auto; display: block; }
    .footer { font-size: 11px; color: #9ca3af; text-align: center; padding-top: 16px; border-top: 0.5px solid #e5e7eb; }
    .layer-card { width: 100%; border-radius: 2px; padding: 8px 0 12px; box-sizing: border-box; }
    .layer-label { font-size: 14px; font-weight: 600; color: #111827; padding: 0 16px; font-family: 'Inter', sans-serif; }
    .modules { display: flex; gap: 20px; justify-content: center; padding: 8px 16px 0; flex-wrap: wrap; }
    .module { min-width: 100px; height: 40px; border-radius: 2px; display: flex; align-items: center; justify-content: center; padding: 0 16px; box-sizing: border-box; }
    .module-label { font-size: 12px; font-weight: 500; color: #111827; text-align: center; white-space: nowrap; font-family: 'Inter', sans-serif; }
    .tech-badges { display: flex; gap: 4px; justify-content: center; padding-top: 4px; }
    .tech-badge { font-size: 8px; padding: 2px 6px; border-radius: 2px; white-space: nowrap; background: #f3f4f6; border: 0.5px solid #e5e7eb; color: #6b7280; font-family: 'Inter', sans-serif; }
    .module.has-badges { height: 48px; flex-direction: column; gap: 2px; }
    .module.has-badges .module-label { height: 18px; }
    .type-process { background: #f9fafb; border: 0.5px solid #9ca3af; }
    .type-module { background: #fafafa; border: 0.5px solid #d1d5db; }
    .type-data { background: #f5f3ff; border: 0.5px solid #c4b5fd; }
    .type-infra { background: #fffbeb; border: 0.5px solid #fcd34d; }
    .type-security { background: #fff1f2; border: 0.5px solid #fda4af; border-style: dashed; }
    .type-channel { background: #fff7ed; border: 0.5px solid #fdba74; }
    .type-external { background: #f9fafb; border: 0.5px solid #e5e7eb; }
    .legend-container { display: flex; gap: 80px; align-items: center; }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-swatch { width: 14px; height: 14px; border-radius: 2px; }
    .legend-text { font-size: 11px; color: #374151; font-family: 'Inter', sans-serif; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="dot"></div>
      <div>
        <h1>Clean API Architecture</h1>
        <div class="subtitle">Minimalist RESTful service with layered separation of concerns</div>
      </div>
    </div>
    <div class="diagram-container">
      <svg viewBox="0 0 1000 620" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#9ca3af"/></marker>
          <marker id="arrowhead-rev" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto"><polygon points="8 0, 0 3, 8 6" fill="#9ca3af"/></marker>
        </defs>
        <!-- CONNECTIONS (behind layers) -->
        <line x1="500" y1="141" x2="500" y2="191" stroke="#9ca3af" stroke-width="0.5" marker-end="url(#arrowhead)"/>
        <text x="518" y="170" font-size="10" fill="#6b7280" font-family="Inter, sans-serif">Request</text>
        <line x1="500" y1="292" x2="500" y2="342" stroke="#9ca3af" stroke-width="0.5" marker-start="url(#arrowhead-rev)" marker-end="url(#arrowhead)"/>
        <text x="518" y="322" font-size="10" fill="#6b7280" font-family="Inter, sans-serif">Query</text>
        <line x1="500" y1="443" x2="500" y2="493" stroke="#9ca3af" stroke-width="0.5" marker-start="url(#arrowhead-rev)" marker-end="url(#arrowhead)"/>
        <text x="518" y="472" font-size="10" fill="#6b7280" font-family="Inter, sans-serif">IO</text>
        <!-- LAYER 1: Presentation -->
        <g transform="translate(40, 40)">
          <rect width="920" height="101" rx="2" fill="#fafafa" stroke="#d1d5db" stroke-width="0.5"/>
          <foreignObject width="920" height="101">
            <div xmlns="http://www.w3.org/1999/xhtml" class="layer-card type-module">
              <div class="layer-label">Presentation</div>
              <div class="modules">
                <div class="module type-module"><span class="module-label">API Controller</span></div>
                <div class="module type-module"><span class="module-label">DTO Mapper</span></div>
              </div>
            </div>
          </foreignObject>
        </g>
        <!-- LAYER 2: Business Logic -->
        <g transform="translate(40, 191)">
          <rect width="920" height="101" rx="2" fill="#f9fafb" stroke="#9ca3af" stroke-width="0.5"/>
          <foreignObject width="920" height="101">
            <div xmlns="http://www.w3.org/1999/xhtml" class="layer-card type-process">
              <div class="layer-label">Business Logic</div>
              <div class="modules">
                <div class="module type-module"><span class="module-label">Service Layer</span></div>
                <div class="module type-module"><span class="module-label">Validator</span></div>
                <div class="module type-module"><span class="module-label">Event Bus</span></div>
              </div>
            </div>
          </foreignObject>
        </g>
        <!-- LAYER 3: Data Access -->
        <g transform="translate(40, 342)">
          <rect width="920" height="101" rx="2" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="0.5"/>
          <foreignObject width="920" height="101">
            <div xmlns="http://www.w3.org/1999/xhtml" class="layer-card type-data">
              <div class="layer-label">Data Access</div>
              <div class="modules">
                <div class="module type-module"><span class="module-label">Repository</span></div>
                <div class="module has-badges type-data">
                  <span class="module-label">Cache Layer</span>
                  <span class="tech-badges"><span class="tech-badge">Redis</span></span>
                </div>
              </div>
            </div>
          </foreignObject>
        </g>
        <!-- LAYER 4: Infrastructure -->
        <g transform="translate(40, 493)">
          <rect width="920" height="101" rx="2" fill="#fffbeb" stroke="#fcd34d" stroke-width="0.5"/>
          <foreignObject width="920" height="101">
            <div xmlns="http://www.w3.org/1999/xhtml" class="layer-card type-infra">
              <div class="layer-label">Infrastructure</div>
              <div class="modules">
                <div class="module type-data"><span class="module-label">PostgreSQL</span></div>
                <div class="module type-infra"><span class="module-label">Message Queue</span></div>
              </div>
            </div>
          </foreignObject>
        </g>
        <!-- LEGEND -->
        <g transform="translate(40, 610)">
          <foreignObject width="920" height="30">
            <div xmlns="http://www.w3.org/1999/xhtml" class="legend-container">
              <div class="legend-item"><div class="legend-swatch" style="background:#fafafa;border:0.5px solid #d1d5db;"></div><span class="legend-text">Presentation</span></div>
              <div class="legend-item"><div class="legend-swatch" style="background:#f9fafb;border:0.5px solid #9ca3af;"></div><span class="legend-text">Service</span></div>
              <div class="legend-item"><div class="legend-swatch" style="background:#f5f3ff;border:0.5px solid #c4b5fd;"></div><span class="legend-text">Data</span></div>
              <div class="legend-item"><div class="legend-swatch" style="background:#fffbeb;border:0.5px solid #fcd34d;"></div><span class="legend-text">Infra</span></div>
            </div>
          </foreignObject>
        </g>
      </svg>
    </div>
    <div class="footer">Generated by gmdiagram &middot; 2026-04-13</div>
  </div>
</body>
</html>
