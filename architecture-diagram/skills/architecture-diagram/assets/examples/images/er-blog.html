<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog System</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #020617;
      color: #e2e8f0;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container { max-width: 1000px; margin: 0 auto; }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .pulse-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #22d3ee;
      box-shadow: 0 0 8px rgba(34, 211, 238, 0.6);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    h1 { font-size: 22px; font-weight: 700; color: #f1f5f9; }
    .subtitle { font-size: 13px; color: #64748b; margin-top: 4px; }
    .diagram-container {
      background: #0f172a;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 32px;
      overflow-x: auto;
    }
    .diagram-container svg {
      width: 100%;
      min-width: 700px;
      height: auto;
      display: block;
    }
    .footer {
      font-size: 11px;
      color: #475569;
      text-align: center;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.04);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="pulse-dot"></div>
      <div>
        <h1>Blog System</h1>
        <div class="subtitle">Content management database schema</div>
      </div>
    </div>

    <div class="diagram-container">
      <svg viewBox="0 0 960 500" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(51, 65, 85, 0.3)" stroke-width="0.5"/>
          </pattern>
          <marker id="er-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
          </marker>
        </defs>

        <style>
          .er-entity {
            border-collapse: collapse;
            width: 100%;
            font-family: 'JetBrains Mono', monospace;
            background: var(--entity-bg);
            border: 1.5px solid var(--entity-color);
            border-radius: 6px;
            overflow: hidden;
          }
          .er-entity .entity-header th {
            background: var(--entity-color);
            color: white;
            font-size: 12px;
            font-weight: 600;
            padding: 6px 12px;
            text-align: left;
            border: none;
          }
          .er-entity tr:nth-child(even) td {
            background: rgba(255,255,255,0.02);
          }
          .er-entity td {
            font-size: 11px;
            padding: 3px 12px;
            border-top: 0.5px solid rgba(255,255,255,0.06);
            vertical-align: middle;
            height: 22px;
          }
          .er-entity .attr-name {
            color: #e2e8f0;
            text-align: left;
            white-space: nowrap;
          }
          .er-entity .attr-name.pk {
            color: #fbbf24;
            text-decoration: underline;
            font-weight: 600;
          }
          .er-entity .attr-name.fk {
            color: #c4b5fd;
            font-style: italic;
          }
          .er-entity .attr-type {
            color: #64748b;
            font-size: 10px;
            text-align: left;
            white-space: nowrap;
          }
          .er-entity .attr-badge {
            font-size: 9px;
            text-align: right;
            white-space: nowrap;
          }
          .er-entity .pk-badge {
            display: inline-block;
            background: rgba(251,191,36,0.2);
            color: #fbbf24;
            border: 0.5px solid #fbbf24;
            border-radius: 2px;
            padding: 1px 4px;
            font-size: 7px;
            font-weight: 600;
            line-height: 1;
          }
          .er-entity .fk-badge {
            display: inline-block;
            background: rgba(167,139,250,0.2);
            color: #a78bfa;
            border: 0.5px solid #a78bfa;
            border-radius: 2px;
            padding: 1px 4px;
            font-size: 7px;
            font-weight: 600;
            line-height: 1;
          }
          .er-entity .nullable-badge {
            display: inline-block;
            background: rgba(148,163,184,0.15);
            color: #94a3b8;
            border: 0.5px solid rgba(148,163,184,0.3);
            border-radius: 2px;
            padding: 1px 4px;
            font-size: 7px;
            font-weight: 600;
            line-height: 1;
            margin-left: 2px;
          }
        </style>

        <!-- Grid background -->
        <rect width="960" height="500" fill="url(#grid)"/>

        <!-- ============ RELATIONSHIP LINES ============ -->

        <!-- User 1→N Post (authors) — horizontal Row 1 -->
        <line x1="300" y1="75" x2="400" y2="75" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#er-arrow)"/>
        <rect x="306" y="64" width="20" height="16" rx="3" fill="#0f172a" opacity="0.9"/>
        <text x="316" y="76" font-size="10" fill="#cbd5e1" font-family="JetBrains Mono, monospace" text-anchor="middle" font-weight="600">1</text>
        <rect x="372" y="64" width="20" height="16" rx="3" fill="#0f172a" opacity="0.9"/>
        <text x="382" y="76" font-size="10" fill="#cbd5e1" font-family="JetBrains Mono, monospace" text-anchor="middle" font-weight="600">N</text>
        <rect x="326" y="54" width="50" height="14" rx="3" fill="#0f172a" opacity="0.9"/>
        <text x="351" y="64" font-size="9" fill="#94a3b8" font-family="JetBrains Mono, monospace" text-anchor="middle">authors</text>

        <!-- User 1→N Comment (writes) — diagonal down-left -->
        <line x1="200" y1="142" x2="250" y2="300" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#er-arrow)"/>
        <rect x="186" y="178" width="20" height="16" rx="3" fill="#0f172a" opacity="0.9"/>
        <text x="196" y="190" font-size="10" fill="#cbd5e1" font-family="JetBrains Mono, monospace" text-anchor="middle" font-weight="600">1</text>
        <rect x="244" y="252" width="20" height="16" rx="3" fill="#0f172a" opacity="0.9"/>
        <text x="254" y="264" font-size="10" fill="#cbd5e1" font-family="JetBrains Mono, monospace" text-anchor="middle" font-weight="600">N</text>
        <rect x="208" y="206" width="42" height="14" rx="3" fill="#0f172a" opacity="0.9"/>
        <text x="229" y="216" font-size="9" fill="#94a3b8" font-family="JetBrains Mono, monospace" text-anchor="middle">writes</text>

        <!-- Post 1→N Comment (has) — diagonal down-left -->
        <line x1="450" y1="186" x2="350" y2="300" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#er-arrow)"/>
        <rect x="432" y="210" width="20" height="16" rx="3" fill="#0f172a" opacity="0.9"/>
        <text x="442" y="222" font-size="10" fill="#cbd5e1" font-family="JetBrains Mono, monospace" text-anchor="middle" font-weight="600">1</text>
        <rect x="340" y="262" width="20" height="16" rx="3" fill="#0f172a" opacity="0.9"/>
        <text x="350" y="274" font-size="10" fill="#cbd5e1" font-family="JetBrains Mono, monospace" text-anchor="middle" font-weight="600">N</text>
        <rect x="372" y="234" width="26" height="14" rx="3" fill="#0f172a" opacity="0.9"/>
        <text x="385" y="244" font-size="9" fill="#94a3b8" font-family="JetBrains Mono, monospace" text-anchor="middle">has</text>

        <!-- Post 1→N PostTag — diagonal down-right -->
        <line x1="540" y1="186" x2="590" y2="300" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#er-arrow)"/>
        <rect x="530" y="218" width="20" height="16" rx="3" fill="#0f172a" opacity="0.9"/>
        <text x="540" y="230" font-size="10" fill="#cbd5e1" font-family="JetBrains Mono, monospace" text-anchor="middle" font-weight="600">1</text>
        <rect x="580" y="264" width="20" height="16" rx="3" fill="#0f172a" opacity="0.9"/>
        <text x="590" y="276" font-size="10" fill="#cbd5e1" font-family="JetBrains Mono, monospace" text-anchor="middle" font-weight="600">N</text>

        <!-- Tag 1→N PostTag — diagonal down-left -->
        <line x1="760" y1="142" x2="690" y2="300" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#er-arrow)"/>
        <rect x="748" y="190" width="20" height="16" rx="3" fill="#0f172a" opacity="0.9"/>
        <text x="758" y="202" font-size="10" fill="#cbd5e1" font-family="JetBrains Mono, monospace" text-anchor="middle" font-weight="600">1</text>
        <rect x="680" y="254" width="20" height="16" rx="3" fill="#0f172a" opacity="0.9"/>
        <text x="690" y="266" font-size="10" fill="#cbd5e1" font-family="JetBrains Mono, monospace" text-anchor="middle" font-weight="600">N</text>

        <!-- ============ ENTITIES ============ -->

        <!-- User Entity (Row 1, x=100, y=30) — 4 attrs: height = 30 + 4*24 = 126 -->
        <g transform="translate(100, 30)">
          <foreignObject width="200" height="126">
            <table xmlns="http://www.w3.org/1999/xhtml" class="er-entity" style="--entity-bg: #0f172a; --entity-color: #a78bfa;">
              <tr class="entity-header"><th colspan="3">User</th></tr>
              <tr><td class="attr-name pk">id</td><td class="attr-type">int</td><td class="attr-badge"><span class="pk-badge">PK</span></td></tr>
              <tr><td class="attr-name">username</td><td class="attr-type">string</td><td class="attr-badge"><span class="nullable-badge">NN</span></td></tr>
              <tr><td class="attr-name">email</td><td class="attr-type">string</td><td class="attr-badge"><span class="nullable-badge">NN</span></td></tr>
              <tr><td class="attr-name">role</td><td class="attr-type">string</td><td class="attr-badge"><span class="nullable-badge">?</span></td></tr>
            </table>
          </foreignObject>
        </g>

        <!-- Post Entity (Row 1, x=400, y=30) — 5 attrs: height = 30 + 5*24 = 150 -->
        <g transform="translate(400, 30)">
          <foreignObject width="200" height="150">
            <table xmlns="http://www.w3.org/1999/xhtml" class="er-entity" style="--entity-bg: #0f172a; --entity-color: #a78bfa;">
              <tr class="entity-header"><th colspan="3">Post</th></tr>
              <tr><td class="attr-name pk">id</td><td class="attr-type">int</td><td class="attr-badge"><span class="pk-badge">PK</span></td></tr>
              <tr><td class="attr-name">title</td><td class="attr-type">string</td><td class="attr-badge"><span class="nullable-badge">NN</span></td></tr>
              <tr><td class="attr-name">body</td><td class="attr-type">text</td><td class="attr-badge"><span class="nullable-badge">?</span></td></tr>
              <tr><td class="attr-name fk">author_id</td><td class="attr-type">int</td><td class="attr-badge"><span class="fk-badge">FK</span></td></tr>
              <tr><td class="attr-name">published_at</td><td class="attr-type">timestamp</td><td class="attr-badge"><span class="nullable-badge">?</span></td></tr>
            </table>
          </foreignObject>
        </g>

        <!-- Tag Entity (Row 1, x=700, y=30) — 2 attrs: height = 30 + 2*24 = 78 -->
        <g transform="translate(700, 30)">
          <foreignObject width="200" height="78">
            <table xmlns="http://www.w3.org/1999/xhtml" class="er-entity" style="--entity-bg: #0f172a; --entity-color: #a78bfa;">
              <tr class="entity-header"><th colspan="3">Tag</th></tr>
              <tr><td class="attr-name pk">id</td><td class="attr-type">int</td><td class="attr-badge"><span class="pk-badge">PK</span></td></tr>
              <tr><td class="attr-name">name</td><td class="attr-type">string</td><td class="attr-badge"><span class="nullable-badge">NN</span></td></tr>
            </table>
          </foreignObject>
        </g>

        <!-- Comment Entity (Row 2, x=250, y=300) — 5 attrs: height = 30 + 5*24 = 150 -->
        <g transform="translate(250, 300)">
          <foreignObject width="200" height="150">
            <table xmlns="http://www.w3.org/1999/xhtml" class="er-entity" style="--entity-bg: #0f172a; --entity-color: #a78bfa;">
              <tr class="entity-header"><th colspan="3">Comment</th></tr>
              <tr><td class="attr-name pk">id</td><td class="attr-type">int</td><td class="attr-badge"><span class="pk-badge">PK</span></td></tr>
              <tr><td class="attr-name fk">post_id</td><td class="attr-type">int</td><td class="attr-badge"><span class="fk-badge">FK</span></td></tr>
              <tr><td class="attr-name fk">author_id</td><td class="attr-type">int</td><td class="attr-badge"><span class="fk-badge">FK</span></td></tr>
              <tr><td class="attr-name">content</td><td class="attr-type">text</td><td class="attr-badge"><span class="nullable-badge">?</span></td></tr>
              <tr><td class="attr-name">created_at</td><td class="attr-type">timestamp</td><td class="attr-badge"><span class="nullable-badge">?</span></td></tr>
            </table>
          </foreignObject>
        </g>

        <!-- PostTag Entity (Row 2, x=550, y=300) — 3 attrs: height = 30 + 3*24 = 102 -->
        <g transform="translate(550, 300)">
          <foreignObject width="200" height="102">
            <table xmlns="http://www.w3.org/1999/xhtml" class="er-entity" style="--entity-bg: #0f172a; --entity-color: #a78bfa;">
              <tr class="entity-header"><th colspan="3">PostTag</th></tr>
              <tr><td class="attr-name pk">id</td><td class="attr-type">int</td><td class="attr-badge"><span class="pk-badge">PK</span></td></tr>
              <tr><td class="attr-name fk">post_id</td><td class="attr-type">int</td><td class="attr-badge"><span class="fk-badge">FK</span> <span class="nullable-badge">NN</span></td></tr>
              <tr><td class="attr-name fk">tag_id</td><td class="attr-type">int</td><td class="attr-badge"><span class="fk-badge">FK</span> <span class="nullable-badge">NN</span></td></tr>
            </table>
          </foreignObject>
        </g>

      </svg>
    </div>

    <div class="footer">
      Generated by gmdiagram &middot; 2026-04-13
    </div>
  </div>
</body>
</html>
