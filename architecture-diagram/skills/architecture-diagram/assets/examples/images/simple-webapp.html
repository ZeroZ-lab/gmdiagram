<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Web Application</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #faf9f6;
      color: #1a1a2e;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container { max-width: 900px; margin: 0 auto; }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .sketch-dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: #e74c3c;
      border: 2px solid #2c3e50;
    }
    h1 { font-size: 24px; font-weight: 700; color: #2c3e50; letter-spacing: -0.5px; }
    .subtitle { font-size: 14px; color: #7f8c8d; margin-top: 2px; }
    .diagram-container {
      background: white;
      border: 2.5px solid #2c3e50;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 28px;
      box-shadow: 3px 3px 0px rgba(0,0,0,0.1);
      overflow-x: auto;
    }
    .diagram-container svg {
      width: 100%;
      min-width: 600px;
      height: auto;
      display: block;
    }
    .footer {
      font-size: 11px;
      color: #bdc3c7;
      text-align: center;
      padding-top: 14px;
      border-top: 2px dashed #ecf0f1;
    }

    /* === foreignObject component classes (hand-drawn sketch) === */
    .layer-card { width: 100%; border-radius: 8px; padding: 8px 0 12px; box-sizing: border-box; }
    .layer-label { font-size: 14px; font-weight: 600; color: #2c3e50; padding: 0 16px; font-family: 'Comic Sans MS', 'Segoe Print', 'Patrick Hand', cursive; }
    .modules { display: flex; gap: 20px; justify-content: center; padding: 8px 16px 0; flex-wrap: wrap; }
    .module { min-width: 100px; height: 50px; border-radius: 6px; display: flex; align-items: center; justify-content: center; padding: 0 16px; box-sizing: border-box; }
    .module-label { font-size: 12px; font-weight: 500; color: #2c3e50; text-align: center; white-space: nowrap; font-family: 'Comic Sans MS', 'Segoe Print', 'Patrick Hand', cursive; }
    .tech-badges { display: flex; gap: 4px; justify-content: center; padding-top: 4px; }
    .tech-badge { font-size: 8px; padding: 2px 6px; border-radius: 4px; whitespace: nowrap; background: rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.08); color: #666; font-family: 'Comic Sans MS', 'Segoe Print', 'Patrick Hand', cursive; }
    .module.has-badges { height: 58px; flex-direction: column; gap: 2px; }
    .module.has-badges .module-label { height: 20px; }

    /* Type-specific colors (hand-drawn palette: bold, pastel) */
    .type-process { background: rgba(39,174,96,0.15); border: 2px solid #27ae60; }
    .type-module { background: rgba(52,152,219,0.15); border: 2px solid #3498db; }
    .type-data { background: rgba(142,68,173,0.15); border: 2px solid #8e44ad; }
    .type-infra { background: rgba(243,156,18,0.15); border: 2px solid #f39c12; }
    .type-security { background: rgba(231,76,60,0.15); border: 2px dashed #e74c3c; }
    .type-channel { background: rgba(230,126,34,0.15); border: 2px solid #e67e22; }
    .type-external { background: rgba(149,165,166,0.15); border: 2px solid #95a5a6; }

    .legend-container { display: flex; gap: 100px; align-items: center; }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-swatch { width: 14px; height: 14px; border-radius: 3px; }
    .legend-text { font-size: 11px; color: #555; font-family: 'Comic Sans MS', 'Segoe Print', 'Patrick Hand', cursive; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="sketch-dot"></div>
      <div>
        <h1>Simple Web Application</h1>
        <div class="subtitle">Frontend + Backend + Database three-tier architecture</div>
      </div>
    </div>

    <div class="diagram-container">
      <svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="arrowhead-sketch" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#2c3e50" stroke="none"/>
          </marker>
          <marker id="arrowhead-sketch-rev" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
            <polygon points="10 0, 0 3.5, 10 7" fill="#2c3e50" stroke="none"/>
          </marker>
        </defs>

        <!-- === CONNECTIONS (drawn first, behind components) === -->

        <!-- Frontend → Backend -->
        <path d="M 400 141 L 400 191" stroke="#2c3e50" stroke-width="2.5"
              fill="none" marker-end="url(#arrowhead-sketch)"
              stroke-linecap="round"/>
        <rect x="374" y="153" width="52" height="18" rx="2" fill="white"/>
        <text x="400" y="166" font-size="10" fill="#2c3e50" font-family="Segoe UI, sans-serif" text-anchor="middle" font-weight="600">REST</text>

        <!-- Backend ↔ Database -->
        <path d="M 400 292 L 400 342" stroke="#2c3e50" stroke-width="2.5"
              fill="none" marker-start="url(#arrowhead-sketch-rev)" marker-end="url(#arrowhead-sketch)"
              stroke-linecap="round"/>
        <rect x="382" y="307" width="36" height="18" rx="2" fill="white"/>
        <text x="400" y="320" font-size="10" fill="#2c3e50" font-family="Segoe UI, sans-serif" text-anchor="middle" font-weight="600">SQL</text>

        <!-- === LAYER 1: Frontend === -->
        <g transform="translate(120, 40)">
          <rect width="560" height="101" rx="8" fill="white"/>
          <foreignObject width="560" height="101">
            <div xmlns="http://www.w3.org/1999/xhtml" class="layer-card">
              <div class="layer-label">Frontend</div>
              <div class="modules">
                <div class="module type-module"><span class="module-label">React</span></div>
                <div class="module type-module"><span class="module-label">Vue</span></div>
              </div>
            </div>
          </foreignObject>
        </g>

        <!-- === LAYER 2: Backend === -->
        <g transform="translate(120, 191)">
          <rect width="560" height="101" rx="8" fill="white"/>
          <foreignObject width="560" height="101">
            <div xmlns="http://www.w3.org/1999/xhtml" class="layer-card">
              <div class="layer-label">Backend</div>
              <div class="modules">
                <div class="module type-process"><span class="module-label">Node.js</span></div>
                <div class="module type-process"><span class="module-label">Auth Service</span></div>
              </div>
            </div>
          </foreignObject>
        </g>

        <!-- === LAYER 3: Database === -->
        <g transform="translate(120, 342)">
          <rect width="560" height="101" rx="8" fill="white"/>
          <foreignObject width="560" height="101">
            <div xmlns="http://www.w3.org/1999/xhtml" class="layer-card">
              <div class="layer-label">Database</div>
              <div class="modules">
                <div class="module type-data"><span class="module-label">PostgreSQL</span></div>
              </div>
            </div>
          </foreignObject>
        </g>

      </svg>
    </div>

    <div class="footer">
      Generated by gmdiagram &middot; 2026-04-12
    </div>
  </div>
</body>
</html>
