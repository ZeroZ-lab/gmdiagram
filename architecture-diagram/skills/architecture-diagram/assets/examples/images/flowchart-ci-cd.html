<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CI/CD Pipeline</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #020617;
      color: #e2e8f0;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container { max-width: 1100px; margin: 0 auto; }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
    .pulse-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #22d3ee;
      box-shadow: 0 0 8px rgba(34, 211, 238, 0.6);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    h1 { font-size: 22px; font-weight: 700; color: #f1f5f9; }
    .subtitle { font-size: 13px; color: #64748b; margin-top: 4px; }
    .diagram-container {
      background: #0f172a;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 32px;
      overflow-x: auto;
    }
    .diagram-container svg { width: 100%; min-width: 700px; height: auto; display: block; }
    .footer { font-size: 11px; color: #475569; text-align: center; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.04); }

    /* Flowchart node classes */
    .flow-node {
      min-width: 140px; height: 44px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      padding: 0 16px; box-sizing: border-box;
      font-size: 12px; font-weight: 500; color: white;
      font-family: 'JetBrains Mono', monospace; white-space: nowrap;
    }
    .type-start { background: rgba(34,197,94,0.25); border: 1.5px solid #22c55e; border-radius: 22px; }
    .type-end { background: rgba(239,68,68,0.25); border: 1.5px solid #ef4444; border-radius: 22px; }
    .type-process { background: rgba(8,51,68,0.4); border: 1.5px solid #22d3ee; }
    .type-subprocess { background: rgba(8,51,68,0.4); border: 1.5px solid #22d3ee; border-left: 4px double #22d3ee; border-right: 4px double #22d3ee; }
    .type-decision-text { font-size: 11px; fill: #fbbf24; font-family: 'JetBrains Mono', monospace; }

    /* Swimlane labels */
    .swimlane-label {
      font-size: 11px; fill: #64748b; font-family: 'JetBrains Mono', monospace;
      writing-mode: tb; text-anchor: middle;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="pulse-dot"></div>
      <div>
        <h1>CI/CD Pipeline</h1>
        <div class="subtitle">Automated build, test, and deployment pipeline from code commit to production</div>
      </div>
    </div>

    <div class="diagram-container">
      <svg viewBox="0 0 800 820" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
          </marker>
          <marker id="arrowhead-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#fb923c"/>
          </marker>
        </defs>

        <!-- Swimlane backgrounds -->
        <rect x="60" y="20" width="740" height="140" rx="8" fill="rgba(34,211,238,0.03)" stroke="rgba(34,211,238,0.1)" stroke-width="1"/>
        <text x="30" y="90" class="swimlane-label" transform="rotate(180, 30, 90)" text-anchor="middle" font-size="10" fill="#475569">Dev</text>

        <rect x="60" y="180" width="740" height="330" rx="8" fill="rgba(34,211,238,0.03)" stroke="rgba(34,211,238,0.1)" stroke-width="1"/>
        <text x="30" y="345" class="swimlane-label" transform="rotate(180, 30, 345)" text-anchor="middle" font-size="10" fill="#475569">CI</text>

        <rect x="60" y="530" width="740" height="280" rx="8" fill="rgba(34,211,238,0.03)" stroke="rgba(34,211,238,0.1)" stroke-width="1"/>
        <text x="30" y="670" class="swimlane-label" transform="rotate(180, 30, 670)" text-anchor="middle" font-size="10" fill="#475569">QA</text>

        <!-- CONNECTIONS (drawn first, behind nodes) -->

        <!-- Start → Code Commit -->
        <line x1="400" y1="64" x2="400" y2="100" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

        <!-- Code Commit → Build -->
        <line x1="400" y1="144" x2="400" y2="220" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

        <!-- Build → Unit Tests -->
        <line x1="400" y1="264" x2="400" y2="300" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

        <!-- Unit Tests → Tests Pass? -->
        <line x1="400" y1="344" x2="400" y2="380" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

        <!-- Tests Pass? → Integration Tests (Yes) -->
        <line x1="400" y1="440" x2="400" y2="470" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="415" y="458" font-size="10" fill="#22c55e" font-family="JetBrains Mono, monospace">Yes</text>

        <!-- Tests Pass? → Code Commit (No - loop back) -->
        <path d="M 460,410 L 620,410 L 620,122 L 470,122" fill="none" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowhead-orange)"/>
        <text x="630" y="270" font-size="10" fill="#fb923c" font-family="JetBrains Mono, monospace" transform="rotate(90, 630, 270)">No (fix)</text>

        <!-- Integration Tests → Deploy Staging -->
        <line x1="400" y1="514" x2="400" y2="570" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

        <!-- Deploy Staging → Approved? -->
        <line x1="400" y1="614" x2="400" y2="650" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

        <!-- Approved? → Deploy Production (Yes) -->
        <line x1="400" y1="710" x2="400" y2="740" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="415" y="728" font-size="10" fill="#22c55e" font-family="JetBrains Mono, monospace">Yes</text>

        <!-- Approved? → Code Commit (No - loop back) -->
        <path d="M 460,680 L 680,680 L 680,122 L 470,122" fill="none" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowhead-orange)"/>
        <text x="690" y="400" font-size="10" fill="#fb923c" font-family="JetBrains Mono, monospace" transform="rotate(90, 690, 400)">No (reject)</text>

        <!-- Deploy Production → End -->
        <line x1="400" y1="784" x2="400" y2="800" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

        <!-- NODES -->

        <!-- Start -->
        <g transform="translate(330, 40)">
          <foreignObject width="140" height="44">
            <div xmlns="http://www.w3.org/1999/xhtml" class="flow-node type-start">Start</div>
          </foreignObject>
        </g>

        <!-- Code Commit -->
        <g transform="translate(330, 100)">
          <foreignObject width="140" height="44">
            <div xmlns="http://www.w3.org/1999/xhtml" class="flow-node type-process">Code Commit</div>
          </foreignObject>
        </g>

        <!-- Build -->
        <g transform="translate(330, 220)">
          <foreignObject width="140" height="44">
            <div xmlns="http://www.w3.org/1999/xhtml" class="flow-node type-subprocess">Build</div>
          </foreignObject>
        </g>

        <!-- Unit Tests -->
        <g transform="translate(330, 300)">
          <foreignObject width="140" height="44">
            <div xmlns="http://www.w3.org/1999/xhtml" class="flow-node type-process">Unit Tests</div>
          </foreignObject>
        </g>

        <!-- Tests Pass? (Diamond) -->
        <g transform="translate(400, 410)">
          <polygon points="0,-30 60,0 0,30 -60,0" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
          <text x="0" y="0" class="type-decision-text" text-anchor="middle" dominant-baseline="central">Tests Pass?</text>
        </g>

        <!-- Integration Tests -->
        <g transform="translate(330, 470)">
          <foreignObject width="140" height="44">
            <div xmlns="http://www.w3.org/1999/xhtml" class="flow-node type-subprocess">Integration Tests</div>
          </foreignObject>
        </g>

        <!-- Deploy Staging -->
        <g transform="translate(330, 570)">
          <foreignObject width="140" height="44">
            <div xmlns="http://www.w3.org/1999/xhtml" class="flow-node type-process">Deploy Staging</div>
          </foreignObject>
        </g>

        <!-- Approved? (Diamond) -->
        <g transform="translate(400, 680)">
          <polygon points="0,-30 60,0 0,30 -60,0" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
          <text x="0" y="0" class="type-decision-text" text-anchor="middle" dominant-baseline="central">Approved?</text>
        </g>

        <!-- Deploy Production -->
        <g transform="translate(330, 740)">
          <foreignObject width="140" height="44">
            <div xmlns="http://www.w3.org/1999/xhtml" class="flow-node type-process">Deploy Production</div>
          </foreignObject>
        </g>

        <!-- End -->
        <g transform="translate(330, 800)">
          <foreignObject width="140" height="24">
            <div xmlns="http://www.w3.org/1999/xhtml" class="flow-node type-end" style="height:24px;font-size:11px;">End</div>
          </foreignObject>
        </g>

      </svg>
    </div>

    <div class="footer">
      Generated by gmdiagram &middot; 2026-04-13
    </div>
  </div>
</body>
</html>
