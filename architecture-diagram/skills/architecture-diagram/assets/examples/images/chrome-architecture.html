<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chrome Multi-Process Architecture</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #020617;
      color: #e2e8f0;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container { max-width: 1100px; margin: 0 auto; }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .pulse-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #22d3ee;
      box-shadow: 0 0 8px rgba(34, 211, 238, 0.6);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    h1 { font-size: 22px; font-weight: 700; color: #f1f5f9; }
    .subtitle { font-size: 13px; color: #64748b; margin-top: 4px; }
    .diagram-container {
      background: #0f172a;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 32px;
      overflow-x: auto;
    }
    .diagram-container svg {
      width: 100%;
      min-width: 700px;
      height: auto;
      display: block;
    }
    .footer {
      font-size: 11px;
      color: #475569;
      text-align: center;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.04);
    }
    /* === foreignObject component classes (dark-professional) === */
    .layer-card { width: 100%; border-radius: 8px; padding: 8px 0 12px; box-sizing: border-box; }
    .layer-label { font-size: 14px; font-weight: 600; color: #f1f5f9; padding: 0 16px; font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace; }
    .modules { display: flex; gap: 20px; justify-content: center; padding: 8px 16px 0; flex-wrap: wrap; }
    .module { min-width: 100px; height: 50px; border-radius: 6px; display: flex; align-items: center; justify-content: center; padding: 0 16px; box-sizing: border-box; }
    .module-label { font-size: 12px; font-weight: 500; color: white; text-align: center; white-space: nowrap; font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace; }
    .tech-badges { display: flex; gap: 4px; justify-content: center; padding-top: 4px; }
    .tech-badge { font-size: 8px; padding: 2px 6px; border-radius: 4px; white-space: nowrap; background: rgba(255,255,255,0.08); border: 0.5px solid rgba(255,255,255,0.15); color: #94a3b8; font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace; }

    /* Module with badge — taller to fit badge row */
    .module.has-badges { height: 58px; flex-direction: column; gap: 2px; }
    .module.has-badges .module-label { height: 20px; }

    /* Type-specific colors */
    .type-process { background: rgba(8,51,68,0.4); border: 1.5px solid #22d3ee; }
    .type-module { background: rgba(6,78,59,0.4); border: 1.5px solid #34d399; }
    .type-data { background: rgba(76,29,149,0.4); border: 1.5px solid #a78bfa; }
    .type-infra { background: rgba(120,53,15,0.3); border: 1.5px solid #fbbf24; }
    .type-security { background: rgba(136,19,55,0.4); border: 1.5px solid #fb7185; border-style: dashed; }
    .type-channel { background: rgba(251,146,60,0.3); border: 1.5px solid #fb923c; }
    .type-external { background: rgba(30,41,59,0.5); border: 1.5px solid #94a3b8; }

    /* Legend */
    .legend-container { display: flex; gap: 100px; align-items: center; }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-swatch { width: 14px; height: 14px; border-radius: 3px; }
    .legend-text { font-size: 11px; color: #cbd5e1; font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="pulse-dot"></div>
      <div>
        <h1>Chrome Multi-Process Architecture</h1>
        <div class="subtitle">Browser Process coordinates multiple subprocesses via IPC channels</div>
      </div>
    </div>

    <div class="diagram-container">
      <svg viewBox="0 0 1000 640" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(51, 65, 85, 0.3)" stroke-width="0.5"/>
          </pattern>
          <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
          </marker>
          <marker id="arrowhead-rev" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
            <polygon points="8 0, 0 3, 8 6" fill="#64748b"/>
          </marker>
          <marker id="arrowhead-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#fb923c"/>
          </marker>
          <marker id="arrowhead-orange-rev" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
            <polygon points="8 0, 0 3, 8 6" fill="#fb923c"/>
          </marker>
        </defs>

        <rect width="1000" height="640" fill="url(#grid)"/>

        <!-- CONNECTIONS -->
        <line x1="500" y1="141" x2="500" y2="191" stroke="#fb923c" stroke-width="1.5" marker-start="url(#arrowhead-orange-rev)" marker-end="url(#arrowhead-orange)"/>
        <g transform="translate(500, 166)">
          <rect x="-18" y="-9" width="36" height="18" rx="3" fill="#020617" opacity="0.9"/>
          <text x="0" y="0" font-size="10" fill="#fb923c" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central">IPC</text>
        </g>

        <path d="M 60,141 L 20,141 L 20,357 L 60,357" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowhead)"/>
        <g transform="translate(30, 249)">
          <rect x="-50" y="-9" width="100" height="18" rx="3" fill="#020617" opacity="0.9"/>
          <text x="0" y="0" font-size="9" fill="#94a3b8" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central">Command Buffer</text>
        </g>

        <line x1="500" y1="307" x2="500" y2="357" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <g transform="translate(500, 332)">
          <rect x="-48" y="-9" width="96" height="18" rx="3" fill="#020617" opacity="0.9"/>
          <text x="0" y="0" font-size="9" fill="#94a3b8" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central">GPU Commands</text>
        </g>

        <path d="M 940,141 L 980,141 L 980,508 L 940,508" fill="none" stroke="#fb923c" stroke-width="1.5" marker-start="url(#arrowhead-orange-rev)" marker-end="url(#arrowhead-orange)"/>
        <g transform="translate(970, 324)">
          <rect x="-18" y="-9" width="36" height="18" rx="3" fill="#020617" opacity="0.9"/>
          <text x="0" y="0" font-size="10" fill="#fb923c" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central">IPC</text>
        </g>

        <!-- LAYER 1: Browser Process -->
        <g transform="translate(40, 40)">
          <rect width="920" height="101" rx="8" fill="#0f172a"/>
          <foreignObject width="920" height="101">
            <div xmlns="http://www.w3.org/1999/xhtml" class="layer-card type-process">
              <div class="layer-label">Browser Process</div>
              <div class="modules">
                <div class="module type-module"><span class="module-label">UI / Tabs</span></div>
                <div class="module type-module"><span class="module-label">Network</span></div>
                <div class="module type-data"><span class="module-label">Storage</span></div>
              </div>
            </div>
          </foreignObject>
        </g>

        <!-- LAYER 2: Renderer Process -->
        <g transform="translate(40, 191)">
          <rect width="920" height="116" rx="8" fill="#0f172a"/>
          <foreignObject width="920" height="116">
            <div xmlns="http://www.w3.org/1999/xhtml" class="layer-card type-process">
              <div class="layer-label">Renderer Process</div>
              <div class="modules">
                <div class="module has-badges type-module">
                  <span class="module-label">Blink</span>
                  <span class="tech-badges"><span class="tech-badge">Render Engine</span></span>
                </div>
                <div class="module has-badges type-module">
                  <span class="module-label">V8 Engine</span>
                  <span class="tech-badges"><span class="tech-badge">JavaScript</span></span>
                </div>
                <div class="module type-module"><span class="module-label">DOM / CSS</span></div>
              </div>
            </div>
          </foreignObject>
        </g>

        <!-- LAYER 3: GPU Process -->
        <g transform="translate(40, 357)">
          <rect width="920" height="101" rx="8" fill="#0f172a"/>
          <foreignObject width="920" height="101">
            <div xmlns="http://www.w3.org/1999/xhtml" class="layer-card type-infra">
              <div class="layer-label">GPU Process</div>
              <div class="modules">
                <div class="module type-infra"><span class="module-label">Graphics</span></div>
                <div class="module type-infra"><span class="module-label">Compositor</span></div>
              </div>
            </div>
          </foreignObject>
        </g>

        <!-- LAYER 4: Utility Process -->
        <g transform="translate(40, 508)">
          <rect width="920" height="101" rx="8" fill="#0f172a"/>
          <foreignObject width="920" height="101">
            <div xmlns="http://www.w3.org/1999/xhtml" class="layer-card type-infra">
              <div class="layer-label">Utility Process</div>
              <div class="modules">
                <div class="module type-infra"><span class="module-label">Audio</span></div>
                <div class="module type-infra"><span class="module-label">Video Decode</span></div>
                <div class="module type-infra"><span class="module-label">Network Service</span></div>
              </div>
            </div>
          </foreignObject>
        </g>

      </svg>
    </div>

    <div class="footer">
      Generated by gmdiagram &middot; 2026-04-12
    </div>
  </div>
</body>
</html>
