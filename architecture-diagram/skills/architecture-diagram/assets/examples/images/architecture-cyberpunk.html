<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hacker Toolkit</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #11111b; color: #cdd6f4; font-family: 'JetBrains Mono', monospace; min-height: 100vh; padding: 40px 20px; }
    .container { max-width: 1100px; margin: 0 auto; }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
    .pulse-dot { width: 10px; height: 10px; border-radius: 50%; background: #89b4fa; box-shadow: 0 0 8px rgba(137,180,250,0.6); animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    h1 { font-size: 22px; font-weight: 700; color: #cdd6f4; }
    .subtitle { font-size: 13px; color: #6c7086; margin-top: 4px; }
    .diagram-container { background: #181825; border: 1px solid #313244; border-radius: 12px; padding: 24px; margin-bottom: 32px; overflow-x: auto; }
    .diagram-container svg { width: 100%; min-width: 700px; height: auto; display: block; }
    .footer { font-size: 11px; color: #585b70; text-align: center; padding-top: 16px; border-top: 1px solid #313244; }
    .layer-card { width: 100%; border-radius: 8px; padding: 8px 0 12px; box-sizing: border-box; }
    .layer-label { font-size: 14px; font-weight: 600; color: #cdd6f4; padding: 0 16px; font-family: 'JetBrains Mono', monospace; }
    .modules { display: flex; gap: 20px; justify-content: center; padding: 8px 16px 0; flex-wrap: wrap; }
    .module { min-width: 100px; height: 50px; border-radius: 6px; display: flex; align-items: center; justify-content: center; padding: 0 16px; box-sizing: border-box; }
    .module-label { font-size: 12px; font-weight: 500; color: #cdd6f4; text-align: center; white-space: nowrap; font-family: 'JetBrains Mono', monospace; }
    .tech-badges { display: flex; gap: 4px; justify-content: center; padding-top: 4px; }
    .tech-badge { font-size: 8px; padding: 2px 6px; border-radius: 4px; white-space: nowrap; background: rgba(137,180,250,0.1); border: 0.5px solid rgba(137,180,250,0.2); color: #89b4fa; font-family: 'JetBrains Mono', monospace; }
    .module.has-badges { height: 58px; flex-direction: column; gap: 2px; }
    .module.has-badges .module-label { height: 20px; }
    .type-process { background: rgba(137,180,250,0.1); border: 1.5px solid #89b4fa; }
    .type-module { background: rgba(166,227,161,0.1); border: 1.5px solid #a6e3a1; }
    .type-data { background: rgba(203,166,247,0.1); border: 1.5px solid #cba6f7; }
    .type-infra { background: rgba(249,226,175,0.1); border: 1.5px solid #f9e2af; }
    .type-security { background: rgba(243,139,168,0.1); border: 1.5px solid #f38ba8; border-style: dashed; }
    .type-channel { background: rgba(250,179,135,0.1); border: 1.5px solid #fab387; }
    .type-external { background: rgba(108,112,134,0.15); border: 1.5px solid #6c7086; }
    .legend-container { display: flex; gap: 80px; align-items: center; }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-swatch { width: 14px; height: 14px; border-radius: 3px; }
    .legend-text { font-size: 11px; color: #a6adc8; font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="pulse-dot"></div>
      <div>
        <h1>Hacker Toolkit</h1>
        <div class="subtitle">Security testing infrastructure for authorized penetration testing</div>
      </div>
    </div>
    <div class="diagram-container">
      <svg viewBox="0 0 1000 720" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#6c7086"/></marker>
          <marker id="arrowhead-pink" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#f38ba8"/></marker>
        </defs>
        <!-- CONNECTIONS -->
        <line x1="500" y1="141" x2="500" y2="191" stroke="#6c7086" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="520" y="170" font-size="10" fill="#89b4fa" font-family="JetBrains Mono, monospace">Findings</text>
        <line x1="500" y1="307" x2="500" y2="357" stroke="#f38ba8" stroke-width="1.5" marker-end="url(#arrowhead-pink)"/>
        <text x="520" y="336" font-size="10" fill="#f38ba8" font-family="JetBrains Mono, monospace">Access</text>
        <line x1="500" y1="473" x2="500" y2="523" stroke="#6c7086" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="520" y="502" font-size="10" fill="#89b4fa" font-family="JetBrains Mono, monospace">Evidence</text>
        <!-- LAYER 1: Reconnaissance -->
        <g transform="translate(40, 40)">
          <rect width="920" height="101" rx="8" fill="#181825"/>
          <foreignObject width="920" height="101">
            <div xmlns="http://www.w3.org/1999/xhtml" class="layer-card type-channel">
              <div class="layer-label">Reconnaissance</div>
              <div class="modules">
                <div class="module has-badges type-module">
                  <span class="module-label">Port Scanner</span>
                  <span class="tech-badges"><span class="tech-badge">Nmap</span></span>
                </div>
                <div class="module type-module"><span class="module-label">Web Crawler</span></div>
                <div class="module type-module"><span class="module-label">DNS Enumerator</span></div>
              </div>
            </div>
          </foreignObject>
        </g>
        <!-- LAYER 2: Exploitation Engine -->
        <g transform="translate(40, 191)">
          <rect width="920" height="116" rx="8" fill="#181825"/>
          <foreignObject width="920" height="116">
            <div xmlns="http://www.w3.org/1999/xhtml" class="layer-card type-process">
              <div class="layer-label">Exploitation Engine</div>
              <div class="modules">
                <div class="module has-badges type-data">
                  <span class="module-label">Vulnerability DB</span>
                  <span class="tech-badges"><span class="tech-badge">CVE</span></span>
                </div>
                <div class="module type-module"><span class="module-label">Payload Generator</span></div>
                <div class="module type-module"><span class="module-label">Exploit Runner</span></div>
              </div>
            </div>
          </foreignObject>
        </g>
        <!-- LAYER 3: Post-Exploitation -->
        <g transform="translate(40, 357)">
          <rect width="920" height="116" rx="8" fill="#181825"/>
          <foreignObject width="920" height="116">
            <div xmlns="http://www.w3.org/1999/xhtml" class="layer-card type-security">
              <div class="layer-label">Post-Exploitation</div>
              <div class="modules">
                <div class="module type-module"><span class="module-label">Privilege Escalation</span></div>
                <div class="module type-module"><span class="module-label">Lateral Movement</span></div>
                <div class="module type-data"><span class="module-label">Data Collection</span></div>
              </div>
            </div>
          </foreignObject>
        </g>
        <!-- LAYER 4: Reporting -->
        <g transform="translate(40, 523)">
          <rect width="920" height="101" rx="8" fill="#181825"/>
          <foreignObject width="920" height="101">
            <div xmlns="http://www.w3.org/1999/xhtml" class="layer-card type-infra">
              <div class="layer-label">Reporting</div>
              <div class="modules">
                <div class="module type-module"><span class="module-label">Log Collector</span></div>
                <div class="module type-module"><span class="module-label">Report Generator</span></div>
              </div>
            </div>
          </foreignObject>
        </g>
        <!-- LEGEND -->
        <g transform="translate(40, 650)">
          <foreignObject width="920" height="30">
            <div xmlns="http://www.w3.org/1999/xhtml" class="legend-container">
              <div class="legend-item"><div class="legend-swatch" style="background:rgba(250,179,135,0.3);border:1.5px solid #fab387;"></div><span class="legend-text">Recon</span></div>
              <div class="legend-item"><div class="legend-swatch" style="background:rgba(137,180,250,0.2);border:1.5px solid #89b4fa;"></div><span class="legend-text">Engine</span></div>
              <div class="legend-item"><div class="legend-swatch" style="background:rgba(243,139,168,0.15);border:1.5px dashed #f38ba8;"></div><span class="legend-text">Post-Exploit</span></div>
              <div class="legend-item"><div class="legend-swatch" style="background:rgba(249,226,175,0.15);border:1.5px solid #f9e2af;"></div><span class="legend-text">Report</span></div>
            </div>
          </foreignObject>
        </g>
      </svg>
    </div>
    <div class="footer">Generated by gmdiagram &middot; 2026-04-13</div>
  </div>
</body>
</html>
