<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaaS 产品迭代开发进度</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #020617;
      color: #e2e8f0;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container { max-width: 1000px; margin: 0 auto; }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .pulse-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #22d3ee;
      box-shadow: 0 0 8px rgba(34, 211, 238, 0.6);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    h1 { font-size: 22px; font-weight: 700; color: #f1f5f9; }
    .subtitle { font-size: 13px; color: #64748b; margin-top: 4px; }
    .diagram-container {
      background: #0f172a;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 32px;
      overflow-x: auto;
    }
    .diagram-container svg {
      width: 100%;
      min-width: 700px;
      height: auto;
      display: block;
    }
    .footer {
      font-size: 11px;
      color: #475569;
      text-align: center;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.04);
    }

    /* Gantt chart component styles */
    .gantt-grid-bg { fill: rgba(255,255,255,0.02); }
    .gantt-header-bg { fill: #0f172a; }
    .gantt-row-even { fill: rgba(255,255,255,0.02); }
    .gantt-row-odd { fill: transparent; }
    .gantt-row-line { stroke: rgba(255,255,255,0.04); stroke-width: 0.5; }
    .gantt-grid-line { stroke: rgba(255,255,255,0.06); stroke-width: 0.5; }
    .gantt-week-line { stroke: rgba(255,255,255,0.1); stroke-width: 1; }
    .gantt-axis-text { fill: #94a3b8; font-size: 11px; font-family: 'JetBrains Mono', monospace; text-anchor: middle; }
    .gantt-task-label { fill: #e2e8f0; font-size: 12px; font-family: 'JetBrains Mono', monospace; }
    .gantt-group-label { fill: #f1f5f9; font-size: 13px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
    .gantt-bar { border-radius: 4px; display: flex; align-items: center; padding: 0 8px; box-sizing: border-box; }
    .gantt-bar-label { font-size: 10px; color: white; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: 'JetBrains Mono', monospace; }
    .gantt-milestone-label { fill: #fbbf24; font-size: 10px; font-family: 'JetBrains Mono', monospace; text-anchor: middle; }
    .gantt-dependency { fill: none; stroke: #64748b; stroke-width: 1.5; marker-end: url(#arrowhead); }
    .gantt-progress-overlay { fill: rgba(255,255,255,0.15); }

    /* Task bar colors by group */
    .bar-planning { background: rgba(34, 211, 238, 0.3); border: 1.5px solid #22d3ee; }
    .bar-dev { background: rgba(52, 211, 153, 0.3); border: 1.5px solid #34d399; }
    .bar-integration { background: rgba(167, 139, 250, 0.3); border: 1.5px solid #a78bfa; }
    .bar-testing { background: rgba(251, 146, 60, 0.3); border: 1.5px solid #fb923c; }
    .bar-release { background: rgba(251, 191, 36, 0.3); border: 1.5px solid #fbbf24; }

    /* Legend */
    .legend-container { display: flex; gap: 24px; align-items: center; justify-content: center; margin-top: 16px; }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-swatch { width: 16px; height: 16px; border-radius: 3px; }
    .legend-text { font-size: 11px; color: #cbd5e1; font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="pulse-dot"></div>
      <div>
        <h1>SaaS 产品迭代开发进度</h1>
        <div class="subtitle">8周迭代计划 - 从需求到正式发布</div>
      </div>
    </div>

    <div class="diagram-container">
      <svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
          </marker>
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(51, 65, 85, 0.2)" stroke-width="0.5"/>
          </pattern>
        </defs>

        <!-- Background -->
        <rect width="900" height="520" fill="url(#grid)"/>

        <!-- Title Area -->
        <text x="450" y="25" font-size="16" font-weight="600" fill="#f1f5f9" font-family="JetBrains Mono, monospace" text-anchor="middle">项目甘特图</text>
        <text x="450" y="42" font-size="11" fill="#64748b" font-family="JetBrains Mono, monospace" text-anchor="middle">8周完整开发周期</text>

        <!-- Layout Constants -->
        <!-- LABEL_WIDTH = 140, UNIT_W = 80 (for 8 weeks), ROW_H = 36, BAR_H = 24 -->
        <!-- Chart starts at x=140, each week = 80px -->
        <!-- Header area: y=60 to y=90 -->
        <!-- Task area starts at y=100 -->

        <!-- Time Axis Header -->
        <rect x="140" y="60" width="640" height="30" fill="#0f172a" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
        <text x="100" y="80" font-size="11" fill="#94a3b8" font-family="JetBrains Mono, monospace" text-anchor="middle" font-weight="600">任务</text>

        <!-- Week labels -->
        <text x="180" y="80" class="gantt-axis-text">Week 1</text>
        <text x="260" y="80" class="gantt-axis-text">Week 2</text>
        <text x="340" y="80" class="gantt-axis-text">Week 3</text>
        <text x="420" y="80" class="gantt-axis-text">Week 4</text>
        <text x="500" y="80" class="gantt-axis-text">Week 5</text>
        <text x="580" y="80" class="gantt-axis-text">Week 6</text>
        <text x="660" y="80" class="gantt-axis-text">Week 7</text>
        <text x="740" y="80" class="gantt-axis-text">Week 8</text>

        <!-- Vertical grid lines (week separators) -->
        <line x1="140" y1="90" x2="140" y2="460" class="gantt-week-line"/>
        <line x1="220" y1="90" x2="220" y2="460" class="gantt-grid-line"/>
        <line x1="300" y1="90" x2="300" y2="460" class="gantt-grid-line"/>
        <line x1="380" y1="90" x2="380" y2="460" class="gantt-grid-line"/>
        <line x1="460" y1="90" x2="460" y2="460" class="gantt-grid-line"/>
        <line x1="540" y1="90" x2="540" y2="460" class="gantt-grid-line"/>
        <line x1="620" y1="90" x2="620" y2="460" class="gantt-grid-line"/>
        <line x1="700" y1="90" x2="700" y2="460" class="gantt-grid-line"/>
        <line x1="780" y1="90" x2="780" y2="460" class="gantt-week-line"/>

        <!-- ========== 规划阶段 Group ========== -->
        <rect x="0" y="100" width="140" height="36" fill="rgba(34,211,238,0.08)"/>
        <text x="70" y="122" class="gantt-group-label" text-anchor="middle">规划阶段</text>

        <!-- 需求分析 (Week 1-2, 100% complete) -->
        <rect x="0" y="136" width="900" height="36" class="gantt-row-even" opacity="0.5"/>
        <text x="10" y="158" class="gantt-task-label">需求分析</text>
        <text x="120" y="158" font-size="9" fill="#64748b" font-family="JetBrains Mono, monospace" text-anchor="end">PM</text>
        <!-- Bar: W1-W2 (140-300), duration 2 weeks -->
        <g transform="translate(140, 142)">
          <foreignObject width="160" height="24">
            <div xmlns="http://www.w3.org/1999/xhtml" class="gantt-bar bar-planning" style="width: 160px; height: 24px;">
              <span class="gantt-bar-label">需求分析</span>
            </div>
          </foreignObject>
        </g>
        <!-- Progress overlay (100%) -->
        <rect x="140" y="142" width="160" height="24" rx="4" class="gantt-progress-overlay"/>

        <!-- 原型设计 (Week 2-3, 80% complete) -->
        <rect x="0" y="172" width="900" height="36" class="gantt-row-odd"/>
        <line x1="0" y1="172" x2="900" y2="172" class="gantt-row-line"/>
        <text x="10" y="194" class="gantt-task-label">原型设计</text>
        <text x="120" y="194" font-size="9" fill="#64748b" font-family="JetBrains Mono, monospace" text-anchor="end">设计</text>
        <!-- Bar: W2-W3 (220-380), duration 2 weeks -->
        <g transform="translate(220, 178)">
          <foreignObject width="160" height="24">
            <div xmlns="http://www.w3.org/1999/xhtml" class="gantt-bar bar-planning" style="width: 160px; height: 24px;">
              <span class="gantt-bar-label">原型设计</span>
            </div>
          </foreignObject>
        </g>
        <!-- Progress overlay (80%) -->
        <rect x="220" y="178" width="128" height="24" rx="4" class="gantt-progress-overlay"/>
        <!-- Dependency: 需求分析 -> 原型设计 -->
        <path d="M 300 154 L 300 166 L 220 166 L 220 178" class="gantt-dependency" fill="none"/>

        <!-- ========== 开发阶段 Group ========== -->
        <rect x="0" y="208" width="140" height="36" fill="rgba(52,211,153,0.08)"/>
        <line x1="0" y1="208" x2="900" y2="208" class="gantt-row-line"/>
        <text x="70" y="230" class="gantt-group-label" text-anchor="middle">开发阶段</text>

        <!-- 前端开发 (Week 3-5, 45% complete) -->
        <rect x="0" y="244" width="900" height="36" class="gantt-row-even" opacity="0.5"/>
        <line x1="0" y1="244" x2="900" y2="244" class="gantt-row-line"/>
        <text x="10" y="266" class="gantt-task-label">前端开发</text>
        <text x="120" y="266" font-size="9" fill="#64748b" font-family="JetBrains Mono, monospace" text-anchor="end">前端</text>
        <!-- Bar: W3-W5 (300-540), duration 3 weeks -->
        <g transform="translate(300, 250)">
          <foreignObject width="240" height="24">
            <div xmlns="http://www.w3.org/1999/xhtml" class="gantt-bar bar-dev" style="width: 240px; height: 24px;">
              <span class="gantt-bar-label">前端开发</span>
            </div>
          </foreignObject>
        </g>
        <!-- Progress overlay (45%) -->
        <rect x="300" y="250" width="108" height="24" rx="4" class="gantt-progress-overlay"/>
        <!-- Dependency: 原型设计 -> 前端开发 -->
        <path d="M 380 190 L 380 220 L 300 220 L 300 250" class="gantt-dependency" fill="none"/>

        <!-- 后端开发 (Week 3-6, 40% complete) -->
        <rect x="0" y="280" width="900" height="36" class="gantt-row-odd"/>
        <line x1="0" y1="280" x2="900" y2="280" class="gantt-row-line"/>
        <text x="10" y="302" class="gantt-task-label">后端开发</text>
        <text x="120" y="302" font-size="9" fill="#64748b" font-family="JetBrains Mono, monospace" text-anchor="end">后端</text>
        <!-- Bar: W3-W6 (300-620), duration 4 weeks -->
        <g transform="translate(300, 286)">
          <foreignObject width="320" height="24">
            <div xmlns="http://www.w3.org/1999/xhtml" class="gantt-bar bar-dev" style="width: 320px; height: 24px;">
              <span class="gantt-bar-label">后端开发</span>
            </div>
          </foreignObject>
        </g>
        <!-- Progress overlay (40%) -->
        <rect x="300" y="286" width="128" height="24" rx="4" class="gantt-progress-overlay"/>
        <!-- Dependency: 原型设计 -> 后端开发 -->
        <path d="M 380 190 L 380 286 L 300 286" class="gantt-dependency" fill="none"/>

        <!-- ========== 联调阶段 Group ========== -->
        <rect x="0" y="316" width="140" height="36" fill="rgba(167,139,250,0.08)"/>
        <line x1="0" y1="316" x2="900" y2="316" class="gantt-row-line"/>
        <text x="70" y="338" class="gantt-group-label" text-anchor="middle">联调阶段</text>

        <!-- 接口联调 (Week 5-6, 0%) -->
        <rect x="0" y="352" width="900" height="36" class="gantt-row-even" opacity="0.5"/>
        <line x1="0" y1="352" x2="900" y2="352" class="gantt-row-line"/>
        <text x="10" y="374" class="gantt-task-label">接口联调</text>
        <text x="120" y="374" font-size="9" fill="#64748b" font-family="JetBrains Mono, monospace" text-anchor="end">全栈</text>
        <!-- Bar: W5-W6 (460-620), duration 2 weeks -->
        <g transform="translate(460, 358)">
          <foreignObject width="160" height="24">
            <div xmlns="http://www.w3.org/1999/xhtml" class="gantt-bar bar-integration" style="width: 160px; height: 24px;">
              <span class="gantt-bar-label">接口联调</span>
            </div>
          </foreignObject>
        </g>
        <!-- Dependencies: 前端开发 -> 接口联调, 后端开发 -> 接口联调 -->
        <path d="M 540 262 L 540 310 L 460 310 L 460 358" class="gantt-dependency" fill="none"/>
        <path d="M 620 298 L 620 330 L 460 330 L 460 358" class="gantt-dependency" fill="none"/>

        <!-- ========== 测试阶段 Group ========== -->
        <rect x="0" y="388" width="140" height="36" fill="rgba(251,146,60,0.08)"/>
        <line x1="0" y1="388" x2="900" y2="388" class="gantt-row-line"/>
        <text x="70" y="410" class="gantt-group-label" text-anchor="middle">测试阶段</text>

        <!-- 测试 (Week 6-7, 0%) -->
        <rect x="0" y="424" width="900" height="36" class="gantt-row-odd"/>
        <line x1="0" y1="424" x2="900" y2="424" class="gantt-row-line"/>
        <text x="10" y="446" class="gantt-task-label">测试</text>
        <text x="120" y="446" font-size="9" fill="#64748b" font-family="JetBrains Mono, monospace" text-anchor="end">QA</text>
        <!-- Bar: W6-W7 (540-700), duration 2 weeks -->
        <g transform="translate(540, 430)">
          <foreignObject width="160" height="24">
            <div xmlns="http://www.w3.org/1999/xhtml" class="gantt-bar bar-testing" style="width: 160px; height: 24px;">
              <span class="gantt-bar-label">测试</span>
            </div>
          </foreignObject>
        </g>
        <!-- Dependency: 接口联调 -> 测试 -->
        <path d="M 620 370 L 620 400 L 540 400 L 540 430" class="gantt-dependency" fill="none"/>

        <!-- ========== 发布阶段 Group ========== -->
        <rect x="0" y="460" width="140" height="40" fill="rgba(251,191,36,0.08)"/>
        <line x1="0" y1="460" x2="900" y2="460" class="gantt-row-line"/>
        <text x="70" y="482" class="gantt-group-label" text-anchor="middle">发布阶段</text>

        <!-- Beta 发布 (Week 7, milestone) -->
        <rect x="0" y="500" width="900" height="36" class="gantt-row-even" opacity="0.5"/>
        <line x1="0" y1="500" x2="900" y2="500" class="gantt-row-line"/>
        <text x="10" y="522" class="gantt-task-label">Beta 发布</text>
        <text x="120" y="522" font-size="9" fill="#64748b" font-family="JetBrains Mono, monospace" text-anchor="end">产品</text>
        <!-- Milestone diamond at W7 (660) -->
        <g transform="translate(660, 512)">
          <polygon points="0,-10 10,0 0,10 -10,0" fill="#fbbf24" stroke="#f59e0b" stroke-width="1.5"/>
        </g>
        <text x="660" y="535" class="gantt-milestone-label">Beta 发布</text>
        <!-- Dependency: 测试 -> Beta 发布 -->
        <path d="M 700 442 L 700 476 L 660 476 L 660 502" class="gantt-dependency" fill="none"/>

        <!-- 线上灰度 (Week 7-8, 0%) -->
        <rect x="0" y="536" width="900" height="36" class="gantt-row-odd"/>
        <line x1="0" y1="536" x2="900" y2="536" class="gantt-row-line"/>
        <text x="10" y="558" class="gantt-task-label">线上灰度</text>
        <text x="120" y="558" font-size="9" fill="#64748b" font-family="JetBrains Mono, monospace" text-anchor="end">运维</text>
        <!-- Bar: W7-W8 (620-780), duration 2 weeks -->
        <g transform="translate(620, 542)">
          <foreignObject width="160" height="24">
            <div xmlns="http://www.w3.org/1999/xhtml" class="gantt-bar bar-release" style="width: 160px; height: 24px;">
              <span class="gantt-bar-label">线上灰度</span>
            </div>
          </foreignObject>
        </g>
        <!-- Dependency: Beta 发布 -> 线上灰度 -->
        <path d="M 660 512 L 660 530 L 620 530 L 620 542" class="gantt-dependency" fill="none"/>

        <!-- 正式发布 (Week 8, milestone) -->
        <rect x="0" y="572" width="900" height="36" class="gantt-row-even" opacity="0.5"/>
        <line x1="0" y1="572" x2="900" y2="572" class="gantt-row-line"/>
        <text x="10" y="594" class="gantt-task-label">正式发布</text>
        <text x="120" y="594" font-size="9" fill="#64748b" font-family="JetBrains Mono, monospace" text-anchor="end">产品</text>
        <!-- Milestone diamond at W8 (740) -->
        <g transform="translate(740, 584)">
          <polygon points="0,-12 12,0 0,12 -12,0" fill="#22d3ee" stroke="#06b6d4" stroke-width="2"/>
        </g>
        <text x="740" y="610" class="gantt-milestone-label" style="fill: #22d3ee; font-weight: 600;">正式发布</text>
        <!-- Dependency: 线上灰度 -> 正式发布 -->
        <path d="M 780 554 L 780 570 L 740 570 L 740 572" class="gantt-dependency" fill="none"/>

        <!-- Legend -->
        <g transform="translate(160, 635)">
          <text x="0" y="0" font-size="11" font-weight="600" fill="#cbd5e1" font-family="JetBrains Mono, monospace">图例</text>

          <rect x="50" y="-10" width="20" height="12" rx="2" fill="rgba(34,211,238,0.3)" stroke="#22d3ee" stroke-width="1"/>
          <text x="75" y="0" font-size="10" fill="#94a3b8" font-family="JetBrains Mono, monospace">规划阶段</text>

          <rect x="150" y="-10" width="20" height="12" rx="2" fill="rgba(52,211,153,0.3)" stroke="#34d399" stroke-width="1"/>
          <text x="175" y="0" font-size="10" fill="#94a3b8" font-family="JetBrains Mono, monospace">开发阶段</text>

          <rect x="250" y="-10" width="20" height="12" rx="2" fill="rgba(167,139,250,0.3)" stroke="#a78bfa" stroke-width="1"/>
          <text x="275" y="0" font-size="10" fill="#94a3b8" font-family="JetBrains Mono, monospace">联调阶段</text>

          <rect x="350" y="-10" width="20" height="12" rx="2" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1"/>
          <text x="375" y="0" font-size="10" fill="#94a3b8" font-family="JetBrains Mono, monospace">测试阶段</text>

          <rect x="450" y="-10" width="20" height="12" rx="2" fill="rgba(251,191,36,0.3)" stroke="#fbbf24" stroke-width="1"/>
          <text x="475" y="0" font-size="10" fill="#94a3b8" font-family="JetBrains Mono, monospace">发布阶段</text>

          <polygon points="530,-5 538,1 530,7 522,1" fill="#fbbf24" stroke="#f59e0b" stroke-width="1"/>
          <text x="545" y="0" font-size="10" fill="#94a3b8" font-family="JetBrains Mono, monospace">里程碑</text>
        </g>

      </svg>
    </div>

    <div class="footer">
      Generated by gmdiagram &middot; 2026-04-14
    </div>
  </div>
</body>
</html>
