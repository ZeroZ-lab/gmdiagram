<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Architecture Diagram — Pastel Dream</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fef7ff;
      color: #4a3060;
      font-family: 'Nunito', 'Quicksand', system-ui, sans-serif;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container { max-width: 1100px; margin: 0 auto; }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .pastel-dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: #f0d4f7;
      box-shadow: 0 0 8px rgba(206,147,216,0.4);
    }
    h1 { font-size: 22px; font-weight: 700; color: #5b21b6; }
    .subtitle { font-size: 13px; color: #7c3aed; margin-top: 4px; }
    .diagram-container {
      background: #ffffff;
      border: 2px solid #f0d4f7;
      border-radius: 20px;
      padding: 28px;
      margin-bottom: 32px;
      overflow-x: auto;
      box-shadow: 4px 4px 0px rgba(206,147,216,0.15);
    }
    .diagram-container svg {
      width: 100%;
      min-width: 700px;
      height: auto;
      display: block;
    }
    .footer {
      font-size: 11px;
      color: #9333ea;
      text-align: center;
      padding-top: 16px;
      border-top: 2px solid #f0d4f7;
    }
    /* === foreignObject component classes (pastel-dream) === */
    .layer-card { width: 100%; border-radius: 16px; padding: 8px 0 12px; box-sizing: border-box; }
    .layer-label { font-size: 14px; font-weight: 600; color: #5b21b6; padding: 0 16px; font-family: 'Nunito', system-ui, sans-serif; }
    .modules { display: flex; gap: 20px; justify-content: center; padding: 8px 16px 0; flex-wrap: wrap; }
    .module { min-width: 100px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; padding: 0 16px; box-sizing: border-box; }
    .module-label { font-size: 12px; font-weight: 600; color: #4a3060; text-align: center; white-space: nowrap; font-family: 'Nunito', system-ui, sans-serif; }
    .tech-badges { display: flex; gap: 4px; justify-content: center; padding-top: 4px; }
    .tech-badge { font-size: 8px; padding: 2px 8px; border-radius: 10px; white-space: nowrap; background: #f5f0ff; border: 1px solid #e9d5ff; color: #7c3aed; font-family: 'Nunito', system-ui, sans-serif; }

    /* Module with badge */
    .module.has-badges { height: 58px; flex-direction: column; gap: 2px; }
    .module.has-badges .module-label { height: 20px; }

    /* Type-specific colors — soft pastels */
    .type-process { background: #e8f5e9; border: 2px solid #81c784; }
    .type-module { background: #e3f2fd; border: 2px solid #90caf9; }
    .type-data { background: #f3e5f5; border: 2px solid #ce93d8; }
    .type-infra { background: #fff8e1; border: 2px solid #ffd54f; }
    .type-security { background: #fce4ec; border: 2px solid #f48fb1; border-style: dashed; }
    .type-channel { background: #fff3e0; border: 2px solid #ffb74d; }
    .type-external { background: #efebe9; border: 2px solid #bcaaa4; }

    /* Legend */
    .legend-container { display: flex; gap: 100px; align-items: center; }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-swatch { width: 14px; height: 14px; border-radius: 6px; }
    .legend-text { font-size: 11px; color: #7c3aed; font-family: 'Nunito', system-ui, sans-serif; }

    /* === Chart classes (pastel-dream) === */
    .axis-line { stroke: #d4b8e0; stroke-width: 1.5; fill: none; }
    .axis-label { fill: #6b5b7b; font-size: 12px; font-family: 'Nunito', system-ui, sans-serif; }
    .axis-title { fill: #3d3250; font-size: 13px; font-weight: 600; font-family: 'Nunito', system-ui, sans-serif; }
    .tick-label { fill: #6b5b7b; font-size: 11px; font-family: 'Nunito', system-ui, sans-serif; }
    .grid-line { stroke: rgba(0,0,0,0.06); stroke-dasharray: 4,4; stroke-width: 0.5; fill: none; }
    .bar { rx: 2; }
    .bar:hover { opacity: 0.85; }
    .slice { stroke: #ffffff; stroke-width: 2; }
    .line-path { fill: none; stroke-width: 2.5; }
    .area-fill { opacity: 0.15; }
    .data-dot { stroke-width: 2; }
    .scatter-point { stroke-width: 1.5; }
    .bubble-point { stroke-width: 1.5; }
    .radar-grid { stroke: rgba(0,0,0,0.08); fill: none; stroke-width: 0.5; }
    .radar-axis { stroke: rgba(0,0,0,0.1); stroke-width: 0.5; }
    .radar-data { stroke-width: 2; stroke-linejoin: round; }
    .funnel-stage { stroke: white; stroke-width: 1; }
    .funnel-label { fill: #4a3060; font-size: 13px; font-weight: 600; font-family: 'Nunito', system-ui, sans-serif; }
    .table-header { font-weight: 600; text-align: left; padding: 8px 12px; border-bottom: 2px solid #e9d5ff; }
    .table-row { border-bottom: 1px solid rgba(0,0,0,0.06); }
    .table-cell { padding: 8px 12px; font-size: 13px; }
    .highlight-max { font-weight: 600; }
    .highlight-min { font-weight: 600; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="pastel-dot"></div>
      <div>
        <h1>System Architecture</h1>
        <div class="subtitle">Pastel Dream style template</div>
      </div>
    </div>

    <div class="diagram-container">
      <svg viewBox="0 0 1000 400" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#ce93d8"/>
          </marker>
          <marker id="arrowhead-rev" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
            <polygon points="8 0, 0 3, 8 6" fill="#ce93d8"/>
          </marker>
        </defs>

        <!-- === LAYER 1: Example === -->
        <g>
          <rect x="40" y="30" width="920" height="100" rx="16" fill="#e8f5e9" stroke="#81c784" stroke-width="2"/>
          <text x="60" y="55" font-size="14" font-weight="600" fill="#5b21b6" font-family="Nunito, system-ui, sans-serif">Application Layer</text>

          <rect x="80" y="67" width="140" height="50" rx="12" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
          <text x="150" y="97" font-size="12" font-weight="600" fill="#4a3060" font-family="Nunito, system-ui, sans-serif" text-anchor="middle">API Gateway</text>

          <rect x="250" y="67" width="140" height="50" rx="12" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
          <text x="320" y="97" font-size="12" font-weight="600" fill="#4a3060" font-family="Nunito, system-ui, sans-serif" text-anchor="middle">Auth Service</text>
        </g>

        <!-- === LEGEND === -->
        <g transform="translate(40, 160)">
          <text x="0" y="0" font-size="11" font-weight="600" fill="#7c3aed" font-family="Nunito, system-ui, sans-serif">Legend</text>
          <rect x="0" y="14" width="14" height="14" rx="6" fill="#e8f5e9" stroke="#81c784" stroke-width="2"/>
          <text x="20" y="25" font-size="11" fill="#7c3aed" font-family="Nunito, system-ui, sans-serif">Process</text>
          <rect x="100" y="14" width="14" height="14" rx="6" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
          <text x="120" y="25" font-size="11" fill="#7c3aed" font-family="Nunito, system-ui, sans-serif">Module</text>
        </g>

      </svg>
    </div>

    <div class="footer">
      Generated by gmdiagram &middot; Pastel Dream
    </div>
  </div>
</body>
</html>
