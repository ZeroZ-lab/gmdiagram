<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagram Title</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      background-attachment: fixed;
      color: #2d2d3f;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container { max-width: 1100px; margin: 0 auto; }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .glass-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.4);
    }
    h1 { font-size: 20px; font-weight: 700; color: #ffffff; text-shadow: 0 1px 4px rgba(0,0,0,0.15); }
    .subtitle { font-size: 13px; color: rgba(255,255,255,0.8); margin-top: 2px; }
    .diagram-container {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 28px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
      overflow-x: auto;
    }
    .diagram-container svg {
      width: 100%;
      min-width: 700px;
      height: auto;
      display: block;
    }
    .footer {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      text-align: center;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.15);
    }

    /* === foreignObject component classes (glassmorphism) === */
    .layer-card { width: 100%; border-radius: 12px; padding: 8px 0 12px; box-sizing: border-box; }
    .layer-label { font-size: 13px; font-weight: 600; color: #ffffff; padding: 0 16px; font-family: 'Inter', sans-serif; }
    .layer-badge { font-size: 9px; font-weight: 500; color: rgba(255,255,255,0.8); padding: 2px 8px; border-radius: 8px; background: rgba(255,255,255,0.15); margin-left: 8px; }
    .modules { display: flex; gap: 16px; justify-content: center; padding: 8px 16px 0; flex-wrap: wrap; }
    .module {
      min-width: 100px; height: 50px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      padding: 0 16px; box-sizing: border-box;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.25);
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }
    .module-label { font-size: 12px; font-weight: 500; color: #ffffff; text-align: center; white-space: nowrap; font-family: 'Inter', sans-serif; }
    .tech-badges { display: flex; gap: 4px; justify-content: center; padding-top: 4px; }
    .tech-badge { font-size: 8px; padding: 2px 6px; border-radius: 6px; white-space: nowrap; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.85); font-family: 'Inter', sans-serif; }

    /* Module with badge — taller to fit badge row */
    .module.has-badges { height: 58px; flex-direction: column; gap: 2px; }
    .module.has-badges .module-label { height: 20px; }

    /* Type-specific colors — glass tint overlays */
    .type-process { background: rgba(59, 130, 246, 0.2); border: 1px solid rgba(59, 130, 246, 0.35); }
    .type-module { background: rgba(34, 197, 94, 0.2); border: 1px solid rgba(34, 197, 94, 0.35); }
    .type-data { background: rgba(168, 85, 247, 0.2); border: 1px solid rgba(168, 85, 247, 0.35); }
    .type-infra { background: rgba(251, 191, 36, 0.2); border: 1px solid rgba(251, 191, 36, 0.35); }
    .type-security { background: rgba(244, 63, 94, 0.2); border: 1px solid rgba(244, 63, 94, 0.35); }
    .type-channel { background: rgba(251, 146, 60, 0.2); border: 1px solid rgba(251, 146, 60, 0.35); }
    .type-external { background: rgba(148, 163, 184, 0.2); border: 1px solid rgba(148, 163, 184, 0.35); }

    /* Legend */
    .legend-container { display: flex; gap: 80px; align-items: center; }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-swatch { width: 14px; height: 14px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.3); }
    .legend-text { font-size: 11px; color: rgba(255,255,255,0.8); font-family: 'Inter', sans-serif; }

    /* === Chart classes (glassmorphism) === */
    .axis-line { stroke: rgba(255,255,255,0.4); stroke-width: 1.5; fill: none; }
    .axis-label { fill: rgba(255,255,255,0.8); font-size: 12px; font-family: 'Inter', sans-serif; }
    .axis-title { fill: #ffffff; font-size: 13px; font-weight: 600; font-family: 'Inter', sans-serif; }
    .tick-label { fill: rgba(255,255,255,0.8); font-size: 11px; font-family: 'Inter', sans-serif; }
    .grid-line { stroke: rgba(255,255,255,0.2); stroke-dasharray: 4,4; stroke-width: 0.5; fill: none; }
    .bar { rx: 2; }
    .bar:hover { opacity: 0.85; }
    .slice { stroke: rgba(255,255,255,0.12); stroke-width: 2; }
    .line-path { fill: none; stroke-width: 2.5; }
    .area-fill { opacity: 0.15; }
    .data-dot { stroke-width: 2; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="glass-dot"></div>
      <div>
        <h1>Diagram Title</h1>
        <div class="subtitle">Brief description of the system</div>
      </div>
    </div>

    <div class="diagram-container">
      <svg viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">
        <!-- Placeholder: replace with generated SVG content -->
      </svg>
    </div>

    <div class="footer">
      Generated by gmdiagram &middot; 2026-04-13
    </div>
  </div>
</body>
</html>
