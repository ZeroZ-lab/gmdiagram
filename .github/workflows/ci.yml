name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run test suite
        run: bash tasks/test.sh

  version-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check version consistency
        run: |
          VERSIONS=$(grep -h '"version"' \
            .claude-plugin/marketplace.json \
            .agents/plugins/marketplace.json \
            gm-architecture/.claude-plugin/plugin.json \
            gm-architecture/.codex-plugin/plugin.json \
            gm-data-chart/.claude-plugin/plugin.json \
            gm-data-chart/.codex-plugin/plugin.json \
            | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' \
            | sort -u)

          if [ "$(echo "$VERSIONS" | wc -l)" -ne 1 ]; then
            echo "ERROR: Version mismatch detected:"
            echo "$VERSIONS"
            exit 1
          fi

          echo "All versions consistent: $VERSIONS"
