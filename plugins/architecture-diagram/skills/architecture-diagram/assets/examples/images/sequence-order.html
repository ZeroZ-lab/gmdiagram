<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Processing Flow</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #11111b;
      color: #cdd6f4;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container { max-width: 1100px; margin: 0 auto; }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .pulse-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #89b4fa;
      box-shadow: 0 0 8px rgba(137, 180, 250, 0.6);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 8px rgba(137, 180, 250, 0.6); }
      50% { opacity: 0.4; box-shadow: 0 0 16px rgba(137, 180, 250, 0.9); }
    }
    h1 { font-size: 22px; font-weight: 700; color: #cdd6f4; }
    .subtitle { font-size: 13px; color: #6c7086; margin-top: 4px; }
    .diagram-container {
      background: #1e1e2e;
      border: 1px solid #313244;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 32px;
      overflow-x: auto;
      box-shadow: 0 0 20px rgba(137, 180, 250, 0.03);
    }
    .diagram-container svg {
      width: 100%;
      min-width: 700px;
      height: auto;
      display: block;
    }
    .footer {
      font-size: 11px;
      color: #585b70;
      text-align: center;
      padding-top: 16px;
      border-top: 1px solid #313244;
    }

    /* Sequence diagram actor boxes */
    .seq-actor {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 80px;
      height: 36px;
      padding: 0 12px;
      background: #1e1e2e;
      border: 1.5px solid #89b4fa;
      border-radius: 4px;
      box-sizing: border-box;
      color: #cdd6f4;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      box-shadow: 0 0 8px rgba(137, 180, 250, 0.3);
    }
    .seq-actor .actor-label {
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
    }
    .type-participant {
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="pulse-dot"></div>
      <div>
        <h1>Order Processing Flow</h1>
        <div class="subtitle">Sequence diagram for e-commerce checkout</div>
      </div>
    </div>

    <div class="diagram-container">
      <svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- Neon glow filter -->
          <filter id="glow">
            <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
          <!-- Grid pattern -->
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#313244" stroke-width="0.5" opacity="0.4"/>
          </pattern>
          <!-- Arrow markers -->
          <marker id="arrow-sync" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#89b4fa"/>
          </marker>
          <marker id="arrow-return" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
            <polyline points="0 0, 8 3, 0 6" fill="none" stroke="#a6adc8" stroke-width="1.2"/>
          </marker>
        </defs>

        <!-- Grid background -->
        <rect width="1000" height="600" fill="#181825"/>
        <rect width="1000" height="600" fill="url(#grid)"/>

        <!-- Lifelines -->
        <line x1="150" y1="80" x2="150" y2="540" stroke="#6c7086" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>
        <line x1="350" y1="80" x2="350" y2="540" stroke="#6c7086" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>
        <line x1="550" y1="80" x2="550" y2="540" stroke="#6c7086" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>
        <line x1="750" y1="80" x2="750" y2="540" stroke="#6c7086" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>

        <!-- Actor boxes at top -->
        <!-- User (stick figure) -->
        <g transform="translate(150, 10)">
          <circle cx="0" cy="12" r="6" fill="none" stroke="#89b4fa" stroke-width="1.5" filter="url(#glow)"/>
          <line x1="0" y1="18" x2="0" y2="32" stroke="#89b4fa" stroke-width="1.5" filter="url(#glow)"/>
          <line x1="-8" y1="24" x2="8" y2="24" stroke="#89b4fa" stroke-width="1.5" filter="url(#glow)"/>
          <line x1="0" y1="32" x2="-6" y2="42" stroke="#89b4fa" stroke-width="1.5" filter="url(#glow)"/>
          <line x1="0" y1="32" x2="6" y2="42" stroke="#89b4fa" stroke-width="1.5" filter="url(#glow)"/>
          <text x="0" y="58" font-size="11" font-weight="500" fill="#cdd6f4" text-anchor="middle" font-family="JetBrains Mono, monospace">User</text>
        </g>

        <!-- API Gateway -->
        <g transform="translate(350, 30)">
          <foreignObject width="120" height="36" x="-60" y="0">
            <div xmlns="http://www.w3.org/1999/xhtml" class="seq-actor type-participant">
              <span class="actor-label">API Gateway</span>
            </div>
          </foreignObject>
        </g>

        <!-- Order Service -->
        <g transform="translate(550, 30)">
          <foreignObject width="130" height="36" x="-65" y="0">
            <div xmlns="http://www.w3.org/1999/xhtml" class="seq-actor type-participant">
              <span class="actor-label">Order Service</span>
            </div>
          </foreignObject>
        </g>

        <!-- Payment Service -->
        <g transform="translate(750, 30)">
          <foreignObject width="140" height="36" x="-70" y="0">
            <div xmlns="http://www.w3.org/1999/xhtml" class="seq-actor type-participant">
              <span class="actor-label">Payment Service</span>
            </div>
          </foreignObject>
        </g>

        <!-- Messages -->
        <!-- 1. User → API: Place Order -->
        <line x1="150" y1="120" x2="350" y2="120" stroke="#89b4fa" stroke-width="1.8" marker-end="url(#arrow-sync)" filter="url(#glow)"/>
        <text x="250" y="112" font-size="10" fill="#a6adc8" text-anchor="middle" font-family="JetBrains Mono, monospace">Place Order</text>

        <!-- 2. API → Order: Create -->
        <line x1="350" y1="160" x2="550" y2="160" stroke="#89b4fa" stroke-width="1.8" marker-end="url(#arrow-sync)" filter="url(#glow)"/>
        <text x="450" y="152" font-size="10" fill="#a6adc8" text-anchor="middle" font-family="JetBrains Mono, monospace">Create</text>

        <!-- 3. Order → Payment: Charge -->
        <line x1="550" y1="200" x2="750" y2="200" stroke="#89b4fa" stroke-width="1.8" marker-end="url(#arrow-sync)" filter="url(#glow)"/>
        <text x="650" y="192" font-size="10" fill="#a6adc8" text-anchor="middle" font-family="JetBrains Mono, monospace">Charge</text>

        <!-- 4. Payment → Order: Success -->
        <line x1="750" y1="240" x2="550" y2="240" stroke="#a6adc8" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-return)"/>
        <text x="650" y="232" font-size="10" fill="#a6adc8" text-anchor="middle" font-family="JetBrains Mono, monospace">Success</text>

        <!-- 5. Order → API: Confirm -->
        <line x1="550" y1="280" x2="350" y2="280" stroke="#a6adc8" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-return)"/>
        <text x="450" y="272" font-size="10" fill="#a6adc8" text-anchor="middle" font-family="JetBrains Mono, monospace">Confirm</text>

        <!-- 6. API → User: Receipt -->
        <line x1="350" y1="320" x2="150" y2="320" stroke="#a6adc8" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-return)"/>
        <text x="250" y="312" font-size="10" fill="#a6adc8" text-anchor="middle" font-family="JetBrains Mono, monospace">Receipt</text>

        <!-- Activation boxes -->
        <rect x="144" y="115" width="12" height="215" rx="2" fill="rgba(137,180,250,0.15)" stroke="#89b4fa" stroke-width="1"/>
        <rect x="344" y="115" width="12" height="215" rx="2" fill="rgba(137,180,250,0.15)" stroke="#89b4fa" stroke-width="1"/>
        <rect x="544" y="155" width="12" height="135" rx="2" fill="rgba(166,227,161,0.15)" stroke="#a6e3a1" stroke-width="1"/>
        <rect x="744" y="195" width="12" height="55" rx="2" fill="rgba(203,166,247,0.15)" stroke="#cba6f7" stroke-width="1"/>

      </svg>
    </div>

    <div class="footer">
      Generated by gmdiagram &middot; Cyberpunk Neon &middot; 2026-04-12
    </div>
  </div>
</body>
</html>
