<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Processing Flow</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #11111b;
      color: #cdd6f4;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container { max-width: 1100px; margin: 0 auto; }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .pulse-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #89b4fa;
      box-shadow: 0 0 8px rgba(137, 180, 250, 0.6);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 8px rgba(137, 180, 250, 0.6); }
      50% { opacity: 0.4; box-shadow: 0 0 16px rgba(137, 180, 250, 0.9); }
    }
    h1 { font-size: 22px; font-weight: 700; color: #cdd6f4; }
    .subtitle { font-size: 13px; color: #6c7086; margin-top: 4px; }
    .diagram-container {
      background: #1e1e2e;
      border: 1px solid #313244;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 32px;
      overflow-x: auto;
      box-shadow: 0 0 20px rgba(137, 180, 250, 0.03);
    }
    .diagram-container svg {
      width: 100%;
      min-width: 700px;
      height: auto;
      display: block;
    }
    .footer {
      font-size: 11px;
      color: #585b70;
      text-align: center;
      padding-top: 16px;
      border-top: 1px solid #313244;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="pulse-dot"></div>
      <div>
        <h1>Order Processing Flow</h1>
        <div class="subtitle">E-commerce order creation with inventory check and payment</div>
      </div>
    </div>

    <div class="diagram-container">
      <svg viewBox="0 0 840 530" xmlns="http://www.w3.org/2000/svg">
        <!-- ========================================== -->
        <!-- DEFS                                       -->
        <!-- ========================================== -->
        <defs>
          <!-- Neon glow filter -->
          <filter id="glow">
            <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
          <!-- Grid pattern -->
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#313244" stroke-width="0.5" opacity="0.4"/>
          </pattern>
          <!-- Sync arrow (solid filled) -->
          <marker id="arrow-sync" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#89b4fa"/>
          </marker>
          <!-- Async arrow (open chevron) -->
          <marker id="arrow-async" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
            <polyline points="0 0, 8 3, 0 6" fill="none" stroke="#a6e3a1" stroke-width="1.2"/>
          </marker>
          <!-- Return arrow (open chevron) -->
          <marker id="arrow-return" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
            <polyline points="0 0, 8 3, 0 6" fill="none" stroke="#a6adc8" stroke-width="1.2"/>
          </marker>
        </defs>

        <!-- Grid background -->
        <rect width="840" height="530" fill="#181825"/>
        <rect width="840" height="530" fill="url(#grid)"/>

        <!-- ========================================== -->
        <!-- LIFELINES (drawn first, behind everything) -->
        <!-- ========================================== -->
        <!--
          Actors: Customer(120), API Gateway(270), Order Service(420), Payment Service(570), Inventory Service(720)
          actor_x = [120, 270, 420, 570, 720]
          MSG_START_Y = 100, MSG_GAP = 40, max_order = 9
          lifeline_bottom = 100 + 9*40 + 40 = 500
        -->
        <line x1="120" y1="72" x2="120" y2="500" stroke="#6c7086" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>
        <line x1="270" y1="72" x2="270" y2="500" stroke="#6c7086" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>
        <line x1="420" y1="72" x2="420" y2="500" stroke="#6c7086" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>
        <line x1="570" y1="72" x2="570" y2="500" stroke="#6c7086" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>
        <line x1="720" y1="72" x2="720" y2="500" stroke="#6c7086" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>

        <!-- ========================================== -->
        <!-- ACTOR: Customer (stick figure at x=120)    -->
        <!-- ========================================== -->
        <g transform="translate(120, 0)">
          <!-- Head -->
          <circle cx="0" cy="8" r="6" fill="none" stroke="#89b4fa" stroke-width="1.5" filter="url(#glow)"/>
          <!-- Body -->
          <line x1="0" y1="14" x2="0" y2="28" stroke="#89b4fa" stroke-width="1.5" filter="url(#glow)"/>
          <!-- Arms -->
          <line x1="-8" y1="20" x2="8" y2="20" stroke="#89b4fa" stroke-width="1.5" filter="url(#glow)"/>
          <!-- Legs -->
          <line x1="0" y1="28" x2="-6" y2="38" stroke="#89b4fa" stroke-width="1.5" filter="url(#glow)"/>
          <line x1="0" y1="28" x2="6" y2="38" stroke="#89b4fa" stroke-width="1.5" filter="url(#glow)"/>
          <!-- Label -->
          <text x="0" y="56" font-size="11" font-weight="600" fill="#cdd6f4" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central">Customer</text>
        </g>

        <!-- ========================================== -->
        <!-- ACTOR: API Gateway (box at x=270)          -->
        <!-- ========================================== -->
        <g transform="translate(270, 20)">
          <rect x="-52" y="0" width="104" height="36" rx="4" fill="#181825"/>
          <rect x="-52" y="0" width="104" height="36" rx="4"
                fill="rgba(137,180,250,0.08)" stroke="#89b4fa" stroke-width="1.2" filter="url(#glow)"/>
          <text x="0" y="18" font-size="11" font-weight="500" fill="#cdd6f4" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central">API Gateway</text>
        </g>

        <!-- ========================================== -->
        <!-- ACTOR: Order Service (box at x=420)        -->
        <!-- ========================================== -->
        <g transform="translate(420, 20)">
          <rect x="-58" y="0" width="116" height="36" rx="4" fill="#181825"/>
          <rect x="-58" y="0" width="116" height="36" rx="4"
                fill="rgba(166,227,161,0.1)" stroke="#a6e3a1" stroke-width="1.2" filter="url(#glow)"/>
          <text x="0" y="18" font-size="11" font-weight="500" fill="#cdd6f4" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central">Order Service</text>
        </g>

        <!-- ========================================== -->
        <!-- ACTOR: Payment Service (box at x=570)      -->
        <!-- ========================================== -->
        <g transform="translate(570, 20)">
          <rect x="-62" y="0" width="124" height="36" rx="4" fill="#181825"/>
          <rect x="-62" y="0" width="124" height="36" rx="4"
                fill="rgba(203,166,247,0.1)" stroke="#cba6f7" stroke-width="1.2" filter="url(#glow)"/>
          <text x="0" y="18" font-size="11" font-weight="500" fill="#cdd6f4" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central">Payment Service</text>
        </g>

        <!-- ========================================== -->
        <!-- ACTOR: Inventory Service (box at x=720)    -->
        <!-- ========================================== -->
        <g transform="translate(720, 20)">
          <rect x="-66" y="0" width="132" height="36" rx="4" fill="#181825"/>
          <rect x="-66" y="0" width="132" height="36" rx="4"
                fill="rgba(249,226,175,0.06)" stroke="#f9e2af" stroke-width="1.2" filter="url(#glow)"/>
          <text x="0" y="18" font-size="11" font-weight="500" fill="#cdd6f4" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central">Inventory Service</text>
        </g>

        <!-- ========================================== -->
        <!-- ACTIVATION BOX: Order Service              -->
        <!-- Active from message 2 (y=140) to 8 (y=380) -->
        <!-- ========================================== -->
        <rect x="414" y="140" width="12" height="260" rx="2"
              fill="rgba(166,227,161,0.12)" stroke="#a6e3a1" stroke-width="1" filter="url(#glow)"/>

        <!-- ========================================== -->
        <!-- MESSAGES                                   -->
        <!-- ========================================== -->
        <!--
          message_y[order] = MSG_START_Y + (order - 1) * MSG_GAP
          y[1]=100, y[2]=140, y[3]=180, y[4]=220, y[5]=260, y[6]=300, y[7]=340, y[8]=380, y[9]=420
        -->

        <!-- MSG 1: Customer → API Gateway — POST /orders (sync, y=100) -->
        <line x1="120" y1="100" x2="270" y2="100"
              stroke="#89b4fa" stroke-width="1.5" filter="url(#glow)"
              marker-end="url(#arrow-sync)"/>
        <text x="195" y="92" font-size="9" fill="#89b4fa" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central">POST /orders</text>

        <!-- MSG 2: API Gateway → Order Service — Create order (sync, y=140) -->
        <line x1="270" y1="140" x2="420" y2="140"
              stroke="#89b4fa" stroke-width="1.5" filter="url(#glow)"
              marker-end="url(#arrow-sync)"/>
        <text x="345" y="132" font-size="9" fill="#89b4fa" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central">Create order</text>

        <!-- MSG 3: Order Service → Inventory Service — Check stock availability (sync, y=180) -->
        <line x1="420" y1="180" x2="720" y2="180"
              stroke="#89b4fa" stroke-width="1.5" filter="url(#glow)"
              marker-end="url(#arrow-sync)"/>
        <text x="570" y="172" font-size="9" fill="#89b4fa" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central">Check stock availability</text>

        <!-- MSG 4: Inventory Service → Order Service — Stock confirmed (return, y=220) -->
        <line x1="720" y1="220" x2="420" y2="220"
              stroke="#a6adc8" stroke-width="1.5" stroke-dasharray="6,4" filter="url(#glow)"
              marker-end="url(#arrow-return)"/>
        <text x="570" y="212" font-size="9" fill="#a6adc8" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central">Stock confirmed</text>

        <!-- MSG 5: Order Service → Payment Service — Charge payment (sync, y=260) -->
        <line x1="420" y1="260" x2="570" y2="260"
              stroke="#89b4fa" stroke-width="1.5" filter="url(#glow)"
              marker-end="url(#arrow-sync)"/>
        <text x="495" y="252" font-size="9" fill="#89b4fa" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central">Charge payment</text>

        <!-- MSG 6: Payment Service → Order Service — Payment success (return, y=300) -->
        <line x1="570" y1="300" x2="420" y2="300"
              stroke="#a6adc8" stroke-width="1.5" stroke-dasharray="6,4" filter="url(#glow)"
              marker-end="url(#arrow-return)"/>
        <text x="495" y="292" font-size="9" fill="#a6adc8" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central">Payment success</text>

        <!-- MSG 7: Order Service → Inventory Service — Reserve items (async, y=340) -->
        <line x1="420" y1="340" x2="720" y2="340"
              stroke="#a6e3a1" stroke-width="1.5" filter="url(#glow)"
              marker-end="url(#arrow-async)"/>
        <text x="570" y="332" font-size="9" fill="#a6e3a1" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central">Reserve items</text>

        <!-- MSG 8: Order Service → API Gateway — Order confirmed (201) (return, y=380) -->
        <line x1="420" y1="380" x2="270" y2="380"
              stroke="#a6adc8" stroke-width="1.5" stroke-dasharray="6,4" filter="url(#glow)"
              marker-end="url(#arrow-return)"/>
        <text x="345" y="372" font-size="9" fill="#a6adc8" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central">Order confirmed (201)</text>

        <!-- MSG 9: API Gateway → Customer — Order confirmation (return, y=420) -->
        <line x1="270" y1="420" x2="120" y2="420"
              stroke="#a6adc8" stroke-width="1.5" stroke-dasharray="6,4" filter="url(#glow)"
              marker-end="url(#arrow-return)"/>
        <text x="195" y="412" font-size="9" fill="#a6adc8" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central">Order confirmation</text>

        <!-- ========================================== -->
        <!-- BOTTOM ACTOR BOXES (mirrored)              -->
        <!-- ========================================== -->

        <!-- Customer (stick figure at bottom, y=500) -->
        <g transform="translate(120, 470)">
          <circle cx="0" cy="8" r="6" fill="none" stroke="#89b4fa" stroke-width="1.5" filter="url(#glow)"/>
          <line x1="0" y1="14" x2="0" y2="28" stroke="#89b4fa" stroke-width="1.5" filter="url(#glow)"/>
          <line x1="-8" y1="20" x2="8" y2="20" stroke="#89b4fa" stroke-width="1.5" filter="url(#glow)"/>
          <line x1="0" y1="28" x2="-6" y2="38" stroke="#89b4fa" stroke-width="1.5" filter="url(#glow)"/>
          <line x1="0" y1="28" x2="6" y2="38" stroke="#89b4fa" stroke-width="1.5" filter="url(#glow)"/>
          <text x="0" y="50" font-size="10" font-weight="600" fill="#6c7086" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central">Customer</text>
        </g>

        <!-- API Gateway -->
        <g transform="translate(270, 490)">
          <rect x="-52" y="0" width="104" height="30" rx="4" fill="rgba(137,180,250,0.04)" stroke="#89b4fa" stroke-width="0.8" opacity="0.6"/>
          <text x="0" y="15" font-size="9" fill="#6c7086" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central">API Gateway</text>
        </g>

        <!-- Order Service -->
        <g transform="translate(420, 490)">
          <rect x="-58" y="0" width="116" height="30" rx="4" fill="rgba(166,227,161,0.04)" stroke="#a6e3a1" stroke-width="0.8" opacity="0.6"/>
          <text x="0" y="15" font-size="9" fill="#6c7086" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central">Order Service</text>
        </g>

        <!-- Payment Service -->
        <g transform="translate(570, 490)">
          <rect x="-62" y="0" width="124" height="30" rx="4" fill="rgba(203,166,247,0.04)" stroke="#cba6f7" stroke-width="0.8" opacity="0.6"/>
          <text x="0" y="15" font-size="9" fill="#6c7086" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central">Payment Service</text>
        </g>

        <!-- Inventory Service -->
        <g transform="translate(720, 490)">
          <rect x="-66" y="0" width="132" height="30" rx="4" fill="rgba(249,226,175,0.04)" stroke="#f9e2af" stroke-width="0.8" opacity="0.6"/>
          <text x="0" y="15" font-size="9" fill="#6c7086" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central">Inventory Service</text>
        </g>

      </svg>
    </div>

    <div class="footer">
      Generated by gmdiagram &middot; Cyberpunk Neon &middot; 2026-04-12
    </div>
  </div>
</body>
</html>
