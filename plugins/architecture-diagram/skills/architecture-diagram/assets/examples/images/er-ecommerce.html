<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Commerce Database — ER Diagram</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #2e3440; color: #eceff4; font-family: 'JetBrains Mono', monospace; min-height: 100vh; padding: 40px 20px; }
    .container { max-width: 1100px; margin: 0 auto; }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
    .blueprint-dot { width: 10px; height: 10px; border-radius: 50%; background: #88c0d0; border: 1px solid #88c0d0; }
    h1 { font-size: 22px; font-weight: 700; color: #eceff4; letter-spacing: 0.5px; }
    .subtitle { font-size: 13px; color: #d8dee9; margin-top: 4px; }
    .diagram-container { background: #3b4252; border: 1px solid #4c566a; border-radius: 2px; padding: 24px; margin-bottom: 32px; overflow-x: auto; }
    .diagram-container svg { width: 100%; min-width: 700px; height: auto; display: block; }
    .footer { font-size: 11px; color: #4c566a; text-align: center; padding-top: 16px; border-top: 1px solid #434c5e; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="blueprint-dot"></div>
      <div>
        <h1>E-Commerce Database</h1>
        <div class="subtitle">Entity relationship diagram for an online store</div>
      </div>
    </div>

    <div class="diagram-container">
      <svg viewBox="0 0 1000 595" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- Blueprint grid pattern (20px) -->
          <pattern id="bp-grid" width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#4c566a" stroke-width="0.3"/>
          </pattern>
          <!-- ER relationship arrow marker -->
          <marker id="er-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#81a1c1"/>
          </marker>
        </defs>

        <!-- Grid background -->
        <rect width="1000" height="595" fill="url(#bp-grid)"/>

        <!-- ================================================================ -->
        <!-- RELATIONSHIP LINES (rendered behind entities)                    -->
        <!-- ================================================================ -->

        <!-- 1. User → Order  ("places", 1:N) -->
        <!-- User center: (140, 99), right edge exit at x=250 -->
        <!-- Order center: (800, 99), left edge entry at x=710 -->
        <line x1="250" y1="99" x2="710" y2="99" stroke="#81a1c1" stroke-width="1" marker-end="url(#er-arrow)"/>
        <!-- Cardinality: "1" near User exit -->
        <rect x="260" y="86" width="22" height="16" rx="2" fill="#2e3440" opacity="0.9"/>
        <text x="271" y="98" font-size="10" fill="#88c0d0" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central" font-weight="600">1</text>
        <!-- Cardinality: "N" near Order entry -->
        <rect x="686" y="86" width="22" height="16" rx="2" fill="#2e3440" opacity="0.9"/>
        <text x="697" y="98" font-size="10" fill="#88c0d0" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central" font-weight="600">N</text>
        <!-- Relationship label -->
        <rect x="457" y="79" width="46" height="16" rx="2" fill="#2e3440" opacity="0.9"/>
        <text x="480" y="91" font-size="8" fill="#81a1c1" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central">places</text>

        <!-- 2. Order → OrderItem  ("contains", 1:N) -->
        <!-- Order bottom edge: (800, 180), OrderItem top edge: (140, 260) -->
        <path d="M 800,180 L 800,220 L 140,220 L 140,260" fill="none" stroke="#81a1c1" stroke-width="1" marker-end="url(#er-arrow)"/>
        <!-- Cardinality: "1" near Order exit -->
        <rect x="808" y="185" width="22" height="16" rx="2" fill="#2e3440" opacity="0.9"/>
        <text x="819" y="197" font-size="10" fill="#88c0d0" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central" font-weight="600">1</text>
        <!-- Cardinality: "N" near OrderItem entry -->
        <rect x="118" y="240" width="22" height="16" rx="2" fill="#2e3440" opacity="0.9"/>
        <text x="129" y="252" font-size="10" fill="#88c0d0" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central" font-weight="600">N</text>
        <!-- Relationship label -->
        <rect x="443" y="210" width="60" height="16" rx="2" fill="#2e3440" opacity="0.9"/>
        <text x="473" y="222" font-size="8" fill="#81a1c1" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central">contains</text>

        <!-- 3. Product → OrderItem  ("included in", 1:N) -->
        <!-- Product bottom edge: (470, 180), OrderItem top edge: (140, 260) -->
        <!-- Route: down from Product, then left to OrderItem -->
        <path d="M 470,180 L 470,240 L 230,240 L 230,260" fill="none" stroke="#81a1c1" stroke-width="1" marker-end="url(#er-arrow)"/>
        <!-- Cardinality: "1" near Product exit -->
        <rect x="478" y="185" width="22" height="16" rx="2" fill="#2e3440" opacity="0.9"/>
        <text x="489" y="197" font-size="10" fill="#88c0d0" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central" font-weight="600">1</text>
        <!-- Cardinality: "N" near OrderItem entry -->
        <rect x="208" y="242" width="22" height="16" rx="2" fill="#2e3440" opacity="0.9"/>
        <text x="219" y="254" font-size="10" fill="#88c0d0" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central" font-weight="600">N</text>
        <!-- Relationship label -->
        <rect x="310" y="230" width="68" height="16" rx="2" fill="#2e3440" opacity="0.9"/>
        <text x="344" y="242" font-size="8" fill="#81a1c1" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central">included in</text>

        <!-- 4. Category → Product  ("has", 1:N) -->
        <!-- Category top edge: (470, 332), Product bottom edge: (470, 180) -->
        <!-- Route: up from Category, straight into Product bottom -->
        <line x1="470" y1="332" x2="470" y2="180" stroke="#81a1c1" stroke-width="1" marker-end="url(#er-arrow)"/>
        <!-- Cardinality: "1" near Category exit -->
        <rect x="478" y="314" width="22" height="16" rx="2" fill="#2e3440" opacity="0.9"/>
        <text x="489" y="326" font-size="10" fill="#88c0d0" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central" font-weight="600">1</text>
        <!-- Cardinality: "N" near Product entry -->
        <rect x="478" y="185" width="22" height="16" rx="2" fill="#2e3440" opacity="0.9"/>
        <text x="489" y="197" font-size="10" fill="#88c0d0" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central" font-weight="600">N</text>
        <!-- Relationship label -->
        <rect x="478" y="253" width="30" height="16" rx="2" fill="#2e3440" opacity="0.9"/>
        <text x="493" y="265" font-size="8" fill="#81a1c1" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central">has</text>

        <!-- 5. User → Review  ("writes", 1:N) -->
        <!-- User bottom edge: (140, 158), Review top edge: (800, 260) -->
        <!-- Route: down from User, across, then down to Review -->
        <path d="M 140,158 L 140,195 L 790,195 L 790,260" fill="none" stroke="#81a1c1" stroke-width="1" marker-end="url(#er-arrow)"/>
        <!-- Cardinality: "1" near User exit -->
        <rect x="118" y="163" width="22" height="16" rx="2" fill="#2e3440" opacity="0.9"/>
        <text x="129" y="175" font-size="10" fill="#88c0d0" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central" font-weight="600">1</text>
        <!-- Cardinality: "N" near Review entry -->
        <rect x="768" y="242" width="22" height="16" rx="2" fill="#2e3440" opacity="0.9"/>
        <text x="779" y="254" font-size="10" fill="#88c0d0" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central" font-weight="600">N</text>
        <!-- Relationship label -->
        <rect x="427" y="185" width="46" height="16" rx="2" fill="#2e3440" opacity="0.9"/>
        <text x="450" y="197" font-size="8" fill="#81a1c1" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central">writes</text>

        <!-- 6. Product → Review  ("receives", 1:N) -->
        <!-- Product bottom edge: (570, 180), Review top edge: (770, 260) -->
        <!-- Route: down from Product right, then right and down to Review -->
        <path d="M 570,180 L 570,240 L 770,240 L 770,260" fill="none" stroke="#81a1c1" stroke-width="1" marker-end="url(#er-arrow)"/>
        <!-- Cardinality: "1" near Product exit -->
        <rect x="548" y="185" width="22" height="16" rx="2" fill="#2e3440" opacity="0.9"/>
        <text x="559" y="197" font-size="10" fill="#88c0d0" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central" font-weight="600">1</text>
        <!-- Cardinality: "N" near Review entry -->
        <rect x="748" y="242" width="22" height="16" rx="2" fill="#2e3440" opacity="0.9"/>
        <text x="759" y="254" font-size="10" fill="#88c0d0" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central" font-weight="600">N</text>
        <!-- Relationship label -->
        <rect x="631" y="230" width="60" height="16" rx="2" fill="#2e3440" opacity="0.9"/>
        <text x="661" y="242" font-size="8" fill="#81a1c1" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central">receives</text>

        <!-- ================================================================ -->
        <!-- ENTITY BOXES                                                     -->
        <!-- ================================================================ -->

        <!-- ── User ── (x=40, y=40, w=200, h=118, attrs=4) -->
        <g transform="translate(40, 40)">
          <!-- Entity outer border -->
          <rect x="0" y="0" width="200" height="118" rx="2" fill="#3b4252" stroke="#88c0d0" stroke-width="0.8"/>
          <!-- Header background -->
          <rect x="0" y="0" width="200" height="30" rx="2" fill="rgba(136,192,208,0.15)"/>
          <rect x="0" y="24" width="200" height="6" fill="rgba(136,192,208,0.15)"/>
          <line x1="0" y1="30" x2="200" y2="30" stroke="#88c0d0" stroke-width="0.5"/>
          <!-- Header text -->
          <text x="100" y="15" font-size="12" font-weight="600" fill="#88c0d0" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central">User</text>

          <!-- Row 0: id (PK) -->
          <line x1="0" y1="52" x2="200" y2="52" stroke="#4c566a" stroke-width="0.5"/>
          <text x="12" y="41" font-size="11" fill="#ebcb8b" font-family="JetBrains Mono, monospace" text-anchor="start" dominant-baseline="central" font-weight="600" text-decoration="underline">id</text>
          <text x="148" y="41" font-size="10" fill="#d8dee9" font-family="JetBrains Mono, monospace" text-anchor="end" dominant-baseline="central">int</text>
          <rect x="158" y="34" width="20" height="13" rx="2" fill="rgba(235,203,139,0.2)" stroke="#ebcb8b" stroke-width="0.5"/>
          <text x="168" y="41" font-size="7" fill="#ebcb8b" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central">PK</text>

          <!-- Row 1: email -->
          <line x1="0" y1="74" x2="200" y2="74" stroke="#4c566a" stroke-width="0.5"/>
          <text x="12" y="63" font-size="11" fill="#eceff4" font-family="JetBrains Mono, monospace" text-anchor="start" dominant-baseline="central">email</text>
          <text x="140" y="63" font-size="10" fill="#d8dee9" font-family="JetBrains Mono, monospace" text-anchor="end" dominant-baseline="central">string</text>
          <text x="196" y="63" font-size="7" fill="#bf616a" font-family="JetBrains Mono, monospace" text-anchor="end" dominant-baseline="central">NN</text>

          <!-- Row 2: name -->
          <line x1="0" y1="96" x2="200" y2="96" stroke="#4c566a" stroke-width="0.5"/>
          <text x="12" y="85" font-size="11" fill="#eceff4" font-family="JetBrains Mono, monospace" text-anchor="start" dominant-baseline="central">name</text>
          <text x="140" y="85" font-size="10" fill="#d8dee9" font-family="JetBrains Mono, monospace" text-anchor="end" dominant-baseline="central">string</text>

          <!-- Row 3: created_at -->
          <text x="12" y="107" font-size="11" fill="#eceff4" font-family="JetBrains Mono, monospace" text-anchor="start" dominant-baseline="central">created_at</text>
          <text x="128" y="107" font-size="10" fill="#d8dee9" font-family="JetBrains Mono, monospace" text-anchor="end" dominant-baseline="central">timestamp</text>
        </g>

        <!-- ── Product ── (x=360, y=40, w=220, h=140, attrs=5) -->
        <g transform="translate(360, 40)">
          <!-- Entity outer border -->
          <rect x="0" y="0" width="220" height="140" rx="2" fill="#3b4252" stroke="#a3be8c" stroke-width="0.8"/>
          <!-- Header background -->
          <rect x="0" y="0" width="220" height="30" rx="2" fill="rgba(163,190,140,0.15)"/>
          <rect x="0" y="24" width="220" height="6" fill="rgba(163,190,140,0.15)"/>
          <line x1="0" y1="30" x2="220" y2="30" stroke="#a3be8c" stroke-width="0.5"/>
          <!-- Header text -->
          <text x="110" y="15" font-size="12" font-weight="600" fill="#a3be8c" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central">Product</text>

          <!-- Row 0: id (PK) -->
          <line x1="0" y1="52" x2="220" y2="52" stroke="#4c566a" stroke-width="0.5"/>
          <text x="12" y="41" font-size="11" fill="#ebcb8b" font-family="JetBrains Mono, monospace" text-anchor="start" dominant-baseline="central" font-weight="600" text-decoration="underline">id</text>
          <text x="168" y="41" font-size="10" fill="#d8dee9" font-family="JetBrains Mono, monospace" text-anchor="end" dominant-baseline="central">int</text>
          <rect x="178" y="34" width="20" height="13" rx="2" fill="rgba(235,203,139,0.2)" stroke="#ebcb8b" stroke-width="0.5"/>
          <text x="188" y="41" font-size="7" fill="#ebcb8b" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central">PK</text>

          <!-- Row 1: name -->
          <line x1="0" y1="74" x2="220" y2="74" stroke="#4c566a" stroke-width="0.5"/>
          <text x="12" y="63" font-size="11" fill="#eceff4" font-family="JetBrains Mono, monospace" text-anchor="start" dominant-baseline="central">name</text>
          <text x="160" y="63" font-size="10" fill="#d8dee9" font-family="JetBrains Mono, monospace" text-anchor="end" dominant-baseline="central">string</text>
          <text x="216" y="63" font-size="7" fill="#bf616a" font-family="JetBrains Mono, monospace" text-anchor="end" dominant-baseline="central">NN</text>

          <!-- Row 2: price -->
          <line x1="0" y1="96" x2="220" y2="96" stroke="#4c566a" stroke-width="0.5"/>
          <text x="12" y="85" font-size="11" fill="#eceff4" font-family="JetBrains Mono, monospace" text-anchor="start" dominant-baseline="central">price</text>
          <text x="168" y="85" font-size="10" fill="#d8dee9" font-family="JetBrains Mono, monospace" text-anchor="end" dominant-baseline="central">float</text>
          <text x="216" y="85" font-size="7" fill="#bf616a" font-family="JetBrains Mono, monospace" text-anchor="end" dominant-baseline="central">NN</text>

          <!-- Row 3: stock -->
          <line x1="0" y1="118" x2="220" y2="118" stroke="#4c566a" stroke-width="0.5"/>
          <text x="12" y="107" font-size="11" fill="#eceff4" font-family="JetBrains Mono, monospace" text-anchor="start" dominant-baseline="central">stock</text>
          <text x="168" y="107" font-size="10" fill="#d8dee9" font-family="JetBrains Mono, monospace" text-anchor="end" dominant-baseline="central">int</text>

          <!-- Row 4: category_id (FK) -->
          <text x="12" y="129" font-size="11" fill="#b48ead" font-family="JetBrains Mono, monospace" text-anchor="start" dominant-baseline="central" font-style="italic">category_id</text>
          <text x="168" y="129" font-size="10" fill="#d8dee9" font-family="JetBrains Mono, monospace" text-anchor="end" dominant-baseline="central">int</text>
          <rect x="178" y="122" width="20" height="13" rx="2" fill="rgba(180,142,173,0.2)" stroke="#b48ead" stroke-width="0.5"/>
          <text x="188" y="129" font-size="7" fill="#b48ead" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central">FK</text>
        </g>

        <!-- ── Order ── (x=700, y=40, w=200, h=140, attrs=5) -->
        <g transform="translate(700, 40)">
          <!-- Entity outer border -->
          <rect x="0" y="0" width="200" height="140" rx="2" fill="#3b4252" stroke="#88c0d0" stroke-width="0.8"/>
          <!-- Header background -->
          <rect x="0" y="0" width="200" height="30" rx="2" fill="rgba(136,192,208,0.15)"/>
          <rect x="0" y="24" width="200" height="6" fill="rgba(136,192,208,0.15)"/>
          <line x1="0" y1="30" x2="200" y2="30" stroke="#88c0d0" stroke-width="0.5"/>
          <!-- Header text -->
          <text x="100" y="15" font-size="12" font-weight="600" fill="#88c0d0" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central">Order</text>

          <!-- Row 0: id (PK) -->
          <line x1="0" y1="52" x2="200" y2="52" stroke="#4c566a" stroke-width="0.5"/>
          <text x="12" y="41" font-size="11" fill="#ebcb8b" font-family="JetBrains Mono, monospace" text-anchor="start" dominant-baseline="central" font-weight="600" text-decoration="underline">id</text>
          <text x="148" y="41" font-size="10" fill="#d8dee9" font-family="JetBrains Mono, monospace" text-anchor="end" dominant-baseline="central">int</text>
          <rect x="158" y="34" width="20" height="13" rx="2" fill="rgba(235,203,139,0.2)" stroke="#ebcb8b" stroke-width="0.5"/>
          <text x="168" y="41" font-size="7" fill="#ebcb8b" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central">PK</text>

          <!-- Row 1: user_id (FK) -->
          <line x1="0" y1="74" x2="200" y2="74" stroke="#4c566a" stroke-width="0.5"/>
          <text x="12" y="63" font-size="11" fill="#b48ead" font-family="JetBrains Mono, monospace" text-anchor="start" dominant-baseline="central" font-style="italic">user_id</text>
          <text x="148" y="63" font-size="10" fill="#d8dee9" font-family="JetBrains Mono, monospace" text-anchor="end" dominant-baseline="central">int</text>
          <rect x="158" y="56" width="20" height="13" rx="2" fill="rgba(180,142,173,0.2)" stroke="#b48ead" stroke-width="0.5"/>
          <text x="168" y="63" font-size="7" fill="#b48ead" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central">FK</text>

          <!-- Row 2: total -->
          <line x1="0" y1="96" x2="200" y2="96" stroke="#4c566a" stroke-width="0.5"/>
          <text x="12" y="85" font-size="11" fill="#eceff4" font-family="JetBrains Mono, monospace" text-anchor="start" dominant-baseline="central">total</text>
          <text x="148" y="85" font-size="10" fill="#d8dee9" font-family="JetBrains Mono, monospace" text-anchor="end" dominant-baseline="central">float</text>

          <!-- Row 3: status -->
          <line x1="0" y1="118" x2="200" y2="118" stroke="#4c566a" stroke-width="0.5"/>
          <text x="12" y="107" font-size="11" fill="#eceff4" font-family="JetBrains Mono, monospace" text-anchor="start" dominant-baseline="central">status</text>
          <text x="140" y="107" font-size="10" fill="#d8dee9" font-family="JetBrains Mono, monospace" text-anchor="end" dominant-baseline="central">string</text>

          <!-- Row 4: created_at -->
          <text x="12" y="129" font-size="11" fill="#eceff4" font-family="JetBrains Mono, monospace" text-anchor="start" dominant-baseline="central">created_at</text>
          <text x="128" y="129" font-size="10" fill="#d8dee9" font-family="JetBrains Mono, monospace" text-anchor="end" dominant-baseline="central">timestamp</text>
        </g>

        <!-- ── OrderItem ── (x=40, y=260, w=200, h=118, attrs=4) -->
        <g transform="translate(40, 260)">
          <!-- Entity outer border -->
          <rect x="0" y="0" width="200" height="118" rx="2" fill="#3b4252" stroke="#ebcb8b" stroke-width="0.8"/>
          <!-- Header background -->
          <rect x="0" y="0" width="200" height="30" rx="2" fill="rgba(235,203,139,0.15)"/>
          <rect x="0" y="24" width="200" height="6" fill="rgba(235,203,139,0.15)"/>
          <line x1="0" y1="30" x2="200" y2="30" stroke="#ebcb8b" stroke-width="0.5"/>
          <!-- Header text -->
          <text x="100" y="15" font-size="12" font-weight="600" fill="#ebcb8b" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central">OrderItem</text>

          <!-- Row 0: id (PK) -->
          <line x1="0" y1="52" x2="200" y2="52" stroke="#4c566a" stroke-width="0.5"/>
          <text x="12" y="41" font-size="11" fill="#ebcb8b" font-family="JetBrains Mono, monospace" text-anchor="start" dominant-baseline="central" font-weight="600" text-decoration="underline">id</text>
          <text x="148" y="41" font-size="10" fill="#d8dee9" font-family="JetBrains Mono, monospace" text-anchor="end" dominant-baseline="central">int</text>
          <rect x="158" y="34" width="20" height="13" rx="2" fill="rgba(235,203,139,0.2)" stroke="#ebcb8b" stroke-width="0.5"/>
          <text x="168" y="41" font-size="7" fill="#ebcb8b" font-family="JetBrains Mono, monospace" text-anchor="middle" dominant-baseline="central">PK</text>

          <!-- Row 1: order_id (FK) -->
          <line x1="0" y1="74" x2="200" y2="74" stroke="#4c566a" stroke-width="0.5"/>
          <text x="12" y="63" font-size="11" fill="#b48ead" font-family="JetBrains Mono, monospace" text-anchor="start" dominant-baseline="central" font-style="italic">order_id</text>
          <text x="148" y="63" font-size="10" fill="#d8dee9" font-family="JetBrains Mono, monospace" text-anchor="end" dominant-baseline="central">int</text>
          <rect x="158" y="56" width="20" height="13" rx="2" fill="rgba(180,142,173,0.2)" stroke="#b48ead" stroke-width="0.5"/>
