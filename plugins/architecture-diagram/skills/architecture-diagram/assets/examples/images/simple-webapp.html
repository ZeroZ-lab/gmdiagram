<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Web Application</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #faf9f6;
      color: #1a1a2e;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container { max-width: 900px; margin: 0 auto; }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .sketch-dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: #e74c3c;
      border: 2px solid #2c3e50;
    }
    h1 { font-size: 24px; font-weight: 700; color: #2c3e50; letter-spacing: -0.5px; }
    .subtitle { font-size: 14px; color: #7f8c8d; margin-top: 2px; }
    .diagram-container {
      background: white;
      border: 2.5px solid #2c3e50;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 28px;
      box-shadow: 3px 3px 0px rgba(0,0,0,0.1);
      overflow-x: auto;
    }
    .diagram-container svg {
      width: 100%;
      min-width: 600px;
      height: auto;
      display: block;
    }
    .footer {
      font-size: 11px;
      color: #bdc3c7;
      text-align: center;
      padding-top: 14px;
      border-top: 2px dashed #ecf0f1;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="sketch-dot"></div>
      <div>
        <h1>Simple Web Application</h1>
        <div class="subtitle">Frontend + Backend + Database three-tier architecture</div>
      </div>
    </div>

    <div class="diagram-container">
      <svg viewBox="0 0 1000 603" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="arrowhead-sketch" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#2c3e50" stroke="none"/>
          </marker>
          <marker id="arrowhead-sketch-rev" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
            <polygon points="10 0, 0 3.5, 10 7" fill="#2c3e50" stroke="none"/>
          </marker>
        </defs>

        <!-- === CONNECTIONS (drawn first, behind components) === -->

        <!-- Frontend -> Backend (unidirectional) -->
        <path d="M 500 156 L 500 206" stroke="#2c3e50" stroke-width="2.5"
              fill="none" marker-end="url(#arrowhead-sketch)"
              stroke-linecap="round"/>
        <g transform="translate(500, 181)">
          <rect x="-30" y="-10" width="60" height="20" rx="2" fill="white"/>
          <text x="0" y="0" font-size="10" fill="#2c3e50" font-family="Segoe UI, sans-serif"
                text-anchor="middle" dominant-baseline="central" font-weight="600">REST API</text>
        </g>

        <!-- Backend <-> Database (bidirectional) -->
        <path d="M 500 322 L 500 372" stroke="#2c3e50" stroke-width="2.5"
              fill="none" marker-start="url(#arrowhead-sketch-rev)" marker-end="url(#arrowhead-sketch)"
              stroke-linecap="round"/>
        <g transform="translate(500, 347)">
          <rect x="-16" y="-10" width="32" height="20" rx="2" fill="white"/>
          <text x="0" y="0" font-size="10" fill="#2c3e50" font-family="Segoe UI, sans-serif"
                text-anchor="middle" dominant-baseline="central" font-weight="600">SQL</text>
        </g>

        <!-- === LAYER 1: Frontend === -->
        <g>
          <rect x="40" y="40" width="920" height="116" rx="6"
                fill="#ebf5fb" stroke="#3498db" stroke-width="2.5"/>
          <text x="60" y="62" font-size="15" font-weight="700" fill="#2c3e50"
                font-family="Segoe UI, sans-serif"
                text-anchor="start" dominant-baseline="central">Frontend</text>

          <!-- Module: React App with tech badges -->
          <g transform="translate(448, 83)">
            <rect width="104" height="65" rx="4"
                  fill="white" stroke="#3498db" stroke-width="2"/>
            <text x="52" y="24" font-size="13" font-weight="600" fill="#2c3e50"
                  font-family="Segoe UI, sans-serif"
                  text-anchor="middle" dominant-baseline="central">React App</text>
            <!-- Tech badge: React -->
            <rect x="12" y="42" width="38" height="16" rx="3"
                  fill="#ebf5fb" stroke="#3498db" stroke-width="1"/>
            <text x="31" y="50" font-size="8" fill="#3498db" font-family="Segoe UI, sans-serif"
                  text-anchor="middle" dominant-baseline="central">React</text>
            <!-- Tech badge: TypeScript -->
            <rect x="56" y="42" width="58" height="16" rx="3"
                  fill="#ebf5fb" stroke="#3498db" stroke-width="1"/>
            <text x="85" y="50" font-size="8" fill="#3498db" font-family="Segoe UI, sans-serif"
                  text-anchor="middle" dominant-baseline="central">TypeScript</text>
          </g>
        </g>

        <!-- === LAYER 2: Backend API === -->
        <g>
          <rect x="40" y="206" width="920" height="116" rx="6"
                fill="#eafaf1" stroke="#27ae60" stroke-width="2.5"/>
          <text x="60" y="228" font-size="15" font-weight="700" fill="#2c3e50"
                font-family="Segoe UI, sans-serif"
                text-anchor="start" dominant-baseline="central">Backend API</text>

          <!-- Module: API Server with tech badge -->
          <g transform="translate(370, 249)">
            <rect width="112" height="65" rx="4"
                  fill="white" stroke="#27ae60" stroke-width="2"/>
            <text x="56" y="24" font-size="13" font-weight="600" fill="#2c3e50"
                  font-family="Segoe UI, sans-serif"
                  text-anchor="middle" dominant-baseline="central">API Server</text>
            <!-- Tech badge: Node.js -->
            <rect x="32" y="42" width="48" height="16" rx="3"
                  fill="#eafaf1" stroke="#27ae60" stroke-width="1"/>
            <text x="56" y="50" font-size="8" fill="#27ae60" font-family="Segoe UI, sans-serif"
                  text-anchor="middle" dominant-baseline="central">Node.js</text>
          </g>

          <!-- Module: Auth Service (security type, dashed border) -->
          <g transform="translate(502, 249)">
            <rect width="128" height="65" rx="4"
                  fill="white" stroke="#e74c3c" stroke-width="2" stroke-dasharray="6,3"/>
            <text x="64" y="32" font-size="13" font-weight="600" fill="#2c3e50"
                  font-family="Segoe UI, sans-serif"
                  text-anchor="middle" dominant-baseline="central">Auth Service</text>
          </g>
        </g>

        <!-- === LAYER 3: Database === -->
        <g>
          <rect x="40" y="372" width="920" height="101" rx="6"
                fill="#f5eef8" stroke="#8e44ad" stroke-width="2.5"/>
          <text x="60" y="394" font-size="15" font-weight="700" fill="#2c3e50"
                font-family="Segoe UI, sans-serif"
                text-anchor="start" dominant-baseline="central">Database</text>

          <!-- Module: PostgreSQL (data type with cylinder hint) -->
          <g transform="translate(444, 415)">
            <rect width="112" height="50" rx="4"
                  fill="white" stroke="#8e44ad" stroke-width="2"/>
            <ellipse cx="56" cy="5" rx="40" ry="5" fill="none"
                     stroke="#8e44ad" stroke-width="0.8" stroke-dasharray="3,2"/>
            <text x="56" y="30" font-size="13" font-weight="600" fill="#2c3e50"
                  font-family="Segoe UI, sans-serif"
                  text-anchor="middle" dominant-baseline="central">PostgreSQL</text>
          </g>
        </g>

        <!-- === LEGEND === -->
        <g transform="translate(40, 523)">
          <!-- Frontend (module type) -->
          <rect x="0" y="0" width="14" height="14" rx="2" fill="#ebf5fb" stroke="#3498db" stroke-width="1.5"/>
          <text x="20" y="7" font-size="10" fill="#7f8c8d" font-family="Segoe UI, sans-serif"
                text-anchor="start" dominant-baseline="central">Frontend</text>

          <!-- Service (process type) -->
          <g transform="translate(100, 0)">
            <rect width="14" height="14" rx="2" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
            <text x="20" y="7" font-size="10" fill="#7f8c8d" font-family="Segoe UI, sans-serif"
                  text-anchor="start" dominant-baseline="central">Service</text>
          </g>

          <!-- Auth (security type, dashed) -->
          <g transform="translate(200, 0)">
            <rect width="14" height="14" rx="2" fill="white" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4,2"/>
            <text x="20" y="7" font-size="10" fill="#7f8c8d" font-family="Segoe UI, sans-serif"
                  text-anchor="start" dominant-baseline="central">Auth</text>
          </g>

          <!-- Database (data type) -->
          <g transform="translate(280, 0)">
            <rect width="14" height="14" rx="2" fill="#f5eef8" stroke="#8e44ad" stroke-width="1.5"/>
            <text x="20" y="7" font-size="10" fill="#7f8c8d" font-family="Segoe UI, sans-serif"
                  text-anchor="start" dominant-baseline="central">Database</text>
          </g>
        </g>

      </svg>
    </div>

    <div class="footer">
      Generated by gmdiagram &middot; Sketch Style &middot; 2026-04-12
    </div>
  </div>
</body>
</html>
