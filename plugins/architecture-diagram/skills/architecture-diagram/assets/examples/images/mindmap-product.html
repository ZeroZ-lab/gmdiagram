<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Launch Plan</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f9f5eb;
      color: #3c3836;
      font-family: Georgia, 'Times New Roman', system-ui, serif;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container { max-width: 960px; margin: 0 auto; }
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 30px;
    }
    .warm-dot {
      width: 14px; height: 14px; border-radius: 50%;
      background: #b45309;
      box-shadow: 0 0 6px rgba(180, 83, 9, 0.25);
    }
    h1 {
      font-size: 26px;
      font-weight: 700;
      color: #3c3836;
      letter-spacing: -0.3px;
    }
    .subtitle {
      font-size: 14px;
      color: #78716c;
      margin-top: 3px;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .diagram-container {
      background: #fffdf7;
      border: 2px solid #d5c4a1;
      border-radius: 12px;
      padding: 28px;
      margin-bottom: 30px;
      box-shadow: 3px 3px 0px rgba(180, 83, 9, 0.1);
      overflow-x: auto;
    }
    .diagram-container svg {
      width: 100%;
      min-width: 700px;
      height: auto;
      display: block;
    }
    .footer {
      font-size: 11px;
      color: #a89984;
      text-align: center;
      padding-top: 16px;
      border-top: 2px dashed #d5c4a1;
      font-family: system-ui, -apple-system, sans-serif;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="warm-dot"></div>
      <div>
        <h1>Product Launch Plan</h1>
        <div class="subtitle">Feature roadmap and team responsibilities</div>
      </div>
    </div>

    <div class="diagram-container">
      <svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
        <style>
          /* Mind Map Node Styles */
          .mindmap-node {
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            font-family: Georgia, 'Times New Roman', serif;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
          }
          .node-label {
            display: inline-block;
            line-height: 1.2;
          }

          /* Central node */
          .type-central {
            width: 120px;
            height: 50px;
            border-radius: 25px;
            background: rgba(180, 83, 9, 0.15);
            border: 2.5px solid #b45309;
            font-size: 13px;
            font-weight: 700;
            color: #3c3836;
            padding: 0 12px;
          }
          .type-central .node-label {
            font-size: 13px;
            font-weight: 700;
            color: #3c3836;
          }

          /* Branch node - Level 1 */
          .type-branch {
            height: 32px;
            min-width: 60px;
            padding: 0 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            color: #3c3836;
          }
          .type-branch .node-label {
            font-size: 11px;
            font-weight: 600;
            color: #3c3836;
          }

          /* Leaf node - Level 2+ */
          .type-leaf {
            height: 28px;
            min-width: 50px;
            padding: 0 10px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 400;
            color: #3c3836;
          }
          .type-leaf .node-label {
            font-size: 10px;
            font-weight: 400;
            color: #3c3836;
          }

          /* Warm-cozy color variants */
          .color-emerald-l1 {
            background: #dcfce7;
            border: 1.8px solid #15803d;
          }
          .color-emerald-l2 {
            background: #f0fdf4;
            border: 1.2px solid #22c55e;
          }

          .color-amber-l1 {
            background: #fef3c7;
            border: 1.8px solid #b45309;
          }
          .color-amber-l2 {
            background: #fefce8;
            border: 1.2px solid #d97706;
          }

          .color-violet-l1 {
            background: #f3e8ff;
            border: 1.8px solid #7e22ce;
          }
          .color-violet-l2 {
            background: #faf5ff;
            border: 1.2px solid #a855f7;
          }
        </style>

        <!-- Decorative accents -->
        <circle cx="30" cy="30" r="4" fill="#fef3c7" stroke="#d5c4a1" stroke-width="1"/>
        <circle cx="970" cy="30" r="3" fill="#dcfce7" stroke="#d5c4a1" stroke-width="1"/>
        <circle cx="30" cy="570" r="3" fill="#f3e8ff" stroke="#d5c4a1" stroke-width="1"/>
        <circle cx="970" cy="570" r="4" fill="#fefce8" stroke="#d5c4a1" stroke-width="1"/>

        <!-- ============================================= -->
        <!-- CONNECTIONS (drawn first, behind all nodes)   -->
        <!-- ============================================= -->

        <!-- Central -> Marketing (left branch) -->
        <path d="M 440,340 C 400,340 360,220 320,220"
              fill="none" stroke="#15803d" stroke-width="2" opacity="0.6"
              stroke-linecap="round" stroke-linejoin="round"/>

        <!-- Central -> Development (top branch) -->
        <path d="M 500,315 C 500,275 500,175 500,135"
              fill="none" stroke="#b45309" stroke-width="2" opacity="0.6"
              stroke-linecap="round" stroke-linejoin="round"/>

        <!-- Central -> Operations (right branch) -->
        <path d="M 560,340 C 600,340 640,460 680,460"
              fill="none" stroke="#7e22ce" stroke-width="2" opacity="0.6"
              stroke-linecap="round" stroke-linejoin="round"/>

        <!-- Marketing -> Social Media -->
        <path d="M 228,220 C 188,220 148,180 108,180"
              fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.5"
              stroke-linecap="round" stroke-linejoin="round"/>

        <!-- Marketing -> Email Campaign -->
        <path d="M 228,220 C 188,220 148,260 108,260"
              fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.5"
              stroke-linecap="round" stroke-linejoin="round"/>

        <!-- Development -> Frontend -->
        <path d="M 500,119 C 500,79 440,60 400,60"
              fill="none" stroke="#d97706" stroke-width="1.5" opacity="0.5"
              stroke-linecap="round" stroke-linejoin="round"/>

        <!-- Development -> Backend -->
        <path d="M 500,119 C 500,79 500,60 500,60"
              fill="none" stroke="#d97706" stroke-width="1.5" opacity="0.5"
              stroke-linecap="round" stroke-linejoin="round"/>

        <!-- Development -> Testing -->
        <path d="M 500,119 C 500,79 560,60 600,60"
              fill="none" stroke="#d97706" stroke-width="1.5" opacity="0.5"
              stroke-linecap="round" stroke-linejoin="round"/>

        <!-- Operations -> Infrastructure -->
        <path d="M 772,460 C 812,460 852,420 892,420"
              fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.5"
              stroke-linecap="round" stroke-linejoin="round"/>

        <!-- Operations -> Monitoring -->
        <path d="M 772,460 C 812,460 852,500 892,500"
              fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.5"
              stroke-linecap="round" stroke-linejoin="round"/>

        <!-- ============================================= -->
        <!-- NODES (foreignObject + CSS)                   -->
        <!-- ============================================= -->

        <!-- Central Node: Product Launch -->
        <foreignObject x="440" y="315" width="120" height="50" xmlns="http://www.w3.org/1999/xhtml">
          <div class="mindmap-node type-central">
            <span class="node-label">Product Launch</span>
          </div>
        </foreignObject>

        <!-- LEFT BRANCH: Marketing -->
        <foreignObject x="228" y="204" width="92" height="32" xmlns="http://www.w3.org/1999/xhtml">
          <div class="mindmap-node type-branch color-emerald-l1">
            <span class="node-label">Marketing</span>
          </div>
        </foreignObject>

        <!-- Marketing -> Social Media -->
        <foreignObject x="30" y="166" width="108" height="28" xmlns="http://www.w3.org/1999/xhtml">
          <div class="mindmap-node type-leaf color-emerald-l2">
            <span class="node-label">Social Media</span>
          </div>
        </foreignObject>

        <!-- Marketing -> Email Campaign -->
        <foreignObject x="20" y="246" width="118" height="28" xmlns="http://www.w3.org/1999/xhtml">
          <div class="mindmap-node type-leaf color-emerald-l2">
            <span class="node-label">Email Campaign</span>
          </div>
        </foreignObject>

        <!-- TOP BRANCH: Development -->
        <foreignObject x="438" y="119" width="104" height="32" xmlns="http://www.w3.org/1999/xhtml">
          <div class="mindmap-node type-branch color-amber-l1">
            <span class="node-label">Development</span>
          </div>
        </foreignObject>

        <!-- Development -> Frontend -->
        <foreignObject x="330" y="46" width="80" height="28" xmlns="http://www.w3.org/1999/xhtml">
          <div class="mindmap-node type-leaf color-amber-l2">
            <span class="node-label">Frontend</span>
          </div>
        </foreignObject>

        <!-- Development -> Backend -->
        <foreignObject x="455" y="46" width="80" height="28" xmlns="http://www.w3.org/1999/xhtml">
          <div class="mindmap-node type-leaf color-amber-l2">
            <span class="node-label">Backend</span>
          </div>
        </foreignObject>

        <!-- Development -> Testing -->
        <foreignObject x="560" y="46" width="70" height="28" xmlns="http://www.w3.org/1999/xhtml">
          <div class="mindmap-node type-leaf color-amber-l2">
            <span class="node-label">Testing</span>
          </div>
        </foreignObject>

        <!-- RIGHT BRANCH: Operations -->
        <foreignObject x="680" y="444" width="92" height="32" xmlns="http://www.w3.org/1999/xhtml">
          <div class="mindmap-node type-branch color-violet-l1">
            <span class="node-label">Operations</span>
          </div>
        </foreignObject>

        <!-- Operations -> Infrastructure -->
        <foreignObject x="862" y="406" width="108" height="28" xmlns="http://www.w3.org/1999/xhtml">
          <div class="mindmap-node type-leaf color-violet-l2">
            <span class="node-label">Infrastructure</span>
          </div>
        </foreignObject>

        <!-- Operations -> Monitoring -->
        <foreignObject x="872" y="486" width="88" height="28" xmlns="http://www.w3.org/1999/xhtml">
          <div class="mindmap-node type-leaf color-violet-l2">
            <span class="node-label">Monitoring</span>
          </div>
        </foreignObject>

      </svg>
    </div>

    <div class="footer">
      Generated by gmdiagram &middot; Warm Cozy &middot; 2026-04-12
    </div>
  </div>
</body>
</html>
