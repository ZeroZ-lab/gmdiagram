<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Login Flow</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #020617; color: #e2e8f0;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      min-height: 100vh; padding: 40px 20px;
    }
    .container { max-width: 1100px; margin: 0 auto; }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
    .pulse-dot { width: 10px; height: 10px; border-radius: 50%; background: #22d3ee; box-shadow: 0 0 8px rgba(34,211,238,0.6); animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    h1 { font-size: 22px; font-weight: 700; color: #f1f5f9; }
    .subtitle { font-size: 13px; color: #64748b; margin-top: 4px; }
    .diagram-container { background: #0f172a; border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 24px; margin-bottom: 32px; overflow-x: auto; }
    .diagram-container svg { width: 100%; min-width: 700px; height: auto; display: block; }
    .footer { font-size: 11px; color: #475569; text-align: center; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.04); }
    .seq-actor { min-width: 100px; height: 36px; border-radius: 6px; display: flex; align-items: center; justify-content: center; padding: 0 12px; font-size: 11px; font-weight: 600; color: white; font-family: 'JetBrains Mono', monospace; white-space: nowrap; }
    .type-participant { background: rgba(8,51,68,0.4); border: 1.5px solid #22d3ee; }
    .type-boundary { background: rgba(136,19,55,0.4); border: 1.5px solid #fb7185; border-style: dashed; }
    .type-entity { background: rgba(76,29,149,0.4); border: 1.5px solid #a78bfa; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="pulse-dot"></div>
      <div>
        <h1>User Login Flow</h1>
        <div class="subtitle">Authentication sequence with credential validation and token generation</div>
      </div>
    </div>
    <div class="diagram-container">
      <svg viewBox="0 0 880 640" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/></marker>
          <marker id="arrowhead-dim" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#64748b"/></marker>
        </defs>
        <!-- Actor: User (stick figure) -->
        <g transform="translate(80, 10)">
          <circle cx="40" cy="12" r="10" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
          <line x1="40" y1="22" x2="40" y2="42" stroke="#94a3b8" stroke-width="1.5"/>
          <line x1="25" y1="32" x2="55" y2="32" stroke="#94a3b8" stroke-width="1.5"/>
          <line x1="40" y1="42" x2="28" y2="56" stroke="#94a3b8" stroke-width="1.5"/>
          <line x1="40" y1="42" x2="52" y2="56" stroke="#94a3b8" stroke-width="1.5"/>
          <text x="40" y="70" font-size="11" fill="#cbd5e1" text-anchor="middle" font-family="JetBrains Mono, monospace">User</text>
        </g>
        <!-- Actor: Client App -->
        <g transform="translate(225, 10)">
          <foreignObject width="110" height="36"><div xmlns="http://www.w3.org/1999/xhtml" class="seq-actor type-participant">Client App</div></foreignObject>
        </g>
        <!-- Actor: Auth Server -->
        <g transform="translate(435, 10)">
          <foreignObject width="110" height="36"><div xmlns="http://www.w3.org/1999/xhtml" class="seq-actor type-boundary">Auth Server</div></foreignObject>
        </g>
        <!-- Actor: Database -->
        <g transform="translate(645, 10)">
          <foreignObject width="110" height="36"><div xmlns="http://www.w3.org/1999/xhtml" class="seq-actor type-entity">Database</div></foreignObject>
        </g>
        <!-- Lifelines -->
        <line x1="120" y1="85" x2="120" y2="620" stroke="#475569" stroke-width="1" stroke-dasharray="6,4"/>
        <line x1="280" y1="85" x2="280" y2="620" stroke="#475569" stroke-width="1" stroke-dasharray="6,4"/>
        <line x1="490" y1="85" x2="490" y2="620" stroke="#475569" stroke-width="1" stroke-dasharray="6,4"/>
        <line x1="700" y1="85" x2="700" y2="620" stroke="#475569" stroke-width="1" stroke-dasharray="6,4"/>
        <!-- Alt fragment -->
        <rect x="160" y="310" width="560" height="300" rx="4" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
        <rect x="160" y="310" width="30" height="18" rx="2" fill="#22d3ee"/>
        <text x="175" y="323" font-size="10" fill="#020617" font-weight="700" text-anchor="middle" font-family="JetBrains Mono, monospace">alt</text>
        <text x="200" y="323" font-size="10" fill="#22d3ee" font-family="JetBrains Mono, monospace">[credentials valid]</text>
        <line x1="160" y1="460" x2="720" y2="460" stroke="#22d3ee" stroke-width="1" stroke-dasharray="4,4"/>
        <text x="200" y="475" font-size="10" fill="#22d3ee" font-family="JetBrains Mono, monospace">[credentials invalid]</text>
        <!-- 1. User -> Client -->
        <line x1="120" y1="110" x2="270" y2="110" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="195" y="103" font-size="9" fill="#94a3b8" text-anchor="middle" font-family="JetBrains Mono, monospace">Enter credentials</text>
        <!-- 2. Client -> Auth -->
        <line x1="280" y1="150" x2="480" y2="150" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="380" y="143" font-size="9" fill="#94a3b8" text-anchor="middle" font-family="JetBrains Mono, monospace">POST /api/login</text>
        <!-- 3. Auth -> DB -->
        <line x1="490" y1="190" x2="690" y2="190" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="590" y="183" font-size="9" fill="#94a3b8" text-anchor="middle" font-family="JetBrains Mono, monospace">SELECT user WHERE email=?</text>
        <!-- 4. DB -> Auth (return) -->
        <line x1="690" y1="230" x2="500" y2="230" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowhead-dim)"/>
        <text x="595" y="223" font-size="9" fill="#64748b" text-anchor="middle" font-family="JetBrains Mono, monospace">User record</text>
        <!-- 5. Auth -> Auth (self) -->
        <path d="M 500,270 L 540,270 L 540,290 L 500,290" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="555" y="283" font-size="9" fill="#94a3b8" font-family="JetBrains Mono, monospace">Verify password</text>
        <!-- 6. Auth -> Client (return) -->
        <line x1="480" y1="340" x2="290" y2="340" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowhead-dim)"/>
        <text x="385" y="333" font-size="9" fill="#64748b" text-anchor="middle" font-family="JetBrains Mono, monospace">200 OK + JWT token</text>
        <!-- 7. Client -> User -->
        <line x1="270" y1="380" x2="130" y2="380" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="200" y="373" font-size="9" fill="#94a3b8" text-anchor="middle" font-family="JetBrains Mono, monospace">Redirect to dashboard</text>
        <!-- 8. Auth -> Client (return, invalid) -->
        <line x1="480" y1="490" x2="290" y2="490" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowhead-dim)"/>
        <text x="385" y="483" font-size="9" fill="#64748b" text-anchor="middle" font-family="JetBrains Mono, monospace">401 Unauthorized</text>
        <!-- 9. Client -> User -->
        <line x1="270" y1="530" x2="130" y2="530" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="200" y="523" font-size="9" fill="#94a3b8" text-anchor="middle" font-family="JetBrains Mono, monospace">Show error message</text>
        <!-- 10. User -> Client -->
        <line x1="120" y1="570" x2="270" y2="570" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="195" y="563" font-size="9" fill="#94a3b8" text-anchor="middle" font-family="JetBrains Mono, monospace">Retry login</text>
      </svg>
    </div>
    <div class="footer">Generated by gmdiagram &middot; 2026-04-14</div>
  </div>
</body>
</html>
