<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog System</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #020617; color: #e2e8f0; font-family: 'JetBrains Mono', monospace; min-height: 100vh; padding: 40px 20px; }
    .container { max-width: 1000px; margin: 0 auto; }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
    .pulse-dot { width: 10px; height: 10px; border-radius: 50%; background: #22d3ee; box-shadow: 0 0 8px rgba(34,211,238,0.6); animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    h1 { font-size: 22px; font-weight: 700; color: #f1f5f9; }
    .subtitle { font-size: 13px; color: #64748b; margin-top: 4px; }
    .diagram-container { background: #0f172a; border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 24px; margin-bottom: 32px; overflow-x: auto; }
    .diagram-container svg { width: 100%; min-width: 700px; height: auto; display: block; }
    .footer { font-size: 11px; color: #475569; text-align: center; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.04); }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="pulse-dot"></div>
      <div>
        <h1>Blog System</h1>
        <div class="subtitle">Content management database schema</div>
      </div>
    </div>

    <div class="diagram-container">
      <svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(51, 65, 85, 0.3)" stroke-width="0.5"/>
          </pattern>
          <marker id="er-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
          </marker>
        </defs>

        <style>
          .er-entity {
            border-collapse: collapse;
            width: 100%;
            font-family: 'JetBrains Mono', monospace;
            background: var(--entity-bg);
            border: 1.5px solid var(--entity-color);
            border-radius: 6px;
            overflow: hidden;
          }
          .er-entity .entity-header th {
            background: var(--entity-color);
            color: white;
            font-size: 12px;
            font-weight: 600;
            padding: 6px 12px;
            text-align: left;
            border: none;
          }
          .er-entity td {
            font-size: 11px;
            padding: 3px 12px;
            border-top: 0.5px solid rgba(255,255,255,0.1);
            vertical-align: middle;
            height: 22px;
          }
          .er-entity .attr-name {
            color: var(--text-color);
            text-align: left;
            white-space: nowrap;
          }
          .er-entity .attr-name.pk {
            color: var(--accent-color);
            text-decoration: underline;
            font-weight: 600;
          }
          .er-entity .attr-name.fk {
            color: var(--text-color);
            font-style: italic;
          }
          .er-entity .attr-type {
            color: var(--muted-color);
            font-size: 10px;
            text-align: left;
            white-space: nowrap;
          }
          .er-entity .attr-badge,
          .er-entity .attr-constraint {
            font-size: 9px;
            text-align: right;
            white-space: nowrap;
          }
          .er-entity .pk-badge {
            display: inline-block;
            background: rgba(251,191,36,0.2);
            color: #fbbf24;
            border: 0.5px solid #fbbf24;
            border-radius: 2px;
            padding: 1px 4px;
            font-size: 7px;
            font-weight: 600;
            line-height: 1;
          }
          .er-entity .fk-badge {
            display: inline-block;
            background: rgba(167,139,250,0.2);
            color: #a78bfa;
            border: 0.5px solid #a78bfa;
            border-radius: 2px;
            padding: 1px 4px;
            font-size: 7px;
            font-weight: 600;
            line-height: 1;
          }
        </style>

        <rect width="1000" height="600" fill="url(#grid)"/>

        <!-- RELATIONSHIP LINES -->

        <!-- User 1:N Post -->
        <line x1="280" y1="159" x2="520" y2="159" stroke="#64748b" stroke-width="1.5" marker-end="url(#er-arrow)"/>
        <rect x="290" y="151" width="24" height="16" rx="3" fill="#020617" opacity="0.9"/>
        <text x="302" y="163" font-size="10" fill="#94a3b8" font-family="JetBrains Mono, monospace" text-anchor="middle" font-weight="600">1</text>
        <rect x="486" y="151" width="24" height="16" rx="3" fill="#020617" opacity="0.9"/>
        <text x="498" y="163" font-size="10" fill="#94a3b8" font-family="JetBrains Mono, monospace" text-anchor="middle" font-weight="600">N</text>

        <!-- User 1:N Comment -->
        <path d="M 180,229 L 180,380 L 180,380" fill="none" stroke="#64748b" stroke-width="1.5"/>
        <path d="M 180,229 L 180,300 L 120,300 L 120,350" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#er-arrow)"/>
        <rect x="168" y="242" width="24" height="16" rx="3" fill="#020617" opacity="0.9"/>
        <text x="180" y="254" font-size="10" fill="#94a3b8" font-family="JetBrains Mono, monospace" text-anchor="middle" font-weight="600">1</text>
        <rect x="108" y="322" width="24" height="16" rx="3" fill="#020617" opacity="0.9"/>
        <text x="120" y="334" font-size="10" fill="#94a3b8" font-family="JetBrains Mono, monospace" text-anchor="middle" font-weight="600">N</text>

        <!-- Post 1:N Comment -->
        <path d="M 520,229 L 520,300 L 280,300 L 280,350" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#er-arrow)"/>
        <rect x="508" y="242" width="24" height="16" rx="3" fill="#020617" opacity="0.9"/>
        <text x="520" y="254" font-size="10" fill="#94a3b8" font-family="JetBrains Mono, monospace" text-anchor="middle" font-weight="600">1</text>
        <rect x="268" y="322" width="24" height="16" rx="3" fill="#020617" opacity="0.9"/>
        <text x="280" y="334" font-size="10" fill="#94a3b8" font-family="JetBrains Mono, monospace" text-anchor="middle" font-weight="600">N</text>

        <!-- Post 1:N PostTag -->
        <line x1="620" y1="207" x2="620" y2="350" stroke="#64748b" stroke-width="1.5" marker-end="url(#er-arrow)"/>
        <rect x="608" y="220" width="24" height="16" rx="3" fill="#020617" opacity="0.9"/>
        <text x="620" y="232" font-size="10" fill="#94a3b8" font-family="JetBrains Mono, monospace" text-anchor="middle" font-weight="600">1</text>
        <rect x="608" y="322" width="24" height="16" rx="3" fill="#020617" opacity="0.9"/>
        <text x="620" y="334" font-size="10" fill="#94a3b8" font-family="JetBrains Mono, monospace" text-anchor="middle" font-weight="600">N</text>

        <!-- Tag 1:N PostTag -->
        <line x1="820" y1="207" x2="820" y2="350" stroke="#64748b" stroke-width="1.5" marker-end="url(#er-arrow)"/>
        <rect x="808" y="220" width="24" height="16" rx="3" fill="#020617" opacity="0.9"/>
        <text x="820" y="232" font-size="10" fill="#94a3b8" font-family="JetBrains Mono, monospace" text-anchor="middle" font-weight="600">1</text>
        <rect x="808" y="322" width="24" height="16" rx="3" fill="#020617" opacity="0.9"/>
        <text x="820" y="334" font-size="10" fill="#94a3b8" font-family="JetBrains Mono, monospace" text-anchor="middle" font-weight="600">N</text>

        <!-- ENTITIES -->

        <!-- User Entity -->
        <g transform="translate(80, 100)">
          <foreignObject width="200" height="129">
            <table xmlns="http://www.w3.org/1999/xhtml" class="er-entity" style="--entity-bg:#0f172a; --entity-color:#22d3ee; --text-color:#e2e8f0; --muted-color:#64748b; --accent-color:#fbbf24;">
              <tr class="entity-header"><th colspan="3">User</th></tr>
              <tr><td class="attr-name pk">id</td><td class="attr-type">int</td><td class="attr-badge"><span class="pk-badge">PK</span></td></tr>
              <tr><td class="attr-name">username</td><td class="attr-type">string</td><td class="attr-constraint">NN</td></tr>
              <tr><td class="attr-name">email</td><td class="attr-type">string</td><td class="attr-constraint">NN</td></tr>
              <tr><td class="attr-name">role</td><td class="attr-type">string</td><td class="attr-constraint"></td></tr>
            </table>
          </foreignObject>
        </g>

        <!-- Post Entity -->
        <g transform="translate(520, 100)">
          <foreignObject width="200" height="140">
            <table xmlns="http://www.w3.org/1999/xhtml" class="er-entity" style="--entity-bg:#0f172a; --entity-color:#34d399; --text-color:#e2e8f0; --muted-color:#64748b; --accent-color:#fbbf24;">
              <tr class="entity-header"><th colspan="3">Post</th></tr>
              <tr><td class="attr-name pk">id</td><td class="attr-type">int</td><td class="attr-badge"><span class="pk-badge">PK</span></td></tr>
              <tr><td class="attr-name">title</td><td class="attr-type">string</td><td class="attr-constraint">NN</td></tr>
              <tr><td class="attr-name">body</td><td class="attr-type">text</td><td class="attr-constraint"></td></tr>
              <tr><td class="attr-name fk">author_id</td><td class="attr-type">int</td><td class="attr-badge"><span class="fk-badge">FK</span></td></tr>
              <tr><td class="attr-name">published_at</td><td class="attr-type">timestamp</td><td class="attr-constraint"></td></tr>
            </table>
          </foreignObject>
        </g>

        <!-- Comment Entity -->
        <g transform="translate(20, 350)">
          <foreignObject width="200" height="140">
            <table xmlns="http://www.w3.org/1999/xhtml" class="er-entity" style="--entity-bg:#0f172a; --entity-color:#a78bfa; --text-color:#e2e8f0; --muted-color:#64748b; --accent-color:#fbbf24;">
              <tr class="entity-header"><th colspan="3">Comment</th></tr>
              <tr><td class="attr-name pk">id</td><td class="attr-type">int</td><td class="attr-badge"><span class="pk-badge">PK</span></td></tr>
              <tr><td class="attr-name fk">post_id</td><td class="attr-type">int</td><td class="attr-badge"><span class="fk-badge">FK</span></td></tr>
              <tr><td class="attr-name fk">author_id</td><td class="attr-type">int</td><td class="attr-badge"><span class="fk-badge">FK</span></td></tr>
              <tr><td class="attr-name">content</td><td class="attr-type">text</td><td class="attr-constraint"></td></tr>
              <tr><td class="attr-name">created_at</td><td class="attr-type">timestamp</td><td class="attr-constraint"></td></tr>
            </table>
          </foreignObject>
        </g>

        <!-- Tag Entity -->
        <g transform="translate(760, 100)">
          <foreignObject width="200" height="107">
            <table xmlns="http://www.w3.org/1999/xhtml" class="er-entity" style="--entity-bg:#0f172a; --entity-color:#fb923c; --text-color:#e2e8f0; --muted-color:#64748b; --accent-color:#fbbf24;">
              <tr class="entity-header"><th colspan="3">Tag</th></tr>
              <tr><td class="attr-name pk">id</td><td class="attr-type">int</td><td class="attr-badge"><span class="pk-badge">PK</span></td></tr>
              <tr><td class="attr-name">name</td><td class="attr-type">string</td><td class="attr-constraint">NN</td></tr>
            </table>
          </foreignObject>
        </g>

        <!-- PostTag Entity (Junction Table) -->
        <g transform="translate(520, 350)">
          <foreignObject width="200" height="118">
            <table xmlns="http://www.w3.org/1999/xhtml" class="er-entity" style="--entity-bg:#0f172a; --entity-color:#f472b6; --text-color:#e2e8f0; --muted-color:#64748b; --accent-color:#fbbf24;">
              <tr class="entity-header"><th colspan="3">PostTag</th></tr>
              <tr><td class="attr-name pk">id</td><td class="attr-type">int</td><td class="attr-badge"><span class="pk-badge">PK</span></td></tr>
              <tr><td class="attr-name fk">post_id</td><td class="attr-type">int</td><td class="attr-badge"><span class="fk-badge">FK</span></td></tr>
              <tr><td class="attr-name fk">tag_id</td><td class="attr-type">int</td><td class="attr-badge"><span class="fk-badge">FK</span></td></tr>
            </table>
          </foreignObject>
        </g>

        <!-- Legend -->
        <g transform="translate(80, 550)">
          <text x="0" y="0" font-size="11" font-weight="600" fill="#94a3b8" font-family="JetBrains Mono, monospace">Legend</text>
          <rect x="0" y="14" width="14" height="14" rx="3" fill="rgba(251,191,36,0.2)" stroke="#fbbf24" stroke-width="0.5"/>
          <text x="20" y="25" font-size="11" fill="#94a3b8" font-family="JetBrains Mono, monospace">Primary Key</text>
          <rect x="140" y="14" width="14" height="14" rx="3" fill="rgba(167,139,250,0.2)" stroke="#a78bfa" stroke-width="0.5"/>
          <text x="160" y="25" font-size="11" fill="#94a3b8" font-family="JetBrains Mono, monospace">Foreign Key</text>
          <rect x="270" y="14" width="14" height="14" rx="3" fill="rgba(100,116,139,0.2)" stroke="#64748b" stroke-width="0.5"/>
          <text x="290" y="25" font-size="11" fill="#94a3b8" font-family="JetBrains Mono, monospace">1:N Relationship</text>
        </g>
      </svg>
    </div>

    <div class="footer">
      Generated by gmdiagram &middot; Dark Professional &middot; 2026-04-14
    </div>
  </div>
</body>
</html>
