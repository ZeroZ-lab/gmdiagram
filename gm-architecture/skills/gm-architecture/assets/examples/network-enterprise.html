<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>企业三层网络架构拓扑图</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #020617;
      color: #e2e8f0;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .pulse-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #22d3ee;
      box-shadow: 0 0 8px rgba(34, 211, 238, 0.6);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    h1 { font-size: 22px; font-weight: 700; color: #f1f5f9; }
    .subtitle { font-size: 13px; color: #64748b; margin-top: 4px; }
    .diagram-container {
      background: #0f172a;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 32px;
      overflow-x: auto;
    }
    .diagram-container svg {
      width: 100%;
      min-width: 900px;
      height: auto;
      display: block;
    }
    .footer {
      font-size: 11px;
      color: #475569;
      text-align: center;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.04);
    }

    /* Network diagram specific styles */
    .zone-box {
      fill: rgba(15, 23, 42, 0.8);
      stroke-width: 2;
      rx: 8;
    }
    .zone-label {
      fill: #f1f5f9;
      font-size: 13px;
      font-weight: 600;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    }
    .zone-subnet {
      fill: #94a3b8;
      font-size: 10px;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    }

    /* Node styles */
    .node-box {
      fill: #0f172a;
      stroke-width: 1.5;
      rx: 6;
    }
    .node-label {
      fill: #f1f5f9;
      font-size: 11px;
      font-weight: 500;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    }
    .node-ip {
      fill: #64748b;
      font-size: 9px;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    }

    /* Type-specific node colors */
    .type-cloud { stroke: #64748b; }
    .type-firewall { stroke: #ef4444; }
    .type-load-balancer { stroke: #f59e0b; }
    .type-server { stroke: #3b82f6; }
    .type-database { stroke: #10b981; }
    .type-dns { stroke: #8b5cf6; }

    /* Connection styles */
    .connection {
      fill: none;
      stroke-width: 1.5;
    }
    .connection-ethernet { stroke: #64748b; }
    .connection-wan { stroke: #22d3ee; stroke-dasharray: 8,4; }
    .connection-label {
      fill: #94a3b8;
      font-size: 9px;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    }
    .connection-label-bg {
      fill: #0f172a;
      rx: 2;
    }

    /* Zone colors */
    .zone-dmz { stroke: #f59e0b; }
    .zone-app { stroke: #3b82f6; }
    .zone-data { stroke: #10b981; }
    .zone-mgmt { stroke: #8b5cf6; }
    .zone-ext { stroke: #64748b; }

    /* Legend */
    .legend-text {
      fill: #cbd5e1;
      font-size: 11px;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="pulse-dot"></div>
      <div>
        <h1>企业三层网络架构拓扑图</h1>
        <div class="subtitle">Enterprise Three-Tier Network Topology - DMZ/Application/Data Zones</div>
      </div>
    </div>

    <div class="diagram-container">
      <svg viewBox="0 0 1100 750" xmlns="http://www.w3.org/2000/svg">
        <!-- Defs -->
        <defs>
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(51, 65, 85, 0.3)" stroke-width="0.5"/>
          </pattern>
          <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
          </marker>
        </defs>

        <!-- Grid background -->
        <rect width="1100" height="750" fill="url(#grid)"/>

        <!-- ==================== ZONE: EXTERNAL (Internet) ==================== -->
        <g>
          <rect x="490" y="20" width="120" height="70" rx="8" fill="rgba(30, 41, 59, 0.5)" stroke="#64748b" stroke-width="1" stroke-dasharray="4,4"/>
          <text x="550" y="45" font-size="12" font-weight="600" fill="#94a3b8" text-anchor="middle">Internet</text>
          <text x="550" y="62" font-size="9" fill="#64748b" text-anchor="middle">Public Network</text>
          <!-- Cloud icon representation -->
          <ellipse cx="550" cy="75" rx="25" ry="12" fill="rgba(100, 116, 139, 0.2)" stroke="#64748b" stroke-width="1"/>
        </g>

        <!-- ==================== ZONE: DMZ (10.0.1.0/24) ==================== -->
        <g>
          <rect x="30" y="120" width="1040" height="140" rx="8" fill="rgba(120, 53, 15, 0.15)" stroke="#f59e0b" stroke-width="1.5"/>
          <text x="55" y="145" font-size="13" font-weight="600" fill="#f59e0b">DMZ Zone</text>
          <text x="145" y="145" font-size="10" fill="#d97706">10.0.1.0/24</text>

          <!-- Firewall -->
          <g>
            <rect x="520" y="170" width="100" height="70" rx="6" fill="#0f172a" stroke="#ef4444" stroke-width="2"/>
            <text x="570" y="200" font-size="11" font-weight="500" fill="#f1f5f9" text-anchor="middle">Firewall</text>
            <text x="570" y="215" font-size="9" fill="#64748b" text-anchor="middle">Palo Alto</text>
            <text x="570" y="228" font-size="9" fill="#ef4444" text-anchor="middle">10.0.1.1</text>
          </g>

          <!-- Load Balancer -->
          <g>
            <rect x="380" y="170" width="100" height="70" rx="6" fill="#0f172a" stroke="#f59e0b" stroke-width="2"/>
            <text x="430" y="200" font-size="11" font-weight="500" fill="#f1f5f9" text-anchor="middle">LoadBalancer</text>
            <text x="430" y="215" font-size="9" fill="#64748b" text-anchor="middle">nginx</text>
            <text x="430" y="228" font-size="9" fill="#f59e0b" text-anchor="middle">10.0.1.10</text>
          </g>

          <!-- WebServer 1 -->
          <g>
            <rect x="150" y="170" width="90" height="70" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5"/>
            <text x="195" y="195" font-size="10" font-weight="500" fill="#f1f5f9" text-anchor="middle">WebServer-1</text>
            <text x="195" y="210" font-size="8" fill="#64748b" text-anchor="middle">Nginx</text>
            <text x="195" y="223" font-size="8" fill="#3b82f6" text-anchor="middle">10.0.1.20</text>
          </g>

          <!-- WebServer 2 -->
          <g>
            <rect x="260" y="170" width="90" height="70" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5"/>
            <text x="305" y="195" font-size="10" font-weight="500" fill="#f1f5f9" text-anchor="middle">WebServer-2</text>
            <text x="305" y="210" font-size="8" fill="#64748b" text-anchor="middle">Nginx</text>
            <text x="305" y="223" font-size="8" fill="#3b82f6" text-anchor="middle">10.0.1.21</text>
          </g>
        </g>

        <!-- ==================== ZONE: APPLICATION (10.0.2.0/24) ==================== -->
        <g>
          <rect x="30" y="290" width="1040" height="160" rx="8" fill="rgba(30, 64, 175, 0.15)" stroke="#3b82f6" stroke-width="1.5"/>
          <text x="55" y="315" font-size="13" font-weight="600" fill="#3b82f6">Application Zone</text>
          <text x="185" y="315" font-size="10" fill="#2563eb">10.0.2.0/24</text>

          <!-- App Server 1 -->
          <g>
            <rect x="80" y="340" width="90" height="70" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5"/>
            <text x="125" y="365" font-size="10" font-weight="500" fill="#f1f5f9" text-anchor="middle">AppServer-1</text>
            <text x="125" y="380" font-size="8" fill="#64748b" text-anchor="middle">Java Microsvc</text>
            <text x="125" y="393" font-size="8" fill="#3b82f6" text-anchor="middle">10.0.2.10</text>
          </g>

          <!-- App Server 2 -->
          <g>
            <rect x="190" y="340" width="90" height="70" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5"/>
            <text x="235" y="365" font-size="10" font-weight="500" fill="#f1f5f9" text-anchor="middle">AppServer-2</text>
            <text x="235" y="380" font-size="8" fill="#64748b" text-anchor="middle">Java Microsvc</text>
            <text x="235" y="393" font-size="8" fill="#3b82f6" text-anchor="middle">10.0.2.11</text>
          </g>

          <!-- App Server 3 -->
          <g>
            <rect x="300" y="340" width="90" height="70" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5"/>
            <text x="345" y="365" font-size="10" font-weight="500" fill="#f1f5f9" text-anchor="middle">AppServer-3</text>
            <text x="345" y="380" font-size="8" fill="#64748b" text-anchor="middle">Java Microsvc</text>
            <text x="345" y="393" font-size="8" fill="#3b82f6" text-anchor="middle">10.0.2.12</text>
          </g>

          <!-- Redis Cluster -->
          <g>
            <rect x="450" y="340" width="100" height="70" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="1.5"/>
            <text x="500" y="365" font-size="11" font-weight="500" fill="#f1f5f9" text-anchor="middle">Redis Cluster</text>
            <text x="500" y="380" font-size="8" fill="#64748b" text-anchor="middle">Cache</text>
            <text x="500" y="393" font-size="8" fill="#10b981" text-anchor="middle">10.0.2.20</text>
          </g>

          <!-- Kafka MQ -->
          <g>
            <rect x="580" y="340" width="100" height="70" rx="6" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5"/>
            <text x="630" y="365" font-size="11" font-weight="500" fill="#f1f5f9" text-anchor="middle">Kafka MQ</text>
            <text x="630" y="380" font-size="8" fill="#64748b" text-anchor="middle">MessageQueue</text>
            <text x="630" y="393" font-size="8" fill="#f59e0b" text-anchor="middle">10.0.2.30</text>
          </g>
        </g>

        <!-- ==================== ZONE: DATA (10.0.3.0/24) ==================== -->
        <g>
          <rect x="30" y="480" width="600" height="140" rx="8" fill="rgba(6, 78, 59, 0.15)" stroke="#10b981" stroke-width="1.5"/>
          <text x="55" y="505" font-size="13" font-weight="600" fill="#10b981">Data Zone</text>
          <text x="140" y="505" font-size="10" fill="#059669">10.0.3.0/24</text>

          <!-- MySQL Master -->
          <g>
            <rect x="80" y="530" width="100" height="70" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="2"/>
            <text x="130" y="555" font-size="11" font-weight="500" fill="#f1f5f9" text-anchor="middle">MySQL Master</text>
            <text x="130" y="570" font-size="8" fill="#64748b" text-anchor="middle">Primary DB</text>
            <text x="130" y="583" font-size="8" fill="#10b981" text-anchor="middle">10.0.3.10</text>
            <!-- Master indicator -->
            <circle cx="165" cy="540" r="6" fill="#10b981"/>
            <text x="165" y="544" font-size="7" fill="white" text-anchor="middle" font-weight="bold">M</text>
          </g>

          <!-- MySQL Slave -->
          <g>
            <rect x="200" y="530" width="100" height="70" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4,2"/>
            <text x="250" y="555" font-size="11" font-weight="500" fill="#f1f5f9" text-anchor="middle">MySQL Slave</text>
            <text x="250" y="570" font-size="8" fill="#64748b" text-anchor="middle">Replica</text>
            <text x="250" y="583" font-size="8" fill="#10b981" text-anchor="middle">10.0.3.11</text>
          </g>

          <!-- Backup Server -->
          <g>
            <rect x="340" y="530" width="100" height="70" rx="6" fill="#0f172a" stroke="#64748b" stroke-width="1.5"/>
            <text x="390" y="555" font-size="11" font-weight="500" fill="#f1f5f9" text-anchor="middle">Backup Server</text>
            <text x="390" y="570" font-size="8" fill="#64748b" text-anchor="middle">Storage</text>
            <text x="390" y="583" font-size="8" fill="#64748b" text-anchor="middle">10.0.3.50</text>
          </g>
        </g>

        <!-- ==================== ZONE: MANAGEMENT (10.0.4.0/24) ==================== -->
        <g>
          <rect x="660" y="480" width="410" height="140" rx="8" fill="rgba(109, 40, 217, 0.15)" stroke="#8b5cf6" stroke-width="1.5"/>
          <text x="685" y="505" font-size="13" font-weight="600" fill="#8b5cf6">Management Zone</text>
          <text x="820" y="505" font-size="10" fill="#7c3aed">10.0.4.0/24</text>

          <!-- Jump Server -->
          <g>
            <rect x="690" y="530" width="100" height="70" rx="6" fill="#0f172a" stroke="#8b5cf6" stroke-width="2"/>
            <text x="740" y="555" font-size="11" font-weight="500" fill="#f1f5f9" text-anchor="middle">JumpServer</text>
            <text x="740" y="570" font-size="8" fill="#64748b" text-anchor="middle">Bastion</text>
            <text x="740" y="583" font-size="8" fill="#8b5cf6" text-anchor="middle">10.0.4.10</text>
          </g>

          <!-- Monitor -->
          <g>
            <rect x="810" y="530" width="110" height="70" rx="6" fill="#0f172a" stroke="#ec4899" stroke-width="1.5"/>
            <text x="865" y="555" font-size="11" font-weight="500" fill="#f1f5f9" text-anchor="middle">Monitor</text>
            <text x="865" y="570" font-size="8" fill="#64748b" text-anchor="middle">Prometheus+Grafana</text>
            <text x="865" y="583" font-size="8" fill="#ec4899" text-anchor="middle">10.0.4.20</text>
          </g>

          <!-- DNS -->
          <g>
            <rect x="940" y="530" width="100" height="70" rx="6" fill="#0f172a" stroke="#8b5cf6" stroke-width="1.5"/>
            <text x="990" y="555" font-size="11" font-weight="500" fill="#f1f5f9" text-anchor="middle">CoreDNS</text>
            <text x="990" y="570" font-size="8" fill="#64748b" text-anchor="middle">DNS Server</text>
            <text x="990" y="583" font-size="8" fill="#8b5cf6" text-anchor="middle">10.0.4.5</text>
          </g>
        </g>

        <!-- ==================== CONNECTIONS ==================== -->
        <!-- Internet -> Firewall -->
        <line x1="550" y1="90" x2="570" y2="170" stroke="#22d3ee" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arrowhead)"/>
        <rect x="535" y="125" width="50" height="16" rx="3" fill="#0f172a" opacity="0.95"/>
        <text x="560" y="137" font-size="9" fill="#22d3ee" text-anchor="middle">1Gbps</text>

        <!-- Firewall -> Load Balancer -->
        <line x1="520" y1="205" x2="480" y2="205" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <rect x="480" y="190" width="40" height="14" rx="2" fill="#0f172a" opacity="0.95"/>
        <text x="500" y="200" font-size="8" fill="#94a3b8" text-anchor="middle">10Gbps</text>

        <!-- Load Balancer -> WebServers -->
        <line x1="380" y1="200" x2="350" y2="200" stroke="#64748b" stroke-width="1" marker-end="url(#arrowhead)"/>
        <line x1="380" y1="210" x2="350" y2="210" stroke="#64748b" stroke-width="1" marker-end="url(#arrowhead)"/>

        <!-- WebServer -> App Server -->
        <line x1="195" y1="240" x2="125" y2="340" stroke="#64748b" stroke-width="1" marker-end="url(#arrowhead)"/>
        <line x1="305" y1="240" x2="235" y2="340" stroke="#64748b" stroke-width="1" marker-end="url(#arrowhead)"/>

        <!-- App Server -> Redis -->
        <line x1="345" y1="375" x2="450" y2="375" stroke="#10b981" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrowhead)"/>
        <rect x="385" y="365" width="40" height="12" rx="2" fill="#0f172a" opacity="0.95"/>
        <text x="405" y="374" font-size="7" fill="#10b981" text-anchor="middle">Cache</text>

        <!-- App Server -> Kafka -->
        <line x1="345" y1="385" x2="580" y2="375" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrowhead)"/>
        <rect x="450" y="380" width="30" height="12" rx="2" fill="#0f172a" opacity="0.95"/>
        <text x="465" y="389" font-size="7" fill="#f59e0b" text-anchor="middle">MQ</text>

        <!-- App Server -> DB Master -->
        <line x1="235" y1="410" x2="130" y2="530" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <rect x="165" y="460" width="50" height="14" rx="2" fill="#0f172a" opacity="0.95"/>
        <text x="190" y="470" font-size="8" fill="#10b981" text-anchor="middle">DB Write</text>

        <!-- DB Master -> DB Slave (Replication) -->
        <line x1="180" y1="565" x2="200" y2="565" stroke="#10b981" stroke-width="2" marker-end="url(#arrowhead)"/>
        <rect x="175" y="550" width="50" height="14" rx="2" fill="#0f172a" opacity="0.95"/>
        <text x="200" y="560" font-size="8" fill="#10b981" text-anchor="middle">Replication</text>

        <!-- DB Master -> Backup -->
        <line x1="180" y1="585" x2="340" y2="565" stroke="#64748b" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrowhead)"/>

        <!-- Jump Server -> All Zones (Management lines) -->
        <!-- DMZ -->
        <line x1="690" y1="550" x2="570" y2="240" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
        <line x1="700" y1="550" x2="430" y2="240" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
        <!-- App -->
        <line x1="710" y1="550" x2="345" y2="410" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
        <!-- Data -->
        <line x1="720" y1="550" x2="180" y2="530" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>

        <!-- Monitor -> All Zones (Monitoring lines) -->
        <line x1="810" y1="560" x2="600" y2="410" stroke="#ec4899" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
        <line x1="820" y1="560" x2="400" y2="410" stroke="#ec4899" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
        <line x1="830" y1="560" x2="250" y2="240" stroke="#ec4899" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>

        <!-- DNS -> App Zone -->
        <line x1="940" y1="565" x2="680" y2="410" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrowhead)"/>
        <rect x="790" y="480" width="30" height="12" rx="2" fill="#0f172a" opacity="0.95"/>
        <text x="805" y="489" font-size="7" fill="#8b5cf6" text-anchor="middle">DNS</text>

        <!-- ==================== LEGEND ==================== -->
        <g transform="translate(30, 650)">
          <text x="0" y="0" font-size="12" font-weight="600" fill="#cbd5e1">Legend</text>

          <!-- DMZ -->
          <rect x="0" y="12" width="14" height="14" rx="3" fill="rgba(120, 53, 15, 0.3)" stroke="#f59e0b" stroke-width="1"/>
          <text x="20" y="23" font-size="10" fill="#cbd5e1">DMZ Zone</text>

          <!-- App -->
          <rect x="100" y="12" width="14" height="14" rx="3" fill="rgba(30, 64, 175, 0.3)" stroke="#3b82f6" stroke-width="1"/>
          <text x="120" y="23" font-size="10" fill="#cbd5e1">App Zone</text>

          <!-- Data -->
          <rect x="200" y="12" width="14" height="14" rx="3" fill="rgba(6, 78, 59, 0.3)" stroke="#10b981" stroke-width="1"/>
          <text x="220" y="23" font-size="10" fill="#cbd5e1">Data Zone</text>

          <!-- Mgmt -->
          <rect x="300" y="12" width="14" height="14" rx="3" fill="rgba(109, 40, 217, 0.3)" stroke="#8b5cf6" stroke-width="1"/>
          <text x="320" y="23" font-size="10" fill="#cbd5e1">Mgmt Zone</text>

          <!-- Management -->
          <line x1="420" y1="19" x2="440" y2="19" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="3,3"/>
          <text x="445" y="23" font-size="10" fill="#cbd5e1">Management SSH</text>

          <!-- Monitoring -->
          <line x1="560" y1="19" x2="580" y2="19" stroke="#ec4899" stroke-width="1" stroke-dasharray="3,3"/>
          <text x="585" y="23" font-size="10" fill="#cbd5e1">Monitoring</text>

          <!-- DB Replication -->
          <line x1="680" y1="19" x2="700" y2="19" stroke="#10b981" stroke-width="2"/>
          <text x="705" y="23" font-size="10" fill="#cbd5e1">DB Replication</text>
        </g>
      </svg>
    </div>

    <div class="footer">
      Generated by gmdiagram &middot; Enterprise Network Topology &middot; 2026-04-14
    </div>
  </div>
</body>
</html>
