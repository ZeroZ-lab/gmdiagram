<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Commerce Database</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #2e3440; color: #eceff4; font-family: 'JetBrains Mono', monospace; min-height: 100vh; padding: 40px 20px; }
    .container { max-width: 1000px; margin: 0 auto; }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
    .blueprint-dot { width: 10px; height: 10px; border-radius: 50%; background: #88c0d0; border: 1px solid #88c0d0; }
    h1 { font-size: 22px; font-weight: 700; color: #eceff4; letter-spacing: 0.5px; }
    .subtitle { font-size: 13px; color: #d8dee9; margin-top: 4px; }
    .diagram-container { background: #3b4252; border: 1px solid #4c566a; border-radius: 2px; padding: 24px; margin-bottom: 32px; overflow-x: auto; }
    .diagram-container svg { width: 100%; min-width: 700px; height: auto; display: block; }
    .footer { font-size: 11px; color: #4c566a; text-align: center; padding-top: 16px; border-top: 1px solid #434c5e; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="blueprint-dot"></div>
      <div>
        <h1>E-Commerce Database</h1>
        <div class="subtitle">Entity relationship diagram for an online store</div>
      </div>
    </div>

    <div class="diagram-container">
      <svg viewBox="0 0 1100 650" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="bp-grid" width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#4c566a" stroke-width="0.3"/>
          </pattern>
          <marker id="er-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#81a1c1"/>
          </marker>
        </defs>

        <style>
          .er-entity {
            border-collapse: collapse;
            width: 100%;
            font-family: 'JetBrains Mono', monospace;
            background: var(--entity-bg);
            border: 1.5px solid var(--entity-color);
            border-radius: 6px;
            overflow: hidden;
          }
          .er-entity .entity-header th {
            background: var(--entity-color);
            color: white;
            font-size: 12px;
            font-weight: 600;
            padding: 6px 12px;
            text-align: left;
            border: none;
          }
          .er-entity td {
            font-size: 11px;
            padding: 3px 12px;
            border-top: 0.5px solid rgba(255,255,255,0.1);
            vertical-align: middle;
            height: 22px;
          }
          .er-entity .attr-name {
            color: var(--text-color);
            text-align: left;
            white-space: nowrap;
          }
          .er-entity .attr-name.pk {
            color: var(--accent-color);
            text-decoration: underline;
            font-weight: 600;
          }
          .er-entity .attr-name.fk {
            color: var(--text-color);
            font-style: italic;
          }
          .er-entity .attr-type {
            color: var(--muted-color);
            font-size: 10px;
            text-align: left;
            white-space: nowrap;
          }
          .er-entity .attr-badge,
          .er-entity .attr-constraint {
            font-size: 9px;
            text-align: right;
            white-space: nowrap;
          }
          .er-entity .pk-badge {
            display: inline-block;
            background: rgba(251,191,36,0.2);
            color: #fbbf24;
            border: 0.5px solid #fbbf24;
            border-radius: 2px;
            padding: 1px 4px;
            font-size: 7px;
            font-weight: 600;
            line-height: 1;
          }
          .er-entity .fk-badge {
            display: inline-block;
            background: rgba(167,139,250,0.2);
            color: #a78bfa;
            border: 0.5px solid #a78bfa;
            border-radius: 2px;
            padding: 1px 4px;
            font-size: 7px;
            font-weight: 600;
            line-height: 1;
          }
        </style>

        <rect width="1100" height="650" fill="url(#bp-grid)"/>

        <!-- RELATIONSHIP LINES -->

        <!-- User 1:N Order -->
        <line x1="280" y1="159" x2="520" y2="159" stroke="#81a1c1" stroke-width="1.5" marker-end="url(#er-arrow)"/>
        <rect x="290" y="151" width="24" height="16" rx="3" fill="#2e3440" opacity="0.9"/>
        <text x="302" y="163" font-size="10" fill="#88c0d0" font-family="JetBrains Mono, monospace" text-anchor="middle" font-weight="600">1</text>
        <rect x="486" y="151" width="24" height="16" rx="3" fill="#2e3440" opacity="0.9"/>
        <text x="498" y="163" font-size="10" fill="#88c0d0" font-family="JetBrains Mono, monospace" text-anchor="middle" font-weight="600">N</text>

        <!-- Order 1:N OrderItem -->
        <line x1="620" y1="229" x2="620" y2="400" stroke="#81a1c1" stroke-width="1.5" marker-end="url(#er-arrow)"/>
        <rect x="608" y="242" width="24" height="16" rx="3" fill="#2e3440" opacity="0.9"/>
        <text x="620" y="254" font-size="10" fill="#88c0d0" font-family="JetBrains Mono, monospace" text-anchor="middle" font-weight="600">1</text>
        <rect x="608" y="372" width="24" height="16" rx="3" fill="#2e3440" opacity="0.9"/>
        <text x="620" y="384" font-size="10" fill="#88c0d0" font-family="JetBrains Mono, monospace" text-anchor="middle" font-weight="600">N</text>

        <!-- Product 1:N OrderItem -->
        <path d="M 280,459 L 450,459 L 450,459 L 520,459" fill="none" stroke="#81a1c1" stroke-width="1.5" marker-end="url(#er-arrow)"/>
        <rect x="290" y="451" width="24" height="16" rx="3" fill="#2e3440" opacity="0.9"/>
        <text x="302" y="463" font-size="10" fill="#88c0d0" font-family="JetBrains Mono, monospace" text-anchor="middle" font-weight="600">1</text>
        <rect x="486" y="451" width="24" height="16" rx="3" fill="#2e3440" opacity="0.9"/>
        <text x="498" y="463" font-size="10" fill="#88c0d0" font-family="JetBrains Mono, monospace" text-anchor="middle" font-weight="600">N</text>

        <!-- Category 1:N Product -->
        <line x1="820" y1="229" x2="820" y2="400" stroke="#81a1c1" stroke-width="1.5" marker-end="url(#er-arrow)"/>
        <rect x="808" y="242" width="24" height="16" rx="3" fill="#2e3440" opacity="0.9"/>
        <text x="820" y="254" font-size="10" fill="#88c0d0" font-family="JetBrains Mono, monospace" text-anchor="middle" font-weight="600">1</text>
        <rect x="808" y="372" width="24" height="16" rx="3" fill="#2e3440" opacity="0.9"/>
        <text x="820" y="384" font-size="10" fill="#88c0d0" font-family="JetBrains Mono, monospace" text-anchor="middle" font-weight="600">N</text>

        <!-- User 1:N Review -->
        <path d="M 180,229 L 180,459 L 180,459 L 180,459" fill="none" stroke="#81a1c1" stroke-width="1.5"/>
        <path d="M 180,229 L 180,350 L 120,350 L 120,400" fill="none" stroke="#81a1c1" stroke-width="1.5" marker-end="url(#er-arrow)"/>
        <rect x="168" y="242" width="24" height="16" rx="3" fill="#2e3440" opacity="0.9"/>
        <text x="180" y="254" font-size="10" fill="#88c0d0" font-family="JetBrains Mono, monospace" text-anchor="middle" font-weight="600">1</text>
        <rect x="108" y="372" width="24" height="16" rx="3" fill="#2e3440" opacity="0.9"/>
        <text x="120" y="384" font-size="10" fill="#88c0d0" font-family="JetBrains Mono, monospace" text-anchor="middle" font-weight="600">N</text>

        <!-- Product 1:N Review -->
        <path d="M 280,505 L 140,505 L 140,505" fill="none" stroke="#81a1c1" stroke-width="1.5" marker-end="url(#er-arrow)"/>
        <rect x="290" y="497" width="24" height="16" rx="3" fill="#2e3440" opacity="0.9"/>
        <text x="302" y="509" font-size="10" fill="#88c0d0" font-family="JetBrains Mono, monospace" text-anchor="middle" font-weight="600">1</text>
        <rect x="108" y="497" width="24" height="16" rx="3" fill="#2e3440" opacity="0.9"/>
        <text x="120" y="509" font-size="10" fill="#88c0d0" font-family="JetBrains Mono, monospace" text-anchor="middle" font-weight="600">N</text>

        <!-- ENTITIES -->

        <!-- User Entity -->
        <g transform="translate(80, 100)">
          <foreignObject width="200" height="129">
            <table xmlns="http://www.w3.org/1999/xhtml" class="er-entity" style="--entity-bg:#2e3440; --entity-color:#88c0d0; --text-color:#eceff4; --muted-color:#d8dee9; --accent-color:#fbbf24;">
              <tr class="entity-header"><th colspan="3">User</th></tr>
              <tr><td class="attr-name pk">id</td><td class="attr-type">int</td><td class="attr-badge"><span class="pk-badge">PK</span></td></tr>
              <tr><td class="attr-name">email</td><td class="attr-type">string</td><td class="attr-constraint">NN</td></tr>
              <tr><td class="attr-name">name</td><td class="attr-type">string</td><td class="attr-constraint"></td></tr>
              <tr><td class="attr-name">created_at</td><td class="attr-type">timestamp</td><td class="attr-constraint"></td></tr>
            </table>
          </foreignObject>
        </g>

        <!-- Order Entity -->
        <g transform="translate(520, 100)">
          <foreignObject width="200" height="129">
            <table xmlns="http://www.w3.org/1999/xhtml" class="er-entity" style="--entity-bg:#2e3440; --entity-color:#a3be8c; --text-color:#eceff4; --muted-color:#d8dee9; --accent-color:#fbbf24;">
              <tr class="entity-header"><th colspan="3">Order</th></tr>
              <tr><td class="attr-name pk">id</td><td class="attr-type">int</td><td class="attr-badge"><span class="pk-badge">PK</span></td></tr>
              <tr><td class="attr-name fk">user_id</td><td class="attr-type">int</td><td class="attr-badge"><span class="fk-badge">FK</span></td></tr>
              <tr><td class="attr-name">total</td><td class="attr-type">float</td><td class="attr-constraint"></td></tr>
              <tr><td class="attr-name">status</td><td class="attr-type">string</td><td class="attr-constraint"></td></tr>
            </table>
          </foreignObject>
        </g>

        <!-- OrderItem Entity -->
        <g transform="translate(520, 400)">
          <foreignObject width="200" height="118">
            <table xmlns="http://www.w3.org/1999/xhtml" class="er-entity" style="--entity-bg:#2e3440; --entity-color:#ebcb8b; --text-color:#eceff4; --muted-color:#d8dee9; --accent-color:#fbbf24;">
              <tr class="entity-header"><th colspan="3">OrderItem</th></tr>
              <tr><td class="attr-name pk">id</td><td class="attr-type">int</td><td class="attr-badge"><span class="pk-badge">PK</span></td></tr>
              <tr><td class="attr-name fk">order_id</td><td class="attr-type">int</td><td class="attr-badge"><span class="fk-badge">FK</span></td></tr>
              <tr><td class="attr-name fk">product_id</td><td class="attr-type">int</td><td class="attr-badge"><span class="fk-badge">FK</span></td></tr>
              <tr><td class="attr-name">quantity</td><td class="attr-type">int</td><td class="attr-constraint"></td></tr>
            </table>
          </foreignObject>
        </g>

        <!-- Product Entity -->
        <g transform="translate(280, 350)">
          <foreignObject width="200" height="151">
            <table xmlns="http://www.w3.org/1999/xhtml" class="er-entity" style="--entity-bg:#2e3440; --entity-color:#b48ead; --text-color:#eceff4; --muted-color:#d8dee9; --accent-color:#fbbf24;">
              <tr class="entity-header"><th colspan="3">Product</th></tr>
              <tr><td class="attr-name pk">id</td><td class="attr-type">int</td><td class="attr-badge"><span class="pk-badge">PK</span></td></tr>
              <tr><td class="attr-name">name</td><td class="attr-type">string</td><td class="attr-constraint">NN</td></tr>
              <tr><td class="attr-name">price</td><td class="attr-type">float</td><td class="attr-constraint">NN</td></tr>
              <tr><td class="attr-name">stock</td><td class="attr-type">int</td><td class="attr-constraint"></td></tr>
              <tr><td class="attr-name fk">category_id</td><td class="attr-type">int</td><td class="attr-badge"><span class="fk-badge">FK</span></td></tr>
            </table>
          </foreignObject>
        </g>

        <!-- Category Entity -->
        <g transform="translate(760, 100)">
          <foreignObject width="200" height="129">
            <table xmlns="http://www.w3.org/1999/xhtml" class="er-entity" style="--entity-bg:#2e3440; --entity-color:#d08770; --text-color:#eceff4; --muted-color:#d8dee9; --accent-color:#fbbf24;">
              <tr class="entity-header"><th colspan="3">Category</th></tr>
              <tr><td class="attr-name pk">id</td><td class="attr-type">int</td><td class="attr-badge"><span class="pk-badge">PK</span></td></tr>
              <tr><td class="attr-name">name</td><td class="attr-type">string</td><td class="attr-constraint">NN</td></tr>
              <tr><td class="attr-name">description</td><td class="attr-type">text</td><td class="attr-constraint"></td></tr>
            </table>
          </foreignObject>
        </g>

        <!-- Review Entity -->
        <g transform="translate(20, 400)">
          <foreignObject width="200" height="140">
            <table xmlns="http://www.w3.org/1999/xhtml" class="er-entity" style="--entity-bg:#2e3440; --entity-color:#5e81ac; --text-color:#eceff4; --muted-color:#d8dee9; --accent-color:#fbbf24;">
              <tr class="entity-header"><th colspan="3">Review</th></tr>
              <tr><td class="attr-name pk">id</td><td class="attr-type">int</td><td class="attr-badge"><span class="pk-badge">PK</span></td></tr>
              <tr><td class="attr-name fk">user_id</td><td class="attr-type">int</td><td class="attr-badge"><span class="fk-badge">FK</span></td></tr>
              <tr><td class="attr-name fk">product_id</td><td class="attr-type">int</td><td class="attr-badge"><span class="fk-badge">FK</span></td></tr>
              <tr><td class="attr-name">rating</td><td class="attr-type">int</td><td class="attr-constraint"></td></tr>
              <tr><td class="attr-name">comment</td><td class="attr-type">text</td><td class="attr-constraint"></td></tr>
            </table>
          </foreignObject>
        </g>

        <!-- Legend -->
        <g transform="translate(80, 580)">
          <text x="0" y="0" font-size="11" font-weight="600" fill="#d8dee9" font-family="JetBrains Mono, monospace">Legend</text>
          <rect x="0" y="14" width="14" height="14" rx="3" fill="rgba(251,191,36,0.2)" stroke="#fbbf24" stroke-width="0.5"/>
          <text x="20" y="25" font-size="11" fill="#d8dee9" font-family="JetBrains Mono, monospace">Primary Key</text>
          <rect x="120" y="14" width="14" height="14" rx="3" fill="rgba(167,139,250,0.2)" stroke="#a78bfa" stroke-width="0.5"/>
          <text x="140" y="25" font-size="11" fill="#d8dee9" font-family="JetBrains Mono, monospace">Foreign Key</text>
          <rect x="250" y="14" width="14" height="14" rx="3" fill="rgba(129,161,193,0.2)" stroke="#81a1c1" stroke-width="0.5"/>
          <text x="270" y="25" font-size="11" fill="#d8dee9" font-family="JetBrains Mono, monospace">1:N Relationship</text>
        </g>

        <!-- Technical watermark -->
        <text x="550" y="630" font-size="9" fill="#434c5e" font-family="JetBrains Mono, monospace" text-anchor="middle" letter-spacing="2">TECHNICAL DIAGRAM — NOT TO SCALE</text>
      </svg>
    </div>

    <div class="footer">
      Generated by gmdiagram &middot; Blueprint &middot; 2026-04-14
    </div>
  </div>
</body>
</html>
